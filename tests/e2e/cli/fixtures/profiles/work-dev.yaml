apiVersion: cfgd.io/v1alpha1
kind: Profile
metadata:
  name: work-dev
spec:
  inherits:
    - dev
  env:
    - name: EDITOR
      value: nvim
    - name: WORK_EMAIL
      value: user@corp.example.com
  files:
    managed:
      - source: files/work-gitconfig
        target: TARGET_DIR/.gitconfig-work
