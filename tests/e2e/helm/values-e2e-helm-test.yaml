# Values for E2E Helm tests — installs agent DaemonSet into an ephemeral namespace.
# Operator, webhooks, CRDs managed separately by persistent infrastructure.
operator:
  enabled: false

agent:
  enabled: true
  image:
    repository: ""  # overridden via --set agent.image.repository=$REGISTRY/cfgd at runtime
    tag: ""  # overridden via --set agent.image.tag=$IMAGE_TAG at runtime
    pullPolicy: Always
  reconcileInterval: "10s"
  profile: "k8s-worker-minimal"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  tolerations:
    - operator: Exists
      effect: NoSchedule
    - operator: Exists
      effect: NoExecute
  priorityClassName: ""

installCRDs: false

webhook:
  enabled: false
  certManager:
    enabled: false

mutatingWebhook:
  enabled: false

csiDriver:
  enabled: false
