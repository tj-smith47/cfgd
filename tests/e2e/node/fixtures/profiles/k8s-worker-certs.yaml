apiVersion: cfgd.io/v1alpha1
kind: Profile
metadata:
  name: k8s-worker-certs
spec:
  env: []
  system:
    certificates:
      caCertDir: /tmp/cfgd-e2e-pki
      certificates:
        - name: test-cert
          certPath: /tmp/cfgd-e2e-pki/test.crt
          keyPath: /tmp/cfgd-e2e-pki/test.key
          mode: "0600"
