apiVersion: cfgd.io/v1alpha1
kind: Profile
metadata:
  name: k8s-worker-certs
spec:
  env: []
  system:
    certificates:
      ca-cert-dir: /tmp/cfgd-e2e-pki
      certificates:
        - name: test-cert
          cert-path: /tmp/cfgd-e2e-pki/test.crt
          key-path: /tmp/cfgd-e2e-pki/test.key
          mode: "0600"
