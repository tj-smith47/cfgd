apiVersion: cfgd.io/v1alpha1
kind: Profile
metadata:
  name: k8s-worker-seccomp
spec:
  env: []
  system:
    seccomp:
      profiles-dir: /tmp/cfgd-e2e-seccomp
      profiles:
        - name: audit
          file: audit.json
          content: |
            {
              "defaultAction": "SCMP_ACT_LOG",
              "architectures": ["SCMP_ARCH_X86_64"]
            }
