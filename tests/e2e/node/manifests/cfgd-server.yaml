apiVersion: v1
kind: ServiceAccount
metadata:
  name: cfgd-server
  namespace: cfgd-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cfgd-server
rules:
  - apiGroups: ["cfgd.io"]
    resources: ["machineconfigs", "machineconfigs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cfgd.io"]
    resources: ["configpolicies", "configpolicies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cfgd.io"]
    resources: ["driftalerts", "driftalerts/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cfgd-server
subjects:
  - kind: ServiceAccount
    name: cfgd-server
    namespace: cfgd-system
roleRef:
  kind: ClusterRole
  name: cfgd-server
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfgd-server
  namespace: cfgd-system
  labels:
    app: cfgd-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cfgd-server
  template:
    metadata:
      labels:
        app: cfgd-server
    spec:
      serviceAccountName: cfgd-server
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: cfgd-operator
          image: REGISTRY_PLACEHOLDER/cfgd-operator:IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DEVICE_GATEWAY_ENABLED
              value: "true"
            - name: DEVICE_GATEWAY_PORT
              value: "8080"
            - name: CFGD_SERVER_DB_PATH
              value: "/tmp/cfgd-e2e.db"
          readinessProbe:
            httpGet:
              path: /api/v1/devices
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cfgd-server
  namespace: cfgd-system
spec:
  selector:
    app: cfgd-server
  ports:
    - port: 8080
      targetPort: 8080
