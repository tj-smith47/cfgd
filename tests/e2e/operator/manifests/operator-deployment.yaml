apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfgd-operator
  namespace: cfgd-system
  labels:
    app: cfgd-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cfgd-operator
  template:
    metadata:
      labels:
        app: cfgd-operator
    spec:
      serviceAccountName: cfgd-operator
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: cfgd-operator
          image: REGISTRY_PLACEHOLDER/cfgd-operator:IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
            - name: WEBHOOK_CERT_DIR
              value: "/etc/webhook/certs"
            - name: WEBHOOK_PORT
              value: "9443"
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: webhook-certs
          secret:
            secretName: cfgd-webhook-certs
            optional: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cfgd-operator
  namespace: cfgd-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cfgd-operator
rules:
  - apiGroups: ["cfgd.io"]
    resources: ["machineconfigs", "machineconfigs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cfgd.io"]
    resources: ["configpolicies", "configpolicies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cfgd.io"]
    resources: ["driftalerts", "driftalerts/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cfgd.io"]
    resources: ["modules", "modules/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cfgd.io"]
    resources: ["clusterconfigpolicies", "clusterconfigpolicies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cfgd-operator
subjects:
  - kind: ServiceAccount
    name: cfgd-operator
    namespace: cfgd-system
roleRef:
  kind: ClusterRole
  name: cfgd-operator
  apiGroup: rbac.authorization.k8s.io
