# Announce-integration fragment, composed into .anodizer.yaml via `includes:`.
# Kept separate so the release-notification matrix (webhook + email endpoints,
# templates, transport security) can be reviewed and edited without scrolling
# the 1k-line root config. anodizer merges includes as defaults under the root
# config, so the root may still override any value here.
announce:
  # Wall-clock bound on the whole announce stage. cfgd fans out to two channels
  # (self-hosted webhook + Gmail SMTP) under an aggressive global retry policy
  # (10 attempts, 10s→5m backoff). Without a bound, one unreachable channel could
  # retry for minutes and accumulate into a hang AFTER publishers already crossed
  # one-way doors. 120s sits just above one full webhook retry cycle so a
  # transiently-slow-but-reachable channel still completes, while any genuinely
  # dead channel is abandoned with a warning well under the pipeline timeout.
  deadline: "120s"
  webhook:
    enabled: true
    endpoint_url: "https://tj.jarvispro.io/webhooks/anodizer"
    content_type: application/json
    message_template: '{"project":"{{ ProjectName }}","tag":"{{ Tag }}","url":"{{ ReleaseURL }}"}'
    headers:
      X-Anodizer-Source: "release"
    skip_tls_verify: false
    expected_status_codes:
      - 200
      - 202
  email:
    enabled: true
    host: smtp.gmail.com
    port: 587
    username: toss45@gmail.com
    from: toss45@gmail.com
    to:
      - "tj@jarvispro.io"
    subject_template: "{{ ProjectName }} {{ Tag }} released"
    message_template: "{{ ProjectName }} {{ Tag }} is now available at {{ ReleaseURL }}"
    encryption: starttls
    insecure_skip_verify: false
