name: E2E Setup (Reusable)

on:
  workflow_call:
    outputs:
      image-tag:
        description: "Docker image tag used for this run"
        value: ${{ jobs.setup.outputs.image-tag }}

permissions:
  contents: read

jobs:
  setup:
    name: "Build & Setup Infrastructure"
    runs-on: arc-cfgd
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.tags.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: e2e-setup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # buildx's docker-container builder has its own image store
          # separate from the host docker engine, so docker-daemon-side
          # pre-pulls aren't visible to it. Configure the buildkit instance
          # to transparently mirror docker.io via mirror.gcr.io (Google's
          # rate-limit-free public cache) so `FROM debian:bookworm-slim` in
          # the Dockerfiles bypasses Docker Hub's anonymous pull cap.
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Determine image tag
        id: tags
        run: echo "tag=e2e-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Local composite, not crossplane-contrib/setup-crossplane-action@main:
      # the upstream action floats on @main (unpinned, unauditable) while the
      # local one downloads the repo-pinned version and checksum-verifies it.
      - name: Setup Crossplane CLI
        uses: ./.github/actions/setup-crossplane

      - name: Run setup
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.tag }}
          REGISTRY: ${{ vars.E2E_REGISTRY }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: bash tests/e2e/setup-cluster.sh
