name: E2E – Full Stack

on:
  push:
    branches: [master]
    paths:
      - "crates/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "Dockerfile.csi"
      - "tests/e2e/**"
      - ".github/workflows/e2e-full-stack.yml"
      - ".github/workflows/e2e-setup.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "Dockerfile.csi"
      - "tests/e2e/**"
      - ".github/workflows/e2e-full-stack.yml"
      - ".github/workflows/e2e-setup.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/e2e-setup.yml

  full-stack-tests:
    name: "Full-Stack Tests (T01–T16)"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 25
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run full-stack tests
        run: bash tests/e2e/full-stack/scripts/run-full-stack-tests.sh
