name: E2E – Operator

on:
  push:
    branches: [master]
    paths:
      - "crates/cfgd-operator/**"
      - "crates/cfgd-core/**"
      - "Dockerfile.operator"
      - "tests/e2e/operator/**"
      - "tests/e2e/common/**"
      - "tests/e2e/manifests/**"
      - "tests/e2e/setup-cluster.sh"
      - ".github/workflows/e2e-operator.yml"
      - ".github/workflows/e2e-setup.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/cfgd-operator/**"
      - "crates/cfgd-core/**"
      - "Dockerfile.operator"
      - "tests/e2e/operator/**"
      - "tests/e2e/common/**"
      - "tests/e2e/manifests/**"
      - "tests/e2e/setup-cluster.sh"
      - ".github/workflows/e2e-operator.yml"
      - ".github/workflows/e2e-setup.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/e2e-setup.yml

  operator-tests:
    name: "Operator Tests (T01–T18)"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 20
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run operator tests
        run: bash tests/e2e/operator/scripts/run-operator-tests.sh
