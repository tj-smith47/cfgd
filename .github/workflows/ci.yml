name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Layered atop Swatinem/rust-cache: rust-cache restores `target/` per
  # (OS, Cargo.lock-hash); sccache catches the cache-miss rebuild path
  # (Cargo.lock churn) by serving each rustc invocation from per-input-hash
  # cache. GHA cache backend — no S3 needed.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-clippy
          # Cross-job warm-restore: if the per-key cache misses, fall back
          # to any sibling job's cache from the same Cargo.lock generation.
          restore-keys: |
            ci-test-ubuntu-latest-
            ci-coverage-
            ci-package-
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test-${{ matrix.os }}
          restore-keys: |
            ci-clippy-
            ci-coverage-
            ci-package-
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # nextest gives per-test process isolation + per-test timeout: a hung
      # test is killed and named in the failure output instead of stalling
      # the whole binary for the GHA 6h cutoff (cfgd master hit a 60+min
      # macos/windows hang with `cargo test` and no log of which test).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Tests
        shell: bash
        run: task test:ci

  audit:
    name: Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash .claude/scripts/audit.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-coverage
          restore-keys: |
            ci-test-ubuntu-latest-
            ci-clippy-
            ci-package-
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Run coverage and update badge
        run: task coverage:publish

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-package
          restore-keys: |
            ci-test-ubuntu-latest-
            ci-clippy-
            ci-coverage-
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  # Build the anodizer binary once on Linux and upload it as an artifact so
  # downstream jobs in this workflow and release.yml can download it instead
  # of each rebuilding from source (saves 6+ redundant rebuilds per release).
  build-anodizer:
    name: Build anodizer binary
    runs-on: ubuntu-latest
    steps:
      - uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: publisher-required-config
          install-only: 'true'
      - name: Upload anodizer binary
        uses: actions/upload-artifact@v4
        with:
          name: anodizer-linux
          path: ${{ runner.tool_cache }}/anodizer/source/anodizer

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test, build-anodizer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release pipeline via anodizer
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          args: release --snapshot --single-target --clean --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

