name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pin anodize to a specific commit so the cache key stays stable.
  # Bump this when you need a newer anodize. Temporary until anodize has
  # tagged GitHub releases and anodize-action's version: latest works.
  ANODIZE_REV: c1de526dc8b8ec0ced75ae0d68cd74736fa3bdf4

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            anodize_artifact: anodize-linux
            anodize_bin: anodize
          - os: macos-latest
            anodize_artifact: anodize-macos
            anodize_bin: anodize
          - os: windows-latest
            anodize_artifact: anodize-windows
            anodize_bin: anodize.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tests
        # Windows tests only the cross-platform crates (cfgd-core + cfgd CLI);
        # the operator and CSI plugins are Linux-only.
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Point openssl-sys to the pre-installed OpenSSL on Windows runners
            # so git2/libgit2 can link against it without a vendored build.
            export OPENSSL_DIR='C:/Program Files/OpenSSL'
            cargo test -p cfgd-core -p cfgd
          else
            task test
          fi

      # --- Build and upload anodize for downstream consumers. -------------
      # Every job that needs anodize (snapshot, tag, release.yml) downloads
      # it via actions/download-artifact or anodize-action's from-artifact
      # instead of cargo-installing it from scratch. One build per platform
      # per master push, cached by ANODIZE_REV.
      - name: Cache anodize binary
        if: github.ref == 'refs/heads/master'
        id: anodize-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/${{ matrix.anodize_bin }}
          key: anodize-${{ runner.os }}-${{ env.ANODIZE_REV }}

      - name: Install anodize
        if: github.ref == 'refs/heads/master' && steps.anodize-cache.outputs.cache-hit != 'true'
        shell: bash
        run: cargo install --git https://github.com/tj-smith47/anodize --rev "$ANODIZE_REV" --locked anodize

      - name: Stage anodize binary for artifact upload
        if: github.ref == 'refs/heads/master'
        shell: bash
        run: |
          mkdir -p anodize-bin
          cp ~/.cargo/bin/${{ matrix.anodize_bin }} anodize-bin/${{ matrix.anodize_bin }}

      - name: Upload anodize binary
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.anodize_artifact }}
          path: anodize-bin/${{ matrix.anodize_bin }}

  audit:
    name: Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .claude/scripts/audit.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --cobertura --output-path cobertura.xml
      - name: Update coverage badge
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' cobertura.xml | head -1 | awk '{printf "%.1f", $1 * 100}')
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then COLOR="yellowgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR="yellow"
          else COLOR="red"; fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin badges:badges 2>/dev/null || true
          if git show-ref --verify --quiet refs/heads/badges; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . > /dev/null 2>&1 || true
          fi

          BADGE="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}"
          echo "$BADGE" > coverage.json

          git add coverage.json
          git diff --cached --quiet || git commit -m "Update coverage to ${COVERAGE}%"
          git push origin badges --force

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Reuse the anodize binary uploaded by the test job — no rebuild.
      - name: Validate release pipeline via anodize
        uses: tj-smith47/anodize-action@master
        with:
          from-artifact: anodize-linux
          args: release --snapshot --single-target --clean --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Auto-tag
    if: github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '#none')
    needs: [fmt, clippy, test, audit, package, snapshot]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT (not GITHUB_TOKEN) so the tag push triggers release.yml.
          # GITHUB_TOKEN-authored pushes don't trigger downstream workflows.
          token: ${{ secrets.GH_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # Download anodize once, then tag each workspace independently.
      # Each --crate uses the crate's tag_template prefix for both tag
      # discovery and creation (cfgd→v*, cfgd-core→core-v*, etc.).
      # create_and_push_tag pushes each tag immediately, which triggers
      # one release.yml run per workspace via the concurrency queue.
      - name: Download anodize binary
        uses: actions/download-artifact@v4
        with:
          name: anodize-linux
          path: /tmp/anodize-bin
      - name: Auto-tag all workspaces
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          chmod +x /tmp/anodize-bin/anodize
          export PATH="/tmp/anodize-bin:$PATH"
          for crate in cfgd-core cfgd cfgd-operator cfgd-csi; do
            echo "--- tagging $crate ---"
            anodize tag --crate "$crate" || true
          done
