name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Read-only by default; the coverage job alone elevates to contents: write
# (its badge publish pushes to the badges branch).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Layered atop Swatinem/rust-cache: rust-cache restores `target/` per
  # (OS, Cargo.lock-hash); sccache catches the cache-miss rebuild path
  # (Cargo.lock churn) by serving each rustc invocation from per-input-hash
  # cache. GHA cache backend — no S3 needed.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  # SSOT: repo variable (gh variable set ANODIZER_VERSION), shared by every
  # workflow that installs anodizer.
  ANODIZER_VERSION: ${{ vars.ANODIZER_VERSION }}

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache: 'false'
          protoc: 'false'
          task-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy
          task-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clippy
        run: task clippy

      - name: Schema drift guard
        run: task schema:check

      - name: Chart CRD drift guard
        run: task gen:crds:check

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          task-token: ${{ secrets.GITHUB_TOKEN }}

      # nextest gives per-test process isolation + per-test timeout: a hung
      # test is killed and named in the failure output instead of stalling
      # the whole binary for the GHA 6h cutoff (cfgd master hit a 60+min
      # macos/windows hang with `cargo test` and no log of which test).
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Tests
        shell: bash
        run: task test:ci

  test-freebsd:
    name: Tests (freebsd)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # FreeBSD has no GitHub-hosted runner, so vmactions boots a real FreeBSD
      # guest (14.3 — the same release as the acceptance VM) inside the Linux
      # runner. The guest runs `task test:ci`, the same entrypoint every other
      # test leg uses: it detects FreeBSD via uname and scopes to cfgd-core +
      # cfgd (cfgd-csi/cfgd-operator are Kubernetes server-side, no FreeBSD
      # surface), so the scope decision lives in the Taskfile SSOT, not here.
      # rustup pins current stable (>= MSRV) to mirror that VM's toolchain;
      # `task` (go-task) and `nextest` come from pkg, and no protoc is needed
      # since neither in-scope crate compiles protos.
      - name: Test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: "true"
          prepare: |
            pkg install -y rustup-init git task nextest
            rustup-init -y --default-toolchain stable --profile minimal
          run: |
            . "$HOME/.cargo/env"
            task test:ci

  audit:
    name: Code Audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install go-task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run code audit
        run: task audit

      # Self-test of the audit script's banned-pattern rules — keeps this job
      # in lockstep with `task ci`, which runs audit:test after audit.
      - name: Validate audit rules
        run: task audit:test

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    # The declared rust-version is only a promise until something compiles
    # with exactly that toolchain; this job keeps the Cargo.toml pin honest.
    env:
      # Warning sets differ across compiler versions; this job proves the
      # MSRV *compiles*, not that it is lint-clean on an older rustc.
      RUSTFLAGS: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # Read the pin from Cargo.toml so the workspace manifest stays the
      # single source of truth for the MSRV.
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(sed -n 's/^rust-version = "\(.*\)"$/\1/p' Cargo.toml)" >> "$GITHUB_OUTPUT"

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: Install protoc
        uses: ./.github/actions/setup-protoc

      - name: Check workspace on MSRV
        run: cargo check --workspace --all-targets

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      # publish-coverage.sh pushes the badge update to the badges branch.
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
          # Separate shared-key: this job builds with llvm-tools-preview
          # instrumentation (different target/ artifacts), so it must not
          # share or pollute the plain `ci` dependency cache.
          shared-key: ci-coverage
          task-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install coverage tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Run coverage and update badge
        run: task coverage:publish

      # Preserved so a floor failure can be diffed per-file against a local
      # cobertura.xml — the runner covers a different environment-dependent
      # line set than a dev box, and the badge only records a rounded percent.
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: cobertura.xml
          retention-days: 7

      # Reuses the cobertura.xml the publish step just wrote — no second
      # instrumented run. Master must never drop below the same floor that
      # gates local `task push`.
      - name: Enforce coverage floor
        run: task coverage:floor

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          task-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release pipeline via anodizer
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          args: release --snapshot --single-target --clean --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
