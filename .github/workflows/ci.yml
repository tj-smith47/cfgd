name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Layered atop Swatinem/rust-cache: rust-cache restores `target/` per
  # (OS, Cargo.lock-hash); sccache catches the cache-miss rebuild path
  # (Cargo.lock churn) by serving each rustc invocation from per-input-hash
  # cache. GHA cache backend — no S3 needed.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  ANODIZER_VERSION: v0.8.1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          # shared-key shares one dependency cache across the clippy/test/
          # package jobs (compatible build profiles); rust-cache still folds
          # the Cargo.lock hash + toolchain + OS into the final key, so the
          # OS matrix auto-separates.
          shared-key: ci
      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"
      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy
      - name: Schema drift guard
        run: task schema:check

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          # Shares the dependency cache with clippy/package; the macos/windows
          # matrix legs auto-separate because rust-cache folds the OS into the
          # final key on top of shared-key.
          shared-key: ci
      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"
      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # nextest gives per-test process isolation + per-test timeout: a hung
      # test is killed and named in the failure output instead of stalling
      # the whole binary for the GHA 6h cutoff (cfgd master hit a 60+min
      # macos/windows hang with `cargo test` and no log of which test).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Tests
        shell: bash
        run: task test:ci

  audit:
    name: Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash .claude/scripts/audit.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          # Separate shared-key: this job builds with llvm-tools-preview
          # instrumentation (different target/ artifacts), so it must not
          # share or pollute the plain `ci` dependency cache.
          shared-key: ci-coverage
      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"
      - uses: go-task/setup-task@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Run coverage and update badge
        run: task coverage:publish

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          # Shares the dependency cache with clippy/test (same build profile).
          shared-key: ci
      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"
      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate release pipeline via anodizer
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          args: release --snapshot --single-target --clean --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

