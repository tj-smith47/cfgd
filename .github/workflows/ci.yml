name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pin anodizer to a specific commit so the cache key stays stable.
  # Bump this when you need a newer anodizer. Temporary until anodizer has
  # tagged GitHub releases and anodizer-action's version: latest works.
  ANODIZER_REV: a19f15e073d0633b45ba9ef0bea2cb66775d59bc

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-clippy
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            anodizer_artifact: anodizer-linux
            anodizer_bin: anodizer
          - os: macos-latest
            anodizer_artifact: anodizer-macos
            anodizer_bin: anodizer
          - os: windows-latest
            anodizer_artifact: anodizer-windows
            anodizer_bin: anodizer.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test-${{ matrix.os }}
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tests
        # Windows tests only the cross-platform crates (cfgd-core + cfgd CLI);
        # the operator and CSI plugins are Linux-only.
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Point openssl-sys to the pre-installed OpenSSL on Windows runners
            # so git2/libgit2 can link against it without a vendored build.
            export OPENSSL_DIR='C:/Program Files/OpenSSL'
            cargo test -p cfgd-core -p cfgd
          else
            task test
          fi

      # --- Build and upload anodizer for downstream consumers. -------------
      # Every job that needs anodizer (snapshot, tag, release.yml) downloads
      # it via actions/download-artifact or anodizer-action's from-artifact
      # instead of cargo-installing it from scratch. One build per platform
      # per master push, cached by ANODIZER_REV.
      - name: Cache anodizer binary
        if: github.ref == 'refs/heads/master'
        id: anodizer-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/${{ matrix.anodizer_bin }}
          key: anodizer-${{ runner.os }}-${{ env.ANODIZER_REV }}

      - name: Install anodizer
        if: github.ref == 'refs/heads/master' && steps.anodizer-cache.outputs.cache-hit != 'true'
        shell: bash
        run: cargo install --git https://github.com/tj-smith47/anodizer --rev "$ANODIZER_REV" --locked anodizer

      - name: Stage anodizer binary for artifact upload
        if: github.ref == 'refs/heads/master'
        shell: bash
        run: |
          mkdir -p anodizer-bin
          cp ~/.cargo/bin/${{ matrix.anodizer_bin }} anodizer-bin/${{ matrix.anodizer_bin }}

      - name: Upload anodizer binary
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.anodizer_artifact }}
          path: anodizer-bin/${{ matrix.anodizer_bin }}

  audit:
    name: Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .claude/scripts/audit.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-coverage
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --cobertura --output-path cobertura.xml
      - name: Update coverage badge
        run: bash .claude/scripts/update-coverage-badge.sh cobertura.xml

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-package
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Reuse the anodizer binary uploaded by the test job — no rebuild.
      - name: Validate release pipeline via anodizer
        uses: tj-smith47/anodizer-action@master
        with:
          from-artifact: anodizer-linux
          args: release --snapshot --single-target --clean --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Auto-tag
    # Gate on master only. The `#none` whole-token decision lives inside
    # anodizer tag per-crate — doing it here with GitHub Actions' substring
    # `contains()` mis-fires when a commit body mentions `#none` in prose.
    if: github.ref == 'refs/heads/master'
    needs: [fmt, clippy, test, audit, package, snapshot]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT (not GITHUB_TOKEN) so the tag push triggers release.yml.
          # GITHUB_TOKEN-authored pushes don't trigger downstream workflows.
          token: ${{ secrets.GH_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # Download anodizer once, then tag each workspace independently.
      # Each --crate uses the crate's tag_template prefix for both tag
      # discovery and creation (cfgd→v*, cfgd-core→core-v*, etc.).
      # create_and_push_tag pushes each tag immediately, which triggers
      # one release.yml run per workspace via the concurrency queue.
      - name: Download anodizer binary
        uses: actions/download-artifact@v4
        with:
          name: anodizer-linux
          path: /tmp/anodizer-bin
      - name: Auto-tag all workspaces
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          chmod +x /tmp/anodizer-bin/anodizer
          export PATH="/tmp/anodizer-bin:$PATH"
          for crate in cfgd-core cfgd cfgd-operator cfgd-csi; do
            echo "--- tagging $crate ---"
            if anodizer tag --crate "$crate"; then
              echo "::notice::$crate: tagged successfully"
            else
              echo "::warning::$crate: tag skipped or failed (exit $?)"
            fi
          done
          # Push any version_sync commits to master so they're not orphaned.
          # Without this, tags point to commits that only exist as tag targets
          # and CI never runs on them, breaking artifact resolution.
          git push origin master || true
