name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Tests
        # Windows tests only the cross-platform crates (cfgd-core + cfgd CLI);
        # the operator and CSI plugins are Linux-only.
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Point openssl-sys to the pre-installed OpenSSL on Windows runners
            # so git2/libgit2 can link against it without a vendored build.
            export OPENSSL_DIR='C:/Program Files/OpenSSL'
            cargo test -p cfgd-core -p cfgd
          else
            task test
          fi

  audit:
    name: Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .claude/scripts/audit.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --cobertura --output-path cobertura.xml
      - name: Update coverage badge
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' cobertura.xml | head -1 | awk '{printf "%.1f", $1 * 100}')
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then COLOR="yellowgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR="yellow"
          else COLOR="red"; fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin badges:badges 2>/dev/null || true
          if git show-ref --verify --quiet refs/heads/badges; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . > /dev/null 2>&1 || true
          fi

          BADGE="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}"
          echo "$BADGE" > coverage.json

          git add coverage.json
          git diff --cached --quiet || git commit -m "Update coverage to ${COVERAGE}%"
          git push origin badges --force

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    env:
      # Pin anodize to a specific commit so the cache key stays stable.
      # Bump this when you need a newer anodize. Temporary until anodize has
      # tagged GitHub releases and anodize-action's version: latest works.
      ANODIZE_REV: 51905543a2237059c0e82554279c5630b9252fa1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache anodize binary
        id: anodize-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anodize
          key: anodize-${{ runner.os }}-${{ env.ANODIZE_REV }}
      - name: Install anodize
        if: steps.anodize-cache.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/tj-smith47/anodize --rev "$ANODIZE_REV" --locked anodize
      # Stage the binary into a clean directory so upload-artifact uploads
      # exactly one file.  Downstream jobs use anodize-action's from-artifact
      # which expects a binary literally named `anodize` (or `anodize.exe`).
      - name: Stage anodize binary for artifact upload
        run: |
          mkdir -p anodize-bin
          cp ~/.cargo/bin/anodize anodize-bin/anodize
      - name: Upload anodize binary
        uses: actions/upload-artifact@v4
        with:
          name: anodize-linux
          path: anodize-bin/anodize
      - name: Validate release pipeline via anodize
        run: anodize release --snapshot --single-target --clean --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Auto-tag
    if: github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '#none')
    needs: [fmt, clippy, test, audit, package, snapshot]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT (not GITHUB_TOKEN) so the tag push triggers release.yml.
          # GITHUB_TOKEN-authored pushes don't trigger downstream workflows.
          token: ${{ secrets.GH_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # Reuse the anodize binary uploaded by the snapshot job — no rebuild.
      - name: Auto-tag release via anodize
        uses: tj-smith47/anodize-action@master
        with:
          from-artifact: anodize-linux
          args: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Push tags
        run: git push --tags
