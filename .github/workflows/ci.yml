name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: task fmt:check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-clippy
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy
        run: task clippy

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test-${{ matrix.os }}
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export OPENSSL_DIR='C:/Program Files/OpenSSL'
            cargo test -p cfgd-core -p cfgd
          else
            task test
          fi

  audit:
    name: Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .claude/scripts/audit.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-coverage
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage and update badge
        run: task coverage:publish

  package:
    name: Package (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-package
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Package all crates
        run: task package

  snapshot:
    name: Snapshot (dry-run)
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release pipeline via anodizer
        uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: publisher-required-config
          args: release --snapshot --single-target --clean --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Auto-tag
    # Gate on master only. The `#none` whole-token decision lives inside
    # anodizer tag per-crate — doing it here with GitHub Actions' substring
    # `contains()` mis-fires when a commit body mentions `#none` in prose.
    if: github.ref == 'refs/heads/master'
    needs: [fmt, clippy, test, audit, package, snapshot]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT (not GITHUB_TOKEN) so the tag push triggers release.yml.
          # GITHUB_TOKEN-authored pushes don't trigger downstream workflows.
          token: ${{ secrets.GH_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install anodizer
        uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: publisher-required-config
          args: --version
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Auto-tag all workspaces
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          for crate in cfgd-core cfgd cfgd-operator cfgd-csi; do
            echo "--- tagging $crate ---"
            if anodizer tag --crate "$crate"; then
              echo "::notice::$crate: tagged successfully"
            else
              echo "::warning::$crate: tag skipped or failed (exit $?)"
            fi
          done
          git push origin master || true
