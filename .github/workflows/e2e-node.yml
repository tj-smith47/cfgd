name: E2E – Node

on:
  push:
    branches: [master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "crates/cfgd-operator/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "tests/e2e/node/**"
      - "tests/e2e/common/**"
      - "tests/e2e/manifests/**"
      - "tests/e2e/setup-cluster.sh"
      - ".github/workflows/e2e-node.yml"
      - ".github/workflows/e2e-setup.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "crates/cfgd-operator/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "tests/e2e/node/**"
      - "tests/e2e/common/**"
      - "tests/e2e/manifests/**"
      - "tests/e2e/setup-cluster.sh"
      - ".github/workflows/e2e-node.yml"
      - ".github/workflows/e2e-setup.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/e2e-setup.yml

  binary-tests:
    name: "Binary Tests (T01–T11)"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 15
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Run binary tests
        run: bash tests/e2e/node/scripts/run-binary-tests.sh

  helm-tests:
    name: "Helm Tests (T20–T25)"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 15
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Helm tests
        run: bash tests/e2e/node/scripts/run-helm-tests.sh

  server-tests:
    name: "Server Integration Tests (T30–T35)"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 15
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Run server integration tests
        run: bash tests/e2e/node/scripts/run-server-tests.sh

  drift-tests:
    name: "Drift & Reconciliation Tests (T40–T50)"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 15
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Run drift & reconciliation tests
        run: bash tests/e2e/node/scripts/run-drift-tests.sh

  e2e-summary:
    name: "E2E Summary"
    runs-on: arc-cfgd
    needs: [binary-tests, helm-tests, server-tests, drift-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== cfgd E2E Results ==="
          echo "Binary tests:  ${{ needs.binary-tests.result }}"
          echo "Helm tests:    ${{ needs.helm-tests.result }}"
          echo "Server tests:  ${{ needs.server-tests.result }}"
          echo "Drift tests:   ${{ needs.drift-tests.result }}"

          if [ "${{ needs.binary-tests.result }}" != "success" ] || \
             [ "${{ needs.helm-tests.result }}" != "success" ] || \
             [ "${{ needs.server-tests.result }}" != "success" ] || \
             [ "${{ needs.drift-tests.result }}" != "success" ]; then
            echo "::error::One or more E2E test suites failed"
            exit 1
          fi

          echo "All E2E test suites passed!"
