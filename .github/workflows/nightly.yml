name: Nightly

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # keyless cosign signing via Fulcio/OIDC + SLSA attestation OIDC
  attestations: write # mint SLSA build provenance (attestations.enabled, subjects mode)

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"

      - uses: tj-smith47/anodizer-action@v1
        with:
          # Build anodizer from the unreleased branch cfgd's config targets (as
          # ci.yml does); drop once anodizer releases these features.
          from-branch: publisher-required-config
          args: release --nightly --no-preflight
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          NIX_PKGS_TOKEN: ${{ secrets.NIX_PKGS_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
