name: Nightly

# Sharded per-OS via anodizer's split/merge flow (`partial.by: os` in
# .anodizer.yaml): each shard cross-builds only the targets its host OS can
# genuinely link, then a merge leg fuses the shard dists and runs the
# post-build pipeline (archive/sign/publish the nightly prerelease). A single
# ubuntu runner cannot serve the whole target matrix — the darwin targets
# link Apple frameworks (Security via rustls-native-certs) that zig cannot
# resolve without a macOS SDK — so the darwin leg must build on a macOS host,
# exactly like the release pipeline's determinism shards.
on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # keyless cosign signing via Fulcio/OIDC + SLSA attestation OIDC
  attestations: write # mint SLSA build provenance (attestations.enabled, subjects mode)

# Shares the Release workflow's group: both push tags/releases through
# anodizer, and a nightly overlapping a live release run would race it on
# repo state. cancel-in-progress stays false — never kill a publish mid-run.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  # SSOT: repo variable (gh variable set ANODIZER_VERSION), shared by every
  # workflow that installs anodizer.
  ANODIZER_VERSION: ${{ vars.ANODIZER_VERSION }}

jobs:
  build:
    strategy:
      # A missing shard fails the merge's matrix.json cross-check anyway;
      # letting the siblings finish surfaces every per-OS failure in one run.
      fail-fast: false
      matrix:
        # Same runner labels as determinism-shards: linux shard cross-builds
        # aarch64-unknown-linux-gnu (+ musl) via zig/cargo-zigbuild, macOS
        # builds both darwin targets natively, Windows builds both msvc
        # targets (aarch64 via the msvc cross toolchain).
        include:
          - { os: ubuntu-latest,  shard: linux }
          - { os: macos-latest,   shard: darwin }
          - { os: windows-latest, shard: windows }
    name: Nightly build (${{ matrix.shard }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install protoc
        uses: ./.github/actions/setup-protoc

      # --split builds only this host's `partial.by: os` slice and writes
      # dist/<os>/context.json + dist/matrix.json for the merge leg.
      # auto-install provisions zig + cargo-zigbuild (and any other
      # configured-stage tools) so `cross: auto` never silently falls back
      # to plain cargo — the root cause of the 30+ consecutive nightly
      # failures at the aarch64-unknown-linux-gnu aws-lc-sys build.
      - name: Build the nightly shard (release --nightly --split)
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          auto-install: 'true'
          args: release --nightly --split --no-preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # upload-artifact drops dotfiles by default; a hidden deliverable
      # silently stripped here would only surface as a merge-time failure.
      - name: Upload shard dist
        uses: actions/upload-artifact@v7
        with:
          name: nightly-dist-${{ matrix.shard }}
          path: dist/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Nightly publish (merge)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download shard dists
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: nightly-dist-*
          merge-multiple: true

      # --merge fuses the shard contexts (validated against matrix.json) and
      # resumes the pipeline from the post-build stages, signing and
      # publishing the nightly prerelease.
      - name: Publish the merged nightly (release --nightly --merge)
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          auto-install: 'true'
          args: release --nightly --merge --no-preflight
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
        env:
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
