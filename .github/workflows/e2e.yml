name: E2E

on:
  push:
    branches: [master]
    paths:
      - "crates/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "Dockerfile.csi"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
      - ".github/workflows/e2e-setup.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "Dockerfile.csi"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
      - ".github/workflows/e2e-setup.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# REGISTRY is identical (vars.E2E_REGISTRY) for every job that needs it, so it
# lives here. CFGD_E2E_SETUP_DONE and IMAGE_TAG stay per-job: cli-tests runs
# natively without the cluster setup (must NOT signal setup done), and IMAGE_TAG
# resolves `needs.setup.outputs.image-tag`, which is unavailable at workflow
# scope.
env:
  REGISTRY: ${{ vars.E2E_REGISTRY }}
  # Single pin for every cosign-installer step in this workflow.
  COSIGN_VERSION: "v2.4.3"

jobs:
  # ---------- Shared setup: build images, apply CRDs, deploy operator ----------
  setup:
    uses: ./.github/workflows/e2e-setup.yml

  # ---------- Node: core tests (binary + drift + daemon) ----------
  node-tests:
    name: "Node Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 25
    env:
      CFGD_E2E_SETUP_DONE: "1"
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-node
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install go-task
        uses: go-task/setup-task@v2

      - name: Run node tests
        run: task e2e:node

  # ---------- Node: Helm tests ----------
  helm-tests:
    name: "Node – Helm Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 15
    env:
      CFGD_E2E_SETUP_DONE: "1"
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-helm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install go-task
        uses: go-task/setup-task@v2

      - name: Run Helm tests
        run: task e2e:node:helm

  # ---------- Node: server integration tests ----------
  # Runs after node-tests to avoid host sysctl races (single-node cluster)
  server-tests:
    name: "Node – Server Tests"
    runs-on: arc-cfgd
    needs: [setup, node-tests]
    timeout-minutes: 15
    env:
      CFGD_E2E_SETUP_DONE: "1"
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-srv
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install go-task
        uses: go-task/setup-task@v2

      - name: Run server integration tests
        run: task e2e:node:server

  # ---------- Operator tests ----------
  operator-tests:
    name: "Operator Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 20
    env:
      CFGD_E2E_SETUP_DONE: "1"
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-op
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install go-task
        uses: go-task/setup-task@v2

      - name: Run operator tests
        run: task e2e:operator

  # ---------- Full-stack tests ----------
  full-stack-tests:
    name: "Full-Stack Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 25
    env:
      CFGD_E2E_SETUP_DONE: "1"
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-full
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install go-task
        uses: go-task/setup-task@v2

      # cosign is required by test-oci-e2e.sh OCI-E2E-02/03 (and the
      # cosign-keyed CSI scripts under test-csi.sh); without it those
      # tests skip silently.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Run full-stack tests
        run: task e2e:full-stack

  # ---------- Crossplane tests ----------
  crossplane-tests:
    name: "Crossplane Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 20
    env:
      CFGD_E2E_SETUP_DONE: "1"
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install go-task
        uses: go-task/setup-task@v2

      - name: Run Crossplane tests
        run: task e2e:crossplane

  # ---------- Gateway tests ----------
  gateway-tests:
    name: "Gateway Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 25
    env:
      CFGD_E2E_SETUP_DONE: "1"
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-gateway
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install go-task
        uses: go-task/setup-task@v2

      - name: Run gateway tests
        run: task e2e:gateway

  # ---------- CLI: exhaustive native tests (no k8s needed) ----------
  cli-tests:
    name: "Exhaustive CLI (Native)"
    runs-on: arc-cfgd
    timeout-minutes: 25
    # Same compile-cache layering as the setup job (e2e-setup.yml): this job
    # cargo-builds the release cfgd binary every run instead of riding the
    # setup job's images.
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: e2e-cli

      - name: Install go-task
        uses: go-task/setup-task@v2

      # cosign-installer verifies the binary's keyless signature against
      # sigstore (vs. the prior unverified `curl | install`) and caches.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Run exhaustive tests
        run: task e2e:cli

  # ---------- Summary ----------
  e2e-summary:
    name: "E2E Summary"
    runs-on: ubuntu-latest
    needs:
      [
        setup,
        node-tests,
        helm-tests,
        server-tests,
        operator-tests,
        full-stack-tests,
        crossplane-tests,
        gateway-tests,
        cli-tests,
      ]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== cfgd E2E Results ==="
          echo "Setup:             ${{ needs.setup.result }}"
          echo "Node tests:        ${{ needs.node-tests.result }}"
          echo "Helm tests:        ${{ needs.helm-tests.result }}"
          echo "Server tests:      ${{ needs.server-tests.result }}"
          echo "Operator tests:    ${{ needs.operator-tests.result }}"
          echo "Full-stack tests:  ${{ needs.full-stack-tests.result }}"
          echo "Crossplane tests:  ${{ needs.crossplane-tests.result }}"
          echo "Gateway tests:     ${{ needs.gateway-tests.result }}"
          echo "CLI tests:         ${{ needs.cli-tests.result }}"

          FAILED=false
          # Setup is held to `success` outright — if it fails, every test job
          # cascades to "skipped" and the tolerant loop below would report the
          # whole run green without a single test having executed.
          if [ "${{ needs.setup.result }}" != "success" ]; then
            echo "::error::E2E setup did not succeed (${{ needs.setup.result }}) — no test suite ran"
            FAILED=true
          fi
          for result in \
            "${{ needs.node-tests.result }}" \
            "${{ needs.helm-tests.result }}" \
            "${{ needs.server-tests.result }}" \
            "${{ needs.operator-tests.result }}" \
            "${{ needs.full-stack-tests.result }}" \
            "${{ needs.crossplane-tests.result }}" \
            "${{ needs.gateway-tests.result }}" \
            "${{ needs.cli-tests.result }}"; do
            # "skipped" is the cascade signal from a failed `needs:` dep
            # (setup failed → downstream skipped). The root failure surfaces
            # in its own job's red badge; the summary only escalates real
            # test failures so the report tells you what actually broke.
            case "$result" in
              success|skipped) ;;
              *) FAILED=true ;;
            esac
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::One or more E2E test suites failed"
            exit 1
          fi

          echo "All E2E test suites passed!"
