name: E2E

on:
  push:
    branches: [master]
    paths:
      - "crates/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "Dockerfile.csi"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
      - ".github/workflows/e2e-setup.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/**"
      - "chart/cfgd/**"
      - "Dockerfile"
      - "Dockerfile.operator"
      - "Dockerfile.csi"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
      - ".github/workflows/e2e-setup.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Shared setup: build images, apply CRDs, deploy operator ----------
  setup:
    uses: ./.github/workflows/e2e-setup.yml

  # ---------- Node: core tests (binary + drift + daemon) ----------
  node-tests:
    name: "Node Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 25
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-node
    steps:
      - uses: actions/checkout@v4
      - name: Run node tests
        run: bash tests/e2e/node/scripts/run-all.sh

  # ---------- Node: Helm tests ----------
  helm-tests:
    name: "Node – Helm Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 15
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-helm
    steps:
      - uses: actions/checkout@v4
      - name: Run Helm tests
        run: bash tests/e2e/node/scripts/test-helm.sh

  # ---------- Node: server integration tests ----------
  # Runs after node-tests to avoid host sysctl races (single-node cluster)
  server-tests:
    name: "Node – Server Tests"
    runs-on: arc-cfgd
    needs: [setup, node-tests]
    timeout-minutes: 15
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-srv
    steps:
      - uses: actions/checkout@v4
      - name: Run server integration tests
        run: bash tests/e2e/node/scripts/test-server.sh

  # ---------- Operator tests ----------
  operator-tests:
    name: "Operator Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 20
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-op
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run operator tests
        run: bash tests/e2e/operator/scripts/run-all.sh

  # ---------- Full-stack tests ----------
  full-stack-tests:
    name: "Full-Stack Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 25
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-full
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run full-stack tests
        run: bash tests/e2e/full-stack/scripts/run-all.sh

  # ---------- Crossplane tests ----------
  crossplane-tests:
    name: "Crossplane Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 20
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Crossplane tests
        run: bash tests/e2e/crossplane/scripts/run-crossplane-tests.sh

  # ---------- Gateway tests ----------
  gateway-tests:
    name: "Gateway Tests"
    runs-on: arc-cfgd
    needs: [setup]
    timeout-minutes: 25
    env:
      IMAGE_TAG: ${{ needs.setup.outputs.image-tag }}
      REGISTRY: ${{ vars.E2E_REGISTRY }}
      E2E_NAMESPACE: cfgd-e2e-${{ github.run_id }}-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Run gateway tests
        run: bash tests/e2e/gateway/scripts/run-all.sh

  # ---------- CLI: exhaustive native tests (no k8s needed) ----------
  cli-tests:
    name: "Exhaustive CLI (Native)"
    runs-on: arc-cfgd
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cosign
        run: |
          curl -fsSL -o /usr/local/bin/cosign \
            https://github.com/sigstore/cosign/releases/download/v2.4.3/cosign-linux-amd64
          chmod +x /usr/local/bin/cosign
      - name: Build cfgd
        run: cargo build --release --bin cfgd
      - name: Run exhaustive tests
        env:
          NO_COLOR: "1"
          EDITOR: "true"
          REGISTRY: ${{ vars.E2E_REGISTRY }}
        run: bash tests/e2e/cli/scripts/run-all.sh

  # ---------- Summary ----------
  e2e-summary:
    name: "E2E Summary"
    runs-on: ubuntu-latest
    needs: [node-tests, helm-tests, server-tests, operator-tests, full-stack-tests, crossplane-tests, gateway-tests, cli-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== cfgd E2E Results ==="
          echo "Node tests:        ${{ needs.node-tests.result }}"
          echo "Helm tests:        ${{ needs.helm-tests.result }}"
          echo "Server tests:      ${{ needs.server-tests.result }}"
          echo "Operator tests:    ${{ needs.operator-tests.result }}"
          echo "Full-stack tests:  ${{ needs.full-stack-tests.result }}"
          echo "Crossplane tests:  ${{ needs.crossplane-tests.result }}"
          echo "Gateway tests:     ${{ needs.gateway-tests.result }}"
          echo "CLI tests:         ${{ needs.cli-tests.result }}"

          FAILED=false
          for result in \
            "${{ needs.node-tests.result }}" \
            "${{ needs.helm-tests.result }}" \
            "${{ needs.server-tests.result }}" \
            "${{ needs.operator-tests.result }}" \
            "${{ needs.full-stack-tests.result }}" \
            "${{ needs.crossplane-tests.result }}" \
            "${{ needs.gateway-tests.result }}" \
            "${{ needs.cli-tests.result }}"; do
            if [ "$result" != "success" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::One or more E2E test suites failed"
            exit 1
          fi

          echo "All E2E test suites passed!"
