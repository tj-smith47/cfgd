name: E2E – cfgd CLI

on:
  push:
    branches: [main, master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "tests/e2e/cli/**"
      - "tests/e2e/common/**"
      - ".github/workflows/e2e-cli.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "tests/e2e/cli/**"
      - "tests/e2e/common/**"
      - ".github/workflows/e2e-cli.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cli-tests:
    name: "CLI Tests (T01–T17)"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build cfgd
        run: cargo build --release --bin cfgd

      - name: Install sops and age (for secrets tests)
        run: |
          # Install age
          AGE_VERSION="v1.1.1"
          curl -sLo /tmp/age.tar.gz \
            "https://github.com/FiloSottile/age/releases/download/${AGE_VERSION}/age-${AGE_VERSION}-linux-amd64.tar.gz"
          tar xzf /tmp/age.tar.gz -C /tmp
          sudo mv /tmp/age/age /tmp/age/age-keygen /usr/local/bin/

          # Install sops
          SOPS_VERSION="v3.8.1"
          curl -sLo /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops

      - name: Run CLI E2E tests
        run: bash tests/e2e/cli/scripts/run-cli-tests.sh
