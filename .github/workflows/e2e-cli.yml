name: E2E – CLI

on:
  push:
    branches: [master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "tests/e2e/cli/**"
      - "tests/e2e/common/**"
      - ".github/workflows/e2e-cli.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "tests/e2e/cli/**"
      - "tests/e2e/common/**"
      - ".github/workflows/e2e-cli.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  exhaustive-native:
    name: "Exhaustive CLI (Native)"
    runs-on: arc-cfgd
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build cfgd
        run: cargo build --release --bin cfgd

      - name: Run exhaustive tests
        env:
          NO_COLOR: "1"
          EDITOR: "true"
        run: bash tests/e2e/cli/scripts/run-exhaustive-tests.sh
