name: E2E – CLI

on:
  push:
    branches: [master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "tests/e2e/cli/**"
      - "tests/e2e/common/**"
      - ".github/workflows/e2e-cli.yml"
  pull_request:
    branches: [master]
    paths:
      - "crates/cfgd/**"
      - "crates/cfgd-core/**"
      - "tests/e2e/cli/**"
      - "tests/e2e/common/**"
      - ".github/workflows/e2e-cli.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  exhaustive-native:
    name: "Exhaustive CLI (Native)"
    runs-on: arc-cfgd
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build cfgd
        run: cargo build --release --bin cfgd

      - name: Install sops and age
        run: |
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen
          curl -fsSLo /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops

      - name: Run exhaustive tests
        env:
          NO_COLOR: "1"
          EDITOR: "true"
        run: bash tests/e2e/cli/scripts/run-exhaustive-tests.sh
