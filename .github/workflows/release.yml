name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional commit SHA or ref to tag. Defaults to default-branch HEAD.'
        required: false
        default: ''

permissions:
  contents: write
  packages: write
  id-token: write # MCP registry publish via github-oidc auth

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: Tag workspace
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.t.outputs.crates }}
      versions: ${{ steps.t.outputs.versions }}
      # Lock downstream checkouts to the exact commit CI validated, avoiding
      # a race if another push lands between CI completion and this job start.
      head_sha: ${{ github.event.workflow_run.head_sha || inputs.ref || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || github.sha }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - id: t
        # Binary pre-built by ci.yml's build-anodizer job; downloaded here
        # instead of rebuilding from source on every Linux release job.
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          args: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  determinism-check:
    name: Determinism (${{ matrix.crate }} / ${{ matrix.shard.label }})
    needs: tag
    if: needs.tag.result == 'success' && needs.tag.outputs.crates != '[]'
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.tag.outputs.crates) }}
        shard:
          - { os: ubuntu-latest,  label: linux,            targets: '' }
          - { os: macos-latest,   label: macos,            targets: '' }
          - { os: windows-latest, label: windows-x86_64,   targets: 'x86_64-pc-windows-msvc' }
          - { os: windows-latest, label: windows-aarch64,  targets: 'aarch64-pc-windows-msvc' }
    runs-on: ${{ matrix.shard.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.head_sha }}

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}

      - # from-branch: pinned to in-progress release-orchestration work; switch back to @v1 default after merge
        uses: tj-smith47/anodizer-action@v1
        with:
          from-branch: publisher-required-config
          auto-install: 'true'
          determinism: 'true'
          determinism-targets: ${{ matrix.shard.targets }}
          preserve-dist: 'true'
          shard-label: ${{ matrix.shard.label }}
          determinism-crate: ${{ matrix.crate }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.crate }}-${{ matrix.shard.label }}
          path: preserved-dist/
          if-no-files-found: error

      - name: Upload determinism report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-${{ matrix.crate }}-${{ matrix.shard.label }}
          path: |
            dist/run-*/determinism.json
            dist/run-*/drift-bins/**

  release:
    name: Publish Release
    needs: [tag, determinism-check]
    # Run even when determinism-check was skipped (library-only crate).
    if: ${{ !cancelled() && needs.tag.result == 'success' && needs.tag.outputs.crates != '[]' && (needs.determinism-check.result == 'success' || needs.determinism-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.head_sha }}

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          # All crates' shards merge into dist/<crate>/... — each crate's
          # tarball is self-contained in its <crate>/ subdir thanks to the
          # harness's per-crate preserve layout (--crate <name> on
          # check determinism). No context.json collision.
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Run anodizer release
        uses: tj-smith47/anodizer-action@v1
        with:
          from-artifact: anodizer-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          auto-install: 'true'
          # Artifacts already in dist/ from the step above; action's built-in
          # download (which matches dist-* globally) is intentionally skipped.
          download-dist: 'false'
          docker-registry: 'ghcr.io'
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          # No --crate: anodize iterates per-crate subdirs in dist/ in topo order.
          args: release --publish-only
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          NIX_PKGS_TOKEN: ${{ secrets.NIX_PKGS_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}

      # Bot reads .krew.yaml that anodizer just wrote in the previous step
      # and opens the krew-index PR. Must run in the same job, after
      # anodizer publishes the GitHub Release — addURIAndSha fetches each
      # asset's bytes to compute SHAs.
      - name: Update krew-index via krew-release-bot
        if: contains(fromJson(needs.tag.outputs.crates), 'cfgd')
        uses: rajatjindal/krew-release-bot@v0.0.46
        with:
          krew_template_file: .krew.yaml

  # --- Helm chart publish ---
  helm-chart:
    name: Publish Helm chart
    needs: [tag, release]
    if: needs.tag.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.head_sha }}
      - uses: azure/setup-helm@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push Helm chart
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions).cfgd }}"
          helm package chart/cfgd --version "$VERSION" --app-version "$VERSION"
          helm push "cfgd-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

  # --- Crossplane function publish ---
  crossplane-function:
    name: Publish Crossplane function
    needs: [tag, release]
    if: needs.tag.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.head_sha }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image tarball
        uses: docker/build-push-action@v6
        with:
          context: function-cfgd
          file: function-cfgd/Dockerfile
          platforms: linux/${{ matrix.arch }}
          target: image
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=function-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=function-${{ matrix.arch }}
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - name: Build xpkg
        run: |
          ./crossplane xpkg build \
            --package-file=${{ matrix.arch }}.xpkg \
            --package-root=function-cfgd/package/ \
            --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar
      - uses: actions/upload-artifact@v4
        with:
          name: xpkg-${{ matrix.arch }}
          path: "*.xpkg"

  crossplane-push:
    name: Push Crossplane function
    needs: [tag, crossplane-function]
    if: needs.tag.result == 'success' && needs.crossplane-function.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: xpkg-*
          merge-multiple: true
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push xpkg
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions).cfgd }}"
          ./crossplane --verbose xpkg push \
            --package-files $(echo *.xpkg | tr ' ' ,) \
            ghcr.io/${{ github.repository_owner }}/function-cfgd:v${VERSION}

  # --- OLM bundle publish ---
  olm-bundle:
    name: Publish OLM bundle
    needs: [tag, release]
    if: needs.tag.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd-operator')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.head_sha }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CSV version and image references
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions)['cfgd-operator'] }}"
          CSV="ecosystem/olm/manifests/cfgd-operator.clusterserviceversion.yaml"
          if [ ! -f "$CSV" ]; then
            echo "::error::OLM CSV not found: $CSV"
            exit 1
          fi
          sed -i "s|cfgd-operator\.v[0-9.]*|cfgd-operator.v${VERSION}|g" "$CSV"
          sed -i "s|cfgd-operator:v[0-9.]*|cfgd-operator:v${VERSION}|g" "$CSV"
      - name: Build and push OLM bundle image
        uses: docker/build-push-action@v6
        with:
          context: ecosystem/olm
          file: ecosystem/olm/bundle.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cfgd-operator-bundle:v${{ fromJson(needs.tag.outputs.versions)['cfgd-operator'] }}
