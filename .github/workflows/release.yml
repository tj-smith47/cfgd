name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional commit SHA or ref to tag. Defaults to default-branch HEAD.'
        required: false
        default: ''

permissions:
  contents: write
  packages: write
  id-token: write # MCP registry publish via github-oidc auth; also OIDC for SLSA attestation
  attestations: write # mint SLSA build provenance (attestations.enabled, subjects mode)

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ANODIZER_VERSION: v0.10.0
  # Pinned + checksum-verified Crossplane CLI (crank). The crossplane/crossplane
  # install.sh is unpinned (always "current") and performs NO checksum check on
  # the raw `bin/` binary, so a network blip yields a truncated/empty
  # `./crossplane` that the xpkg build+push steps then treat as a working CLI.
  # Both crossplane jobs instead download the exact binary for CROSSPLANE_VERSION
  # from the same CDN the official install.sh uses and verify it against
  # CROSSPLANE_SHA256 below before running it.
  #
  # The hash is pinned HERE, not taken from the CDN's sidecar crank.sha256:
  # that published file is the bundle/ tarball's manifest hash and matches
  # neither the raw bin/ binary nor the tarball itself (upstream install.sh
  # deletes it unchecked). Pinning the real binary hash in-repo is the only
  # value that actually gates this download. Recompute on a version bump:
  #   curl -fsSL https://releases.crossplane.io/stable/<ver>/bin/linux_amd64/crank | sha256sum
  CROSSPLANE_VERSION: v2.3.2
  CROSSPLANE_SHA256: 42ce17e97dff7ea28b624bf23cde836abb0783d07c5e02fc6de08f67dbd509eb

jobs:
  tag:
    name: Tag workspace
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.t.outputs.crates }}
      versions: ${{ steps.t.outputs.versions }}
      # The released crates intersected with the binary trio
      # (cfgd / cfgd-csi / cfgd-operator), as a JSON array. Drives the
      # `publish-trio` matrix so ONLY tagged trio crates get a leg — a
      # partial-workspace release fans out exactly the crates that bumped.
      # `matrix.crate` is unavailable in a job-level `if:` (evaluated before
      # matrix expansion), so per-leg gating MUST be done by shaping the
      # matrix here rather than with a `contains(crates, matrix.crate)` guard.
      trio: ${{ steps.trio.outputs.list }}
      # SHA the freshly-pushed tags point at. When anodizer tag creates a
      # bump commit, this is that commit's SHA (HEAD moved forward by one
      # during the tag step); when the manifests were already at target
      # and no bump was needed, this falls through to the CI-validated
      # workflow_run SHA. Downstream jobs check out this SHA so their
      # tree matches what the tags point at — release --publish-only
      # asserts HEAD == tag and would error otherwise.
      head_sha: ${{ steps.post_tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || github.sha }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - id: t
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          args: tag --changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - id: post_tag
        # Capture the HEAD that anodizer tag landed on. After a successful
        # tag run, HEAD points at either the new bump commit (if manifests
        # moved) or the original CI-validated SHA (if no bump was needed).
        # Either way, the freshly-pushed tags point at this SHA, so
        # downstream checkouts must use it instead of the workflow_run
        # head_sha that was current at job start.
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - id: trio
        # Intersect the released crates with the binary trio so the
        # publish-trio matrix carries only the crates that actually bumped.
        # `A - (A - $all)` is jq's set-intersection idiom: it keeps the trio
        # whitelist's own order and drops anything not in $all, yielding a
        # compact JSON array (`["cfgd","cfgd-operator"]`, or `[]`).
        env:
          CRATES: ${{ steps.t.outputs.crates }}
        run: |
          list="$(jq -cn --argjson all "$CRATES" \
            '["cfgd","cfgd-csi","cfgd-operator"] - (["cfgd","cfgd-csi","cfgd-operator"] - $all)')"
          echo "list=$list" >> "$GITHUB_OUTPUT"

  determinism-check:
    name: Determinism (${{ matrix.crate }})
    needs: tag
    if: needs.tag.result == 'success' && needs.tag.outputs.crates != '[]'
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.tag.outputs.crates) }}
    # Reusable workflow: parent matrix has one entry per crate; the
    # 4 OS shards are nested inside determinism-shards.yml so the
    # Actions run summary groups all of a crate's shards under one
    # parent line instead of fanning 4×N rows out flat.
    uses: ./.github/workflows/determinism-shards.yml
    with:
      crate: ${{ matrix.crate }}
      head_sha: ${{ needs.tag.outputs.head_sha }}
    secrets: inherit

  # cfgd-crd publishes FIRST and in isolation (--crate cfgd-crd). cfgd-core's
  # `crd` feature depends on cfgd-crd and polls crates.io for its pinned
  # cfgd-crd version via `publish.cargo.wait_for_workspace_deps` (enabled in
  # .anodizer.yaml); ordering the crd publish ahead of cfgd-core means that
  # poll resolves promptly instead of racing the sparse-index propagation.
  # Gated on cfgd-crd actually being in this release's tag set — a release that
  # bumps only cfgd-core / cfgd / cfgd-csi / cfgd-operator skips this job, and
  # publish-core's `needs: publish-crd` then resolves as skipped (publish-core's
  # `if:` does not require publish-crd success, so it still runs).
  publish-crd:
    name: Publish cfgd-crd
    needs: [tag, determinism-check]
    # Run even when determinism-check was skipped (cfgd-crd is library-only and
    # produces no binaries to determinism-check).
    if: ${{ !cancelled() && needs.tag.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd-crd') && (needs.determinism-check.result == 'success' || needs.determinism-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.head_sha }}

      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"

      - name: Download all dist artifacts
        uses: actions/download-artifact@v8
        with:
          # All crates' shards merge into dist/<crate>/... — each crate's
          # tarball is self-contained in its <crate>/ subdir thanks to the
          # harness's per-crate preserve layout (--crate <name> on
          # check determinism). No context.json collision.
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Run anodizer release (cfgd-crd)
        id: release
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          auto-install: 'true'
          # Artifacts already in dist/ from the step above; action's built-in
          # download (which matches dist-* globally) is intentionally skipped.
          download-dist: 'false'
          docker-registry: 'ghcr.io'
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          args: release --publish-only --crate cfgd-crd
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          NIX_PKGS_TOKEN: ${{ secrets.NIX_PKGS_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

      - name: Rollback on release failure
        if: (failure() || cancelled()) && steps.release.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: anodizer tag rollback "${{ needs.tag.outputs.head_sha }}"

  # cfgd-core publishes after cfgd-crd and in isolation (--crate cfgd-core). The
  # three binary crates depend on cfgd-core and each polls crates.io for its
  # pinned cfgd-core version via `publish.cargo.wait_for_workspace_deps`
  # (enabled in .anodizer.yaml); ordering the core publish ahead of the trio
  # means that poll resolves promptly instead of racing the sparse-index
  # propagation. Gated on cfgd-core actually being in this release's tag set —
  # a release that bumps only cfgd / cfgd-csi / cfgd-operator skips this job,
  # and the trio's `needs: publish-core` then resolves as skipped (the trio's
  # `if:` does not require publish-core success, so it still runs). `needs:
  # publish-crd` orders core after crd but does NOT require its success in the
  # `if:` — a cfgd-core-only release (no cfgd-crd bump) skips publish-crd and
  # this job still runs (the already-published cfgd-crd on crates.io satisfies
  # the dependency poll).
  publish-core:
    name: Publish cfgd-core
    needs: [tag, determinism-check, publish-crd]
    # Run even when determinism-check was skipped (cfgd-core is library-only and
    # produces no binaries to determinism-check) and when publish-crd was skipped
    # (a cfgd-core-only release does not bump cfgd-crd).
    if: ${{ !cancelled() && needs.tag.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd-core') && (needs.determinism-check.result == 'success' || needs.determinism-check.result == 'skipped') && (needs.publish-crd.result == 'success' || needs.publish-crd.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.head_sha }}

      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"

      - name: Download all dist artifacts
        uses: actions/download-artifact@v8
        with:
          # All crates' shards merge into dist/<crate>/... — each crate's
          # tarball is self-contained in its <crate>/ subdir thanks to the
          # harness's per-crate preserve layout (--crate <name> on
          # check determinism). No context.json collision.
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Run anodizer release (cfgd-core)
        id: release
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          auto-install: 'true'
          # Artifacts already in dist/ from the step above; action's built-in
          # download (which matches dist-* globally) is intentionally skipped.
          download-dist: 'false'
          docker-registry: 'ghcr.io'
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          args: release --publish-only --crate cfgd-core
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          NIX_PKGS_TOKEN: ${{ secrets.NIX_PKGS_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

      - name: Rollback on release failure
        if: (failure() || cancelled()) && steps.release.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: anodizer tag rollback "${{ needs.tag.outputs.head_sha }}"

  # cfgd / cfgd-csi / cfgd-operator publish IN PARALLEL after cfgd-core. Each
  # matrix leg runs a single-crate publish (--crate <name>) and is gated on
  # that crate being in this release's tag set, so a partial-workspace release
  # only fans out the crates that actually bumped. `needs: publish-core` orders
  # the legs after core but does NOT require its success in the `if:` — when a
  # release bumps a trio crate without cfgd-core, publish-core is skipped and
  # the leg still runs (the already-published cfgd-core on crates.io satisfies
  # the dependency poll).
  publish-trio:
    name: Publish ${{ matrix.crate }}
    needs: [tag, determinism-check, publish-core]
    # Per-leg gating is done by the `tag.trio` matrix (only tagged trio crates
    # get a leg), NOT a `contains(crates, matrix.crate)` job-`if:` — `matrix`
    # is unavailable in a job-level `if:`. An empty `trio` (cfgd-core-only
    # release) yields a zero-leg matrix, so this whole job is skipped.
    if: ${{ !cancelled() && needs.tag.result == 'success' && needs.tag.outputs.trio != '[]' && (needs.determinism-check.result == 'success' || needs.determinism-check.result == 'skipped') && (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.tag.outputs.trio) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.head_sha }}

      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"

      - name: Download all dist artifacts
        uses: actions/download-artifact@v8
        with:
          # All crates' shards merge into dist/<crate>/... — each crate's
          # tarball is self-contained in its <crate>/ subdir thanks to the
          # harness's per-crate preserve layout (--crate <name> on
          # check determinism). No context.json collision.
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Run anodizer release (${{ matrix.crate }})
        id: release
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          auto-install: 'true'
          # cfgd publishes a snap (snapcrafts: publisher, nested under the
          # per-crate workspaces.cfgd block) and runs `alejandra` to format the
          # nix derivation (nix.formatter, same nesting). Neither tool ships on
          # GitHub runner images, and v0.9 env-preflight + v0.9.1's fail-loud
          # alejandra abort the release if either is missing. Install them
          # explicitly; additive with auto-install (harmless if it already
          # covers them).
          install: snapcraft,alejandra
          # Artifacts already in dist/ from the step above; action's built-in
          # download (which matches dist-* globally) is intentionally skipped.
          download-dist: 'false'
          docker-registry: 'ghcr.io'
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          args: release --publish-only --crate ${{ matrix.crate }}
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          NIX_PKGS_TOKEN: ${{ secrets.NIX_PKGS_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

      - name: Rollback on release failure
        if: (failure() || cancelled()) && steps.release.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: anodizer tag rollback "${{ needs.tag.outputs.head_sha }}"

  # --- Helm chart publish ---
  helm-chart:
    name: Publish Helm chart
    needs: [tag, publish-trio]
    # Require publish-trio to have actually succeeded: a Helm chart whose
    # appVersion points at a cfgd crate version that never reached crates.io
    # is a silently-broken release. `== 'success'` blocks both the failed-leg
    # case AND the skipped-trio case (a core-only release shapes an empty trio
    # matrix → publish-trio resolves `skipped` → this job must not push a chart
    # for a release that did not bump cfgd). The `contains(crates, cfgd)` guard
    # still scopes the chart push to releases that include the cfgd crate.
    if: ${{ !cancelled() && needs.tag.result == 'success' && needs.publish-trio.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.head_sha }}
      - uses: azure/setup-helm@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push Helm chart
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions).cfgd }}"
          helm package chart/cfgd --version "$VERSION" --app-version "$VERSION"
          helm push "cfgd-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

  # --- Crossplane function publish ---
  crossplane-function:
    name: Publish Crossplane function
    needs: [tag, publish-trio]
    # See helm-chart's `if:` — require publish-trio `== 'success'` so the
    # function image is never pushed for a release whose cfgd crate did not
    # actually publish (failed leg) or that did not bump cfgd at all (empty
    # trio matrix → skipped). The `contains(crates, cfgd)` guard scopes it.
    if: ${{ !cancelled() && needs.tag.result == 'success' && needs.publish-trio.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.head_sha }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image tarball
        uses: docker/build-push-action@v6
        with:
          context: function-cfgd
          file: function-cfgd/Dockerfile
          platforms: linux/${{ matrix.arch }}
          target: image
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=function-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=function-${{ matrix.arch }}
      - name: Install Crossplane CLI
        # Pinned + checksum-verified. Runner is ubuntu-latest (linux_amd64).
        # -f makes curl fail the step on any HTTP error instead of writing an
        # HTML/empty body; the explicit sha256sum -c against the in-repo
        # CROSSPLANE_SHA256 then aborts on any truncated/corrupt download
        # before the (non-functional) binary reaches the xpkg steps.
        run: |
          set -euo pipefail
          curl -fsSL "https://releases.crossplane.io/stable/${CROSSPLANE_VERSION}/bin/linux_amd64/crank" -o crossplane
          echo "${CROSSPLANE_SHA256}  crossplane" | sha256sum -c -
          chmod +x crossplane
          ./crossplane version --client
      - name: Build xpkg
        run: |
          ./crossplane xpkg build \
            --package-file=${{ matrix.arch }}.xpkg \
            --package-root=function-cfgd/package/ \
            --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar
      - uses: actions/upload-artifact@v7
        with:
          name: xpkg-${{ matrix.arch }}
          path: "*.xpkg"

  crossplane-push:
    name: Push Crossplane function
    needs: [tag, crossplane-function]
    if: needs.tag.result == 'success' && needs.crossplane-function.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: xpkg-*
          merge-multiple: true
      - name: Install Crossplane CLI
        # Pinned + checksum-verified. Runner is ubuntu-latest (linux_amd64).
        # -f makes curl fail the step on any HTTP error instead of writing an
        # HTML/empty body; the explicit sha256sum -c against the in-repo
        # CROSSPLANE_SHA256 then aborts on any truncated/corrupt download
        # before the (non-functional) binary reaches the xpkg steps.
        run: |
          set -euo pipefail
          curl -fsSL "https://releases.crossplane.io/stable/${CROSSPLANE_VERSION}/bin/linux_amd64/crank" -o crossplane
          echo "${CROSSPLANE_SHA256}  crossplane" | sha256sum -c -
          chmod +x crossplane
          ./crossplane version --client
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push xpkg
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions).cfgd }}"
          ./crossplane --verbose xpkg push \
            --package-files "$(echo *.xpkg | tr ' ' ,)" \
            ghcr.io/${{ github.repository_owner }}/function-cfgd:v${VERSION}

  # --- OLM bundle publish ---
  olm-bundle:
    name: Publish OLM bundle
    needs: [tag, publish-trio]
    # See helm-chart's `if:` — require publish-trio `== 'success'` so the OLM
    # bundle (whose CSV pins cfgd-operator:vX) is never pushed for a release
    # whose cfgd-operator crate did not actually publish (failed leg) or that
    # did not bump cfgd-operator at all (empty trio matrix → skipped). The
    # `contains(crates, cfgd-operator)` guard scopes it.
    if: ${{ !cancelled() && needs.tag.result == 'success' && needs.publish-trio.result == 'success' && contains(fromJson(needs.tag.outputs.crates), 'cfgd-operator') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.head_sha }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CSV version and image references
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions)['cfgd-operator'] }}"
          CSV="ecosystem/olm/manifests/cfgd-operator.clusterserviceversion.yaml"
          if [ ! -f "$CSV" ]; then
            echo "::error::OLM CSV not found: $CSV"
            exit 1
          fi
          sed -i "s|cfgd-operator\.v[0-9.]*|cfgd-operator.v${VERSION}|g" "$CSV"
          sed -i "s|cfgd-operator:v[0-9.]*|cfgd-operator:v${VERSION}|g" "$CSV"
      - name: Build and push OLM bundle image
        uses: docker/build-push-action@v6
        with:
          context: ecosystem/olm
          file: ecosystem/olm/bundle.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cfgd-operator-bundle:v${{ fromJson(needs.tag.outputs.versions)['cfgd-operator'] }}
