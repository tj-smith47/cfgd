name: Release

on:
  push:
    tags:
      - "v*"
      - "core-v*"
      - "operator-v*"
      - "csi-v*"

permissions:
  contents: write
  packages: write
  actions: read  # cross-workflow artifact download

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Must stay in sync with ci.yml's ANODIZE_REV so cached anodize binaries
  # produced by CI (anodize-linux artifact) match the binary release.yml
  # cargo-installs on macOS/Windows. Bump both together when upgrading.
  ANODIZE_REV: 68c9ef715071ba9dc44b938a2349731e487312ca

jobs:
  # Map the triggering tag to the anodize workspace being released.
  # cfgd is a 4-workspace monorepo; each workspace has its own tag prefix:
  #   v*          → cfgd (CLI)
  #   core-v*     → cfgd-core (library)
  #   operator-v* → cfgd-operator
  #   csi-v*      → cfgd-csi
  resolve-workspace:
    name: Resolve workspace from tag
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.map.outputs.workspace }}
    steps:
      - id: map
        run: |
          case "${GITHUB_REF_NAME}" in
            core-v*)     crate=cfgd-core ;;
            operator-v*) crate=cfgd-operator ;;
            csi-v*)      crate=cfgd-csi ;;
            v*)          crate=cfgd ;;
            *)           echo "::error::Unrecognized tag: ${GITHUB_REF_NAME}"; exit 1 ;;
          esac
          echo "workspace=$crate" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing crate '$crate' for tag ${GITHUB_REF_NAME}"

  build:
    name: Build (${{ matrix.os }})
    needs: resolve-workspace
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu
          - os: macos-latest
            targets: x86_64-apple-darwin,aarch64-apple-darwin
          - os: windows-latest
            targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}

      # Linux reuses the anodize binary uploaded by ci.yml's snapshot job
      # via cross-workflow artifact download.  macOS and Windows cargo-install
      # anodize inline — the cross-workflow artifact is Linux-only, and
      # cfgd isn't the anodize source repo so anodize-action's from-source
      # path (cargo build -p anodize in workdir) doesn't apply.
      - name: Run anodize release --split (Linux)
        if: runner.os == 'Linux'
        uses: tj-smith47/anodize-action@master
        with:
          from-artifact: anodize-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          install: zig,cargo-zigbuild,upx
          args: release --split --clean --crate ${{ needs.resolve-workspace.outputs.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Cache anodize binary (macOS/Windows)
        if: runner.os != 'Linux'
        id: anodize-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/anodize
            ~/.cargo/bin/anodize.exe
          key: anodize-${{ runner.os }}-${{ env.ANODIZE_REV }}

      - name: Install anodize (macOS/Windows)
        if: runner.os != 'Linux' && steps.anodize-cache.outputs.cache-hit != 'true'
        shell: bash
        run: cargo install --git https://github.com/tj-smith47/anodize --rev "$ANODIZE_REV" --locked anodize

      - name: Install release deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zig upx
          cargo install --locked cargo-zigbuild

      - name: Install release deps (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install zig upx -y --no-progress
          cargo install --locked cargo-zigbuild

      - name: Run anodize release --split (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: anodize release --split --clean --crate "${CRATE}"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CRATE: ${{ needs.resolve-workspace.outputs.workspace }}

      - name: Upload split artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/

  release:
    name: Publish Release
    needs: [resolve-workspace, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}

      # Download all split artifacts into dist/ before running anodize --merge.
      - name: Download split artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Verify split artifacts
        run: |
          echo "Split contexts found:"
          find dist -name context.json -type f
          COUNT=$(find dist -name context.json -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No split context files found in dist/"
            exit 1
          fi
          echo "Found $COUNT split context(s)"

      - name: Log in to GHCR for docker stage
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Reuse the anodize binary from ci.yml's snapshot job via cross-workflow
      # artifact download — no rebuild.
      - name: Run anodize release --merge
        uses: tj-smith47/anodize-action@master
        with:
          from-artifact: anodize-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          install: nfpm,makeself,cosign
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          args: release --merge --crate ${{ needs.resolve-workspace.outputs.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  # --- Helm chart publish ---
  # Anodize doesn't (yet) have a built-in helm publisher, so we publish the
  # cfgd helm chart in a follow-up job.  When anodize gains helm support this
  # job can fold into the merge step above.
  helm-chart:
    name: Publish Helm chart
    needs: [resolve-workspace, release]
    if: needs.resolve-workspace.outputs.workspace == 'cfgd'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push Helm chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package chart/cfgd --version "$VERSION" --app-version "$VERSION"
          helm push "cfgd-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

  # --- Crossplane function publish ---
  # Same story as helm: anodize doesn't yet have a Crossplane xpkg publisher.
  crossplane-function:
    name: Publish Crossplane function
    needs: [resolve-workspace, release]
    if: needs.resolve-workspace.outputs.workspace == 'cfgd'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image tarball
        uses: docker/build-push-action@v6
        with:
          context: function-cfgd
          file: function-cfgd/Dockerfile
          platforms: linux/${{ matrix.arch }}
          target: image
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=function-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=function-${{ matrix.arch }}
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - name: Build xpkg
        run: |
          ./crossplane xpkg build \
            --package-file=${{ matrix.arch }}.xpkg \
            --package-root=function-cfgd/package/ \
            --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar
      - uses: actions/upload-artifact@v4
        with:
          name: xpkg-${{ matrix.arch }}
          path: "*.xpkg"

  crossplane-push:
    name: Push Crossplane function
    needs: crossplane-function
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: xpkg-*
          merge-multiple: true
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push xpkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./crossplane --verbose xpkg push \
            --package-files $(echo *.xpkg | tr ' ' ,) \
            ghcr.io/${{ github.repository_owner }}/function-cfgd:v${VERSION}

  # --- OLM bundle publish ---
  # Anodize doesn't yet have an OLM bundle publisher.
  olm-bundle:
    name: Publish OLM bundle
    needs: [resolve-workspace, release]
    if: needs.resolve-workspace.outputs.workspace == 'cfgd-operator'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CSV version and image references
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          CSV="ecosystem/olm/manifests/cfgd-operator.clusterserviceversion.yaml"
          sed -i "s|cfgd-operator\.v[0-9.]*|cfgd-operator.${TAG}|g" "$CSV"
          sed -i "s|cfgd-operator:v[0-9.]*|cfgd-operator:${TAG}|g" "$CSV"
      - name: Build and push OLM bundle image
        uses: docker/build-push-action@v6
        with:
          context: ecosystem/olm
          file: ecosystem/olm/bundle.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cfgd-operator-bundle:${{ github.ref_name }}
