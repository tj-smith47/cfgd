name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            name: darwin-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libsqlite3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin cfgd

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="cfgd-${VERSION#v}-${{ matrix.name }}.tar.gz"
          tar -czf "$ARCHIVE" -C target/${{ matrix.target }}/release cfgd
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: cfgd-${{ matrix.name }}
          path: ${{ env.ARCHIVE }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sha256sum cfgd-*.tar.gz > "cfgd-${VERSION#v}-checksums.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: "*.txt"

  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: RELEASE_NOTES.md

  release:
    needs: [build, checksums, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            cfgd-*.tar.gz
            *-checksums.txt
          generate_release_notes: false

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/cfgd-operator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.operator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  crossplane-function:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime image tarball
        uses: docker/build-push-action@v6
        with:
          context: function-cfgd
          file: function-cfgd/Dockerfile
          platforms: linux/${{ matrix.arch }}
          target: image
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=function-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=function-${{ matrix.arch }}

      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh

      - name: Build xpkg
        run: |
          ./crossplane xpkg build \
            --package-file=${{ matrix.arch }}.xpkg \
            --package-root=function-cfgd/package/ \
            --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar

      - uses: actions/upload-artifact@v4
        with:
          name: xpkg-${{ matrix.arch }}
          path: "*.xpkg"

  crossplane-push:
    needs: crossplane-function
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: xpkg-*
          merge-multiple: true

      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push xpkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./crossplane --verbose xpkg push \
            --package-files $(echo *.xpkg | tr ' ' ,) \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/function-cfgd:v${VERSION}
