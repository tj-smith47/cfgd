name: Release

on:
  push:
    tags:
      - "v*"
      - "core-v*"
      - "operator-v*"
      - "csi-v*"

permissions:
  contents: write
  packages: write
  actions: read  # cross-workflow artifact download

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Map tag → crate name + whether it has binary builds via anodize resolve-tag.
  resolve:
    name: Resolve workspace
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.anodize.outputs.workspace }}
      has-builds: ${{ steps.anodize.outputs.has-builds }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: tj-smith47/anodize-action@master
        id: anodize
        with:
          from-artifact: anodize-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          resolve-workspace: 'true'
          install-only: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  build:
    name: Build (${{ matrix.os }})
    needs: resolve
    if: needs.resolve.outputs.has-builds == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu
            anodize_artifact: anodize-linux
          - os: macos-latest
            targets: x86_64-apple-darwin,aarch64-apple-darwin
            anodize_artifact: anodize-macos
          - os: windows-latest
            targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc
            anodize_artifact: anodize-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}

      - name: Run anodize release --split
        uses: tj-smith47/anodize-action@master
        with:
          from-artifact: ${{ matrix.anodize_artifact }}
          artifact-run-id: auto
          artifact-workflow: ci.yml
          install: zig,cargo-zigbuild,upx
          upload-dist: 'true'
          args: release --verbose --split --clean --crate ${{ needs.resolve.outputs.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  release:
    name: Publish Release
    needs: [resolve, build]
    # Run even when build was skipped (library-only crate).
    if: ${{ !cancelled() && needs.resolve.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-publish
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ github.token }}

      # --merge is only valid when split build artifacts exist (binary crates).
      # Library-only crates run the full pipeline in one shot.
      - name: Run anodize release
        uses: tj-smith47/anodize-action@master
        with:
          from-artifact: anodize-linux
          artifact-run-id: auto
          artifact-workflow: ci.yml
          install: ${{ needs.resolve.outputs.has-builds == 'true' && 'nfpm,makeself,snapcraft,rpmbuild,cosign' || '' }}
          download-dist: ${{ needs.resolve.outputs.has-builds }}
          docker-registry: ${{ needs.resolve.outputs.has-builds == 'true' && 'ghcr.io' || '' }}
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          args: >-
            release --verbose
            ${{ needs.resolve.outputs.has-builds == 'true' && '--merge' || '' }}
            --crate ${{ needs.resolve.outputs.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
          NIX_PKGS_TOKEN: ${{ secrets.NIX_PKGS_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  # --- Helm chart publish ---
  helm-chart:
    name: Publish Helm chart
    needs: [resolve, release]
    if: needs.resolve.outputs.workspace == 'cfgd'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push Helm chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package chart/cfgd --version "$VERSION" --app-version "$VERSION"
          helm push "cfgd-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

  # --- Crossplane function publish ---
  crossplane-function:
    name: Publish Crossplane function
    needs: [resolve, release]
    if: needs.resolve.outputs.workspace == 'cfgd'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image tarball
        uses: docker/build-push-action@v6
        with:
          context: function-cfgd
          file: function-cfgd/Dockerfile
          platforms: linux/${{ matrix.arch }}
          target: image
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=function-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=function-${{ matrix.arch }}
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - name: Build xpkg
        run: |
          ./crossplane xpkg build \
            --package-file=${{ matrix.arch }}.xpkg \
            --package-root=function-cfgd/package/ \
            --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar
      - uses: actions/upload-artifact@v4
        with:
          name: xpkg-${{ matrix.arch }}
          path: "*.xpkg"

  crossplane-push:
    name: Push Crossplane function
    needs: crossplane-function
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: xpkg-*
          merge-multiple: true
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push xpkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./crossplane --verbose xpkg push \
            --package-files $(echo *.xpkg | tr ' ' ,) \
            ghcr.io/${{ github.repository_owner }}/function-cfgd:v${VERSION}

  # --- OLM bundle publish ---
  olm-bundle:
    name: Publish OLM bundle
    needs: [resolve, release]
    if: needs.resolve.outputs.workspace == 'cfgd-operator'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CSV version and image references
        run: |
          VERSION="${GITHUB_REF_NAME#operator-v}"
          CSV="ecosystem/olm/manifests/cfgd-operator.clusterserviceversion.yaml"
          if [ ! -f "$CSV" ]; then
            echo "::error::OLM CSV not found: $CSV"
            exit 1
          fi
          sed -i "s|cfgd-operator\.v[0-9.]*|cfgd-operator.v${VERSION}|g" "$CSV"
          sed -i "s|cfgd-operator:v[0-9.]*|cfgd-operator:v${VERSION}|g" "$CSV"
      - name: Build and push OLM bundle image
        uses: docker/build-push-action@v6
        with:
          context: ecosystem/olm
          file: ecosystem/olm/bundle.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cfgd-operator-bundle:${{ github.ref_name }}
