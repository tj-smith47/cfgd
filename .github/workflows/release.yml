name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional commit SHA or ref to tag. Defaults to default-branch HEAD.'
        required: false
        default: ''

# Read-only default; each job elevates to exactly what it publishes with.
# The publish jobs carry the full write set (contents for GH Releases,
# packages for ghcr, id-token for MCP-registry OIDC + keyless cosign,
# attestations for SLSA provenance); chart/function/bundle jobs push only
# ghcr images.
permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # SSOT: repo variable (gh variable set ANODIZER_VERSION), shared by every
  # workflow that installs anodizer — bump it once, all workflows follow.
  ANODIZER_VERSION: ${{ vars.ANODIZER_VERSION }}
  # protoc + crossplane pins live as input defaults in their composite
  # actions (.github/actions/setup-protoc, .github/actions/setup-crossplane)
  # so version and checksum move together in one file.

jobs:
  # `release --publish-only` suppresses anodizer's auto-preflight, so a missing
  # or rotated publisher secret would otherwise first surface mid-publish — after
  # `tag` has pushed git tags and earlier crates have published. Gate the tag
  # push on a deterministic secret-presence check across every publisher.
  preflight:
    name: Preflight secrets
    # The bump-message guard breaks a self-retrigger loop: advance-master
    # fast-forwards master onto the bump commit with GH_PAT (PAT pushes DO
    # trigger workflows), CI runs on it, and its success would fire a second
    # Release run whose tag job always dies on a non-fast-forward push (tags
    # already exist). CI itself still runs on the bump commit for
    # master-badge health; only the spurious Release is culled.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !startsWith(github.event.workflow_run.head_commit.message, 'chore(release): bump'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # The runtime injects ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN only into jobs
      # that can mint OIDC tokens; anodizer's preflight validates those env
      # vars on behalf of the MCP-registry publisher (github-oidc auth), so
      # without this the check fails even though every secret is present.
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || github.sha }}

      - name: Validate publisher secrets
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          docker-registry: 'ghcr.io'
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          apk-private-key: ${{ secrets.APK_PRIVATE_KEY }}
          args: release --preflight-secrets
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          KREW_INDEX_TOKEN: ${{ secrets.KREW_INDEX_TOKEN }}
          NIX_PKGS_TOKEN: ${{ secrets.NIX_PKGS_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}

  tag:
    name: Tag workspace
    needs: preflight
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.t.outputs.crates }}
      versions: ${{ steps.t.outputs.versions }}
      # The released crates intersected with the binary trio
      # (cfgd / cfgd-csi / cfgd-operator), as a JSON array. Drives the
      # `publish-trio` matrix so ONLY tagged trio crates get a leg — a
      # partial-workspace release fans out exactly the crates that bumped.
      # `matrix.crate` is unavailable in a job-level `if:` (evaluated before
      # matrix expansion), so per-leg gating MUST be done by shaping the
      # matrix here rather than with a `contains(crates, matrix.crate)` guard.
      trio: ${{ steps.trio.outputs.list }}
      # Determinism matrix: one entry per released crate with the OS shards
      # it needs — the binary trio across all three OSes, the library crates
      # (cfgd-crd / cfgd-core) linux-only (their preserved dist is source
      # packaging, OS-independent, but publish-only still requires one).
      det_matrix: ${{ steps.trio.outputs.det }}
      # SHA the freshly-pushed tags point at. When anodizer tag creates a
      # bump commit, this is that commit's SHA (HEAD moved forward by one
      # during the tag step); when the manifests were already at target
      # and no bump was needed, this falls through to the CI-validated
      # workflow_run SHA. Downstream jobs check out this SHA so their
      # tree matches what the tags point at — release --publish-only
      # asserts HEAD == tag and would error otherwise.
      head_sha: ${{ steps.post_tag.outputs.sha }}
    steps:
      - name: Check out CI-validated commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || github.sha }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # A run cancelled (or runner lost) after the tag push but before
      # advance-master leaves the bump commit reachable ONLY via the tags;
      # the next release then wedges on a non-fast-forward tag push with
      # nothing naming the cause. Detect the stranded state up front and
      # fail with the exact reconcile command.
      - name: Guard against a stranded bump commit
        run: |
          git fetch --tags --force --quiet origin
          latest="$(git tag --list 'v[0-9]*' | sort -V | tail -n1)"
          if [ -z "$latest" ]; then
            exit 0
          fi
          sha="$(git rev-parse "${latest}^{commit}")"
          if ! git merge-base --is-ancestor "$sha" HEAD; then
            echo "::error::release tag ${latest} (${sha}) is not an ancestor of the release ref: a prior run was cancelled between the tag push and advance-master, stranding the bump commit — or this run targets a ref behind the latest release tag. Reconcile with: git push origin ${sha}:refs/heads/master  — then re-run this workflow."
            exit 1
          fi

      # Deferred-branch pattern: push only the tags now; master advances
      # onto the bump commit in advance-master (last job), after every
      # publish leg has succeeded — a failed release advances neither
      # master nor publishes. Requires anodizer >= v0.16.0, where a bare
      # `tag` is fully local in every mode and pushing is explicit
      # (--push / --push-tags-only); under the old implicit-push default
      # this flag does not exist and the step fails loud.
      - name: Run anodizer tag
        id: t
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          args: tag --changelog --push-tags-only
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # Capture the HEAD that anodizer tag landed on. After a successful
      # tag run, HEAD points at either the new bump commit (if manifests
      # moved) or the original CI-validated SHA (if no bump was needed).
      # Either way, the freshly-pushed tags point at this SHA, so
      # downstream checkouts must use it instead of the workflow_run
      # head_sha that was current at job start. Until advance-master runs,
      # the bump commit is reachable ONLY via the tags — it is not on
      # master yet.
      - name: Capture tagged HEAD SHA
        id: post_tag
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Intersect the released crates with the binary trio so the
      # publish-trio matrix carries only the crates that actually bumped.
      # `A - (A - $all)` is jq's set-intersection idiom: it keeps the
      # whitelist's own order and drops anything not in $all, yielding a
      # compact JSON array (`["cfgd","cfgd-operator"]`, or `[]`). The
      # determinism matrix pairs every released crate with its shard set:
      # library crates linux-only, trio crates all three OSes.
      - name: Shape publish and determinism matrices
        id: trio
        env:
          CRATES: ${{ steps.t.outputs.crates }}
        run: |
          list="$(jq -cn --argjson all "$CRATES" \
            '["cfgd","cfgd-csi","cfgd-operator"] - (["cfgd","cfgd-csi","cfgd-operator"] - $all)')"
          echo "list=$list" >> "$GITHUB_OUTPUT"
          det="$(jq -cn --argjson all "$CRATES" --argjson trio "$list" '
            [(["cfgd-crd","cfgd-core"] - (["cfgd-crd","cfgd-core"] - $all))[]
               | {crate: ., os_labels: "[\"linux\"]"}]
            + [$trio[] | {crate: ., os_labels: "[\"linux\",\"macos\",\"windows\"]"}]')"
          echo "det=$det" >> "$GITHUB_OUTPUT"

  determinism-check:
    name: Determinism (${{ matrix.crate }})
    needs: tag
    # Every released crate gets a determinism lane: the binary trio shards
    # across all three OSes; the library crates run a single linux shard
    # whose preserved (source-package) dist the dispatched publish-oidc leg
    # restores to re-emit binstall metadata.
    if: needs.tag.result == 'success' && needs.tag.outputs.det_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.tag.outputs.det_matrix) }}
    # Reusable workflow: parent matrix has one entry per crate; the
    # OS shards are nested inside determinism-shards.yml so the Actions
    # run summary groups all of a crate's shards under one parent line
    # instead of fanning them flat.
    # Explicit grant: a called workflow may only downgrade its caller's
    # permissions, and the shards declare packages: read — absent from this
    # workflow's read-only default.
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/determinism-shards.yml
    with:
      crate: ${{ matrix.crate }}
      head_sha: ${{ needs.tag.outputs.head_sha }}
      os-labels: ${{ matrix.os_labels }}
    secrets: inherit

  # The crates.io publish for EVERY crate runs in the dispatched
  # publish-oidc.yml, NOT here: crates.io Trusted Publishing rejects the
  # workflow_run event this release fires on (and the reusable publish-crate.yml
  # inherits it), so no job here can present an OIDC event_name crates.io
  # accepts — only a workflow_dispatch run can. anodizer topologically sorts the
  # workspace, so one `release --publish-only --publishers cargo` publishes
  # cfgd-crd → cfgd-core → the binary trio in crates.io dependency order
  # internally, replacing the hand-ordered publish-crd → publish-core → trio
  # cargo legs. This job dispatches that workflow, polls it to a verdict, and rolls
  # back on cargo failure. It runs cargo-LAST, after publish-trio: anodizer's
  # cargo publisher refuses to burn a binary crate until its GitHub release +
  # assets exist (the embedded binstall pkg_url must not 404), and crates.io is
  # append-only while the release + tags are deletable — so the irreversible leg
  # goes last, its rollback tearing down the reversible tags + the releases the
  # trio created. (The v0.6.0 partial-publish was this ordering inverted.)
  dispatch-oidc:
    name: Publish crates.io (dispatch OIDC)
    needs: [tag, determinism-check, publish-trio]
    # A skipped trio is legal (library-only release: no binary assets, no gate),
    # so gate on trio-not-failed, not trio-success.
    if: >-
      ${{ !cancelled() && needs.tag.result == 'success' &&
          needs.tag.outputs.crates != '[]' &&
          needs.determinism-check.result == 'success' &&
          needs.publish-trio.result != 'failure' &&
          needs.publish-trio.result != 'cancelled' }}
    permissions:
      contents: write # roll back tags + the trio's GitHub releases on cargo failure
      actions: write # dispatch publish-oidc.yml via the Actions API
    runs-on: ubuntu-latest
    steps:
      - name: Check out release commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.head_sha }}

      # rollback-on-failure shells out to anodizer; install it up front so the
      # rollback step has it even though this job runs no anodizer-action itself.
      - name: Install anodizer
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          install-only: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Dispatch publish-oidc.yml and wait for its verdict
        id: dispatch
        uses: ./.github/actions/dispatch-and-wait
        with:
          workflow: publish-oidc.yml
          ref: master
          github-token: ${{ secrets.GH_PAT }}
          # The bump commit is reachable only via the tags until advance-master;
          # publish-oidc checks out `sha` directly. dist_run_id is THIS release
          # run, whose determinism-check uploaded the preserved dist.
          inputs: |
            sha=${{ needs.tag.outputs.head_sha }}
            dist_run_id=${{ github.run_id }}

      - name: Roll back tags + the trio's GitHub releases on cargo failure
        if: ${{ (failure() || cancelled()) && steps.dispatch.outcome != 'skipped' }}
        uses: ./.github/actions/rollback-on-failure
        with:
          head_sha: ${{ needs.tag.outputs.head_sha }}
          gh_token: ${{ secrets.GH_PAT }}

  # cfgd / cfgd-csi / cfgd-operator publish their binary distribution IN
  # PARALLEL — this is the FIRST publish job, ahead of the crates.io publish
  # (dispatch-oidc), because each binary crate's `github-release` publisher
  # creates the GitHub release + assets that cargo's verify-release gate then
  # requires. Each matrix leg runs a single-crate publish
  # (--crate <name> --skip cargo — cargo is the dispatch-oidc leg's job) and is
  # gated on that crate being in this release's tag set, so a partial-workspace
  # release only fans out the crates that actually bumped.
  publish-trio:
    name: Publish ${{ matrix.crate }}
    needs: [tag, determinism-check]
    # Per-leg gating is done by the `tag.trio` matrix (only tagged trio crates
    # get a leg), NOT a `contains(crates, matrix.crate)` job-`if:` — `matrix`
    # is unavailable in a job-level `if:`. An empty `trio` (library-only
    # release) yields a zero-leg matrix, so this whole job is skipped and
    # dispatch-oidc still publishes the libraries (they have no binary assets
    # and no verify-release gate).
    if: ${{ !cancelled() && needs.tag.result == 'success' && needs.tag.outputs.trio != '[]' && needs.determinism-check.result == 'success' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.tag.outputs.trio) }}
    uses: ./.github/workflows/publish-crate.yml
    with:
      crate: ${{ matrix.crate }}
      head_sha: ${{ needs.tag.outputs.head_sha }}
      install: alejandra
      # Operator escape-hatch (SSOT repo variable, empty by default): skip
      # publishers a prior partial run already submitted so a recovery re-cut
      # doesn't re-drive them (chocolatey moderation block / duplicate PRs).
      skip: ${{ vars.RELEASE_SKIP_PUBLISHERS }}
      # rollback stays at its false default: these legs run concurrently, so
      # rollback is the dedicated rollback-trio job below.
    secrets: inherit

  # Trio rollback runs ONCE, after every leg settles — never inside a leg.
  # With fail-fast off, an in-leg rollback would delete this release's tags
  # while sibling legs are still publishing (tag-vs-HEAD failures mid-run),
  # and two failed legs would race two concurrent rollback pushes. Trio runs
  # before any crates.io burn, so this cleanly deletes the tags + the releases
  # the legs created. dispatch-oidc (cargo, later, no concurrent sibling) keeps
  # its own in-job rollback; the two are mutually exclusive (this fires only on
  # trio failure, which skips dispatch-oidc).
  rollback-trio:
    name: Rollback on trio failure
    needs: [tag, publish-trio]
    if: ${{ !cancelled() && needs.tag.result == 'success' && needs.publish-trio.result == 'failure' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out release commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.head_sha }}

      # Fresh job — the rollback composite shells out to `anodizer`, which the
      # publish legs installed only in their own runners.
      - name: Install anodizer
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          install-only: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Roll back release tags
        uses: ./.github/actions/rollback-on-failure
        with:
          head_sha: ${{ needs.tag.outputs.head_sha }}
          gh_token: ${{ secrets.GH_PAT }}

  # --- Helm chart publish ---
  helm-chart:
    name: Publish Helm chart
    needs: [tag, publish-trio, dispatch-oidc]
    # A Helm chart whose appVersion points at a cfgd crate version that never
    # reached crates.io is a silently-broken release, so require BOTH the binary
    # publish (publish-trio, which builds the images) AND the crates.io publish
    # (dispatch-oidc, now the terminal leg) to have succeeded. `== 'success'` on
    # publish-trio also blocks the skipped-trio case (a core-only release → empty
    # trio matrix → skipped → no chart). The `contains(crates, cfgd)` guard
    # scopes the push to releases that include the cfgd crate.
    if: >-
      ${{ !cancelled() && needs.tag.result == 'success' &&
          needs.publish-trio.result == 'success' &&
          needs.dispatch-oidc.result == 'success' &&
          contains(fromJson(needs.tag.outputs.crates), 'cfgd') }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.tag.outputs.head_sha }}

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions).cfgd }}"
          helm package chart/cfgd --version "$VERSION" --app-version "$VERSION"
          helm push "cfgd-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

  # --- Crossplane function publish ---
  crossplane-function:
    name: Publish Crossplane function
    needs: [tag, publish-trio, dispatch-oidc]
    # See helm-chart's `if:` — require both publish-trio and dispatch-oidc
    # `== 'success'` so the function image is never pushed for a release whose
    # cfgd crate did not fully publish (failed binary or cargo leg) or that did
    # not bump cfgd at all (empty trio matrix → skipped). `contains(crates,
    # cfgd)` scopes it.
    if: >-
      ${{ !cancelled() && needs.tag.result == 'success' &&
          needs.publish-trio.result == 'success' &&
          needs.dispatch-oidc.result == 'success' &&
          contains(fromJson(needs.tag.outputs.crates), 'cfgd') }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Check out release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.tag.outputs.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image tarball
        uses: docker/build-push-action@v7
        with:
          context: function-cfgd
          file: function-cfgd/Dockerfile
          platforms: linux/${{ matrix.arch }}
          target: image
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=function-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=function-${{ matrix.arch }}

      - name: Install Crossplane CLI
        uses: ./.github/actions/setup-crossplane

      - name: Build xpkg
        run: |
          crossplane xpkg build \
            --package-file=${{ matrix.arch }}.xpkg \
            --package-root=function-cfgd/package/ \
            --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar

      - name: Upload xpkg artifact
        uses: actions/upload-artifact@v7
        with:
          name: xpkg-${{ matrix.arch }}
          path: "*.xpkg"
          # Consumed by crossplane-push minutes later; a week covers any
          # post-mortem without the default 90-day hoard.
          retention-days: 7

  crossplane-push:
    name: Push Crossplane function
    needs: [tag, crossplane-function]
    if: needs.tag.result == 'success' && needs.crossplane-function.result == 'success'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      # The checkout must precede the artifact download for two reasons:
      # setup-crossplane is a LOCAL composite action (only a checkout puts
      # its action.yml on the runner), and checkout's git-clean would delete
      # any xpkg files already sitting in the workspace.
      - name: Check out release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.tag.outputs.head_sha }}

      - name: Download xpkg artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: xpkg-*
          merge-multiple: true

      - name: Install Crossplane CLI
        uses: ./.github/actions/setup-crossplane

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push xpkg
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions).cfgd }}"
          crossplane --verbose xpkg push \
            --package-files "$(echo *.xpkg | tr ' ' ,)" \
            ghcr.io/${{ github.repository_owner }}/function-cfgd:v${VERSION}

  # --- OLM bundle publish ---
  olm-bundle:
    name: Publish OLM bundle
    needs: [tag, publish-trio, dispatch-oidc]
    # See helm-chart's `if:` — require both publish-trio and dispatch-oidc
    # `== 'success'` so the OLM bundle (whose CSV pins cfgd-operator:vX) is never
    # pushed for a release whose cfgd-operator crate did not fully publish
    # (failed binary or cargo leg) or that did not bump cfgd-operator at all
    # (empty trio matrix → skipped). `contains(crates, cfgd-operator)` scopes it.
    if: >-
      ${{ !cancelled() && needs.tag.result == 'success' &&
          needs.publish-trio.result == 'success' &&
          needs.dispatch-oidc.result == 'success' &&
          contains(fromJson(needs.tag.outputs.crates), 'cfgd-operator') }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.tag.outputs.head_sha }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CSV version and image references
        run: |
          VERSION="${{ fromJson(needs.tag.outputs.versions)['cfgd-operator'] }}"
          CSV="ecosystem/olm/manifests/cfgd-operator.clusterserviceversion.yaml"
          if [ ! -f "$CSV" ]; then
            echo "::error::OLM CSV not found: $CSV"
            exit 1
          fi
          sed -i "s|cfgd-operator\.v[0-9][0-9.]*|cfgd-operator.v${VERSION}|g" "$CSV"
          sed -i "s|cfgd-operator:v[0-9][0-9.]*|cfgd-operator:v${VERSION}|g" "$CSV"
          # spec.version is a bare semver; OLM rejects the bundle unless
          # metadata.name == cfgd-operator.v<spec.version>, so it must move too.
          sed -i "s|^  version: [0-9][0-9.]*|  version: ${VERSION}|" "$CSV"
          name_ver="$(grep -m1 '^  name: cfgd-operator\.v' "$CSV" | sed 's|.*\.v||')"
          spec_ver="$(grep -m1 '^  version: ' "$CSV" | awk '{print $2}')"
          if [ "$name_ver" != "$VERSION" ] || [ "$spec_ver" != "$VERSION" ]; then
            echo "::error::OLM CSV version drift: metadata.name=$name_ver spec.version=$spec_ver expected=$VERSION"
            exit 1
          fi

      - name: Build and push OLM bundle image
        uses: docker/build-push-action@v7
        with:
          context: ecosystem/olm
          file: ecosystem/olm/bundle.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cfgd-operator-bundle:v${{ fromJson(needs.tag.outputs.versions)['cfgd-operator'] }}

  # --- Post-publish master advance ---
  # Fast-forward master onto the bump commit only after every publish leg
  # has succeeded (or legitimately skipped, for a partial-workspace release
  # whose leg had nothing to do — each leg's own `if:` encodes when a skip
  # is legitimate, so any leg that should have run and failed shows
  # `failure` here and blocks the advance). `tag` pushed only the tags, so
  # a failed release leaves master untouched. force=false makes GitHub
  # enforce the fast-forward server-side. GH_PAT rather than GITHUB_TOKEN:
  # the PAT push retriggers CI on the new master HEAD (badge health), and
  # preflight's bump-message guard culls the spurious second Release run.
  # When nothing bumped, head_sha is the SHA master already points at and
  # the PATCH is a no-op.
  advance-master:
    name: Advance master
    needs: [tag, determinism-check, dispatch-oidc, publish-trio, helm-chart, crossplane-function, crossplane-push, olm-bundle]
    # Drift-proof form of "tag succeeded AND every needed job is success or
    # skipped": the two !contains() sweeps cover EVERY entry in needs, so a
    # job added to the needs list is automatically gated — the per-leg
    # success||skipped enumeration this replaces silently weakened whenever
    # a new job joined needs without an if: clause. Semantics preserved
    # exactly: no needed job may be failure or cancelled; skips stay legal.
    if: >-
      ${{ !cancelled() && needs.tag.result == 'success' &&
          !contains(needs.*.result, 'failure') &&
          !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fast-forward master onto the published bump commit
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SHA: ${{ needs.tag.outputs.head_sha }}
        run: |
          if ! gh api -X PATCH "repos/${{ github.repository }}/git/refs/heads/master" \
                 -f sha="$SHA" -F force=false; then
            echo "::error::Could not fast-forward master to $SHA (master moved during release?). \
              The release IS published — do NOT re-cut. Reconcile by hand: \
              git fetch origin && git push origin $SHA:refs/heads/master"
            exit 1
          fi
