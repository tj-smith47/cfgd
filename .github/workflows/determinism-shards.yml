name: Determinism shards

# Per-crate determinism harness. Called by release.yml's
# determinism-check parent matrix (one parent entry per crate); this
# reusable workflow runs the OS shard matrix nested inside, so the
# Actions run summary groups all of a crate's shards under one
# parent entry instead of fanning them across the run-level list.

on:
  workflow_call:
    inputs:
      crate:
        description: "Crate name passed to anodizer check determinism --crate"
        required: true
        type: string
      head_sha:
        description: "Commit SHA to check out and tag-validate against"
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  ANODIZER_VERSION: v0.14.0

jobs:
  shard:
    name: ${{ matrix.shard.name }}
    strategy:
      fail-fast: false
      matrix:
        # One shard per OS. Each leaves `targets` empty so the harness derives
        # that OS's full shipped target set from `anodizer targets --json`
        # (cfgd maps both x86_64 and aarch64 of every OS — including
        # aarch64-pc-windows-msvc — onto its native runner OS). Building an
        # OS's whole target set on a single x86_64 runner is the faithful
        # shape for two reasons, both independent of any one target:
        #   1. Determinism must rebuild exactly what publish ships. publish
        #      cross-compiles aarch64 from the x86_64 host, so the check must
        #      too — a native windows-11-arm build would exercise a different
        #      toolchain path than the artifact users actually receive.
        #   2. The archive stage's arch-agnostic completions/man generation
        #      executes the built binary, so a host-native x86_64 build must
        #      be present on the runner — the same reason the all-targets
        #      publish build generates them once and shares them into every
        #      archive.
        shard:
          - { os: ubuntu-latest,  label: linux,   targets: '', name: 'Linux' }
          - { os: macos-latest,   label: macos,   targets: '', name: 'macOS' }
          - { os: windows-latest, label: windows, targets: '', name: 'Windows' }
    runs-on: ${{ matrix.shard.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_sha }}

      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"

      - uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          auto-install: 'true'
          determinism: 'true'
          determinism-targets: ${{ matrix.shard.targets }}
          preserve-dist: 'true'
          shard-label: ${{ matrix.shard.label }}
          determinism-crate: ${{ inputs.crate }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ inputs.crate }}-${{ matrix.shard.label }}
          path: preserved-dist/
          if-no-files-found: error
          # The preserved dist carries dot-directories (.completions/,
          # .manpages/) that the context manifest lists as artifacts; the
          # action's default excludes hidden files, which silently strips
          # them and fails publish-only's hash-verify on restore.
          include-hidden-files: true

      - name: Upload determinism report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: determinism-${{ inputs.crate }}-${{ matrix.shard.label }}
          path: |
            dist/run-*/determinism.json
            dist/run-*/drift-bins/**
          # drift-bins mirrors the dist layout, so a drifting artifact under a
          # dot-directory would otherwise be dropped from the report.
          include-hidden-files: true
