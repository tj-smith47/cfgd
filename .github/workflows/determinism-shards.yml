name: Determinism shards

# Per-crate determinism harness. Called by release.yml's
# determinism-check parent matrix (one parent entry per crate); this
# reusable workflow runs the OS shard matrix nested inside, so the
# Actions run summary groups all of a crate's shards under one
# parent entry instead of fanning them across the run-level list.

on:
  workflow_call:
    inputs:
      crate:
        description: "Crate name passed to anodizer check determinism --crate"
        required: true
        type: string
      head_sha:
        description: "Commit SHA to check out and tag-validate against"
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  ANODIZER_VERSION: v0.14.0

jobs:
  shard:
    name: ${{ matrix.shard.name }}
    strategy:
      fail-fast: false
      matrix:
        shard:
          - { os: ubuntu-latest,  label: linux,           targets: '',                          name: 'Linux x86_64' }
          - { os: macos-latest,   label: macos,           targets: '',                          name: 'macOS' }
          - { os: windows-latest,  label: windows-x86_64,  targets: 'x86_64-pc-windows-msvc',    name: 'Windows x86_64' }
          # aarch64-pc-windows-msvc is cross-compiled from the x86_64 Windows
          # host, not a native windows-11-arm runner: on an arm64 host the tool
          # installs resolve arm64 assets, and cosign ships no windows/arm64
          # binary (verified through v3.1.1), so the install 404s before the
          # harness runs. Cross from x64 keeps every tool on its x64 asset.
          # Mirrors anodizer's own determinism matrix.
          - { os: windows-latest,  label: windows-aarch64, targets: 'aarch64-pc-windows-msvc',   name: 'Windows aarch64' }
    runs-on: ${{ matrix.shard.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_sha }}

      - uses: ./.github/actions/setup-protoc
        with:
          version: "25.9"

      - uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          auto-install: 'true'
          determinism: 'true'
          determinism-targets: ${{ matrix.shard.targets }}
          preserve-dist: 'true'
          shard-label: ${{ matrix.shard.label }}
          determinism-crate: ${{ inputs.crate }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload dist artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ inputs.crate }}-${{ matrix.shard.label }}
          path: preserved-dist/
          if-no-files-found: error

      - name: Upload determinism report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: determinism-${{ inputs.crate }}-${{ matrix.shard.label }}
          path: |
            dist/run-*/determinism.json
            dist/run-*/drift-bins/**
