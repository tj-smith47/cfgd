name: "Download all dist artifacts"
description: "Download every per-crate/per-shard dist-* artifact and merge into dist/ (composite, no Node runtime of its own)."

inputs:
  path:
    description: "Directory the merged artifacts are written to."
    required: false
    default: "dist/"
  pattern:
    description: "Artifact-name glob to download. Narrow to one crate (dist-<crate>-*) when the caller publishes a single crate — skips sibling crates' multi-GB dists."
    required: false
    default: "dist-*"
  run-id:
    description: "Release run id whose dist-* artifacts to download. Set when a SEPARATE run (the dispatched publish-oidc job) consumes the Release run's preserved dist; empty falls back to the current run."
    required: false
    default: ""
  github-token:
    description: "Token used to download artifacts from another run. Required only when run-id names a run other than the current one."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Download all dist artifacts
      uses: actions/download-artifact@v8
      with:
        # All crates' shards merge into dist/<crate>/... — each crate's
        # tarball is self-contained in its <crate>/ subdir thanks to the
        # harness's per-crate preserve layout (--crate <name> on
        # check determinism). No context.json collision.
        pattern: ${{ inputs.pattern }}
        path: ${{ inputs.path }}
        merge-multiple: true
        run-id: ${{ inputs.run-id != '' && inputs.run-id || github.run_id }}
        github-token: ${{ inputs.github-token }}
