name: "Log in to ghcr.io"
description: "Authenticate to the GitHub Container Registry for an image / chart / xpkg push. One place to pin the login action, registry host, and username actor for every push job."

inputs:
  token:
    description: "Token with packages:write — the job's GITHUB_TOKEN. Passed explicitly because a composite action has no `secrets` context of its own."
    required: true

runs:
  using: "composite"
  steps:
    - name: Log in to ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}
