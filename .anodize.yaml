# yaml-language-server: $schema=https://tj-smith47.github.io/anodize/schema.json
# cfgd — declarative, GitOps-style machine configuration management.
# Dogfoods every anodize feature that applies to cfgd's 4-workspace monorepo.
# Templates use Tera syntax with Go-style compat.

version: 2
project_name: cfgd
dist: ./dist

report_sizes: true

env:
  - REGISTRY=ghcr.io
  - RELEASE_TYPE=stable

variables:
  repo_url: "https://github.com/tj-smith47/cfgd"
  description: "Declarative, GitOps-style machine configuration management"

git:
  tag_sort: "-version:refname"

tag:
  default_bump: patch
  branch_history: last
  tag_prefix: "v"
  release_branches:
    - master
  initial_version: "0.3.5"

metadata:
  description: "Declarative, GitOps-style machine configuration management"
  homepage: "https://github.com/tj-smith47/cfgd"
  license: MIT
  maintainers:
    - "TJ Smith"
  mod_timestamp: "{{ CommitTimestamp }}"

defaults:
  targets:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - x86_64-pc-windows-msvc
    - aarch64-pc-windows-msvc
  cross: auto
  flags: --release
  archives:
    format: tar.gz
    format_overrides:
      - os: windows
        format: zip
  checksum:
    algorithm: sha256

# UPX compression — shrinks binaries on targets UPX supports.
# macOS ARM is broken in recent UPX; exclude it.
upx:
  - id: default
    enabled: true
    binary: upx
    args:
      - "--best"
      - "--lzma"
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - x86_64-pc-windows-msvc

# Self-extracting installer for Linux & macOS — bundles the binary
# with a small bootstrap script that installs it to /usr/local/bin.
# Top-level config (not per-crate); skipped automatically for library
# crates that produce no binaries.
makeselfs:
  - id: default
    name: "cfgd Installer"
    script: scripts/makeself-install.sh
    name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}-installer.run"

before:
  hooks:
    - cargo fmt --check
    - cargo clippy -- -D warnings
    - cargo test

after:
  post:
    - echo "Release complete for {{ ProjectName }} {{ Tag }}"

# Independent workspaces for per-component release cadences.
workspaces:
  # --- cfgd-core: shared library (crates.io only) ---
  - name: cfgd-core
    skip:
      - announce
    crates:
      - name: cfgd-core
        path: crates/cfgd-core
        tag_template: "core-v{{ Version }}"
        version_sync:
          enabled: true
          mode: cargo
        publish:
          crates:
            enabled: true
            index_timeout: 600

  # --- cfgd CLI: cross-platform binary + kubectl plugin ---
  - name: cfgd
    crates:
      - name: cfgd
        path: crates/cfgd
        tag_template: "v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd
            features: []
            no_default_features: false
        archives:
          - name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}"
            format: tar.gz
            format_overrides:
              - os: windows
                format: zip
            files:
              - LICENSE
              - README.md
        checksum:
          name_template: "{{ ProjectName }}-{{ Version }}-checksums.txt"
          algorithm: sha256
        # Single fat macOS binary from the two per-arch builds.
        universal_binaries:
          - name_template: "{{ ProjectName }}"
            replace: false
        binstall:
          enabled: true
          pkg_url: "https://github.com/tj-smith47/cfgd/releases/download/v{{ Version }}/cfgd-{{ Version }}-{ target }.tar.gz"
          bin_dir: ""
          pkg_fmt: tgz
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: auto
          name_template: "{{ ProjectName }} {{ Tag }}"
          footer: |
            ---
            Released with [anodize](https://github.com/tj-smith47/anodize)
          include_meta: true
        publish:
          crates:
            enabled: true
            index_timeout: 600
          homebrew:
            tap:
              owner: tj-smith47
              name: homebrew-tap
            folder: Formula
            description: "Declarative, GitOps-style machine configuration management"
            license: MIT
            install: |
              bin.install "cfgd"
            test: |
              system "#{bin}/cfgd", "--version"
          scoop:
            bucket:
              owner: tj-smith47
              name: scoop-bucket
            description: "Declarative, GitOps-style machine configuration management"
            license: MIT
          chocolatey:
            project_repo:
              owner: tj-smith47
              name: cfgd
            description: "Declarative, GitOps-style machine configuration management"
            license: MIT
            tags:
              - configuration
              - gitops
              - reconciliation
              - rust
          winget:
            manifests_repo:
              owner: tj-smith47
              name: winget-pkgs
            description: "Declarative, GitOps-style machine configuration management"
            license: MIT
            package_identifier: "TJSmith.cfgd"
            publisher: "TJ Smith"
          nix:
            name: cfgd
            repository:
              owner: tj-smith47
              name: nix-pkgs
            homepage: "https://github.com/tj-smith47/cfgd"
            description: "Declarative, GitOps-style machine configuration management"
            license: mit
            skip_upload: false
          krew:
            manifests_repo:
              owner: tj-smith47
              name: krew-index
            short_description: "Declarative, GitOps-style machine configuration management"
            homepage: "https://github.com/tj-smith47/cfgd"
        # Docker V2 image for the cfgd agent (CLI + daemon image).
        docker_v2:
          - id: cfgd-agent
            dockerfile: Dockerfile.agent.release
            images:
              - "ghcr.io/tj-smith47/cfgd"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "latest"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "Declarative, GitOps-style machine configuration management"
              org.opencontainers.image.licenses: "MIT"
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        docker_manifests:
          - name_template: "ghcr.io/tj-smith47/cfgd:{{ Version }}"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd:{{ Version }}-amd64"
              - "ghcr.io/tj-smith47/cfgd:{{ Version }}-arm64"
          - name_template: "ghcr.io/tj-smith47/cfgd:latest"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd:latest-amd64"
              - "ghcr.io/tj-smith47/cfgd:latest-arm64"
        docker_digest:
          name_template: "cfgd_{{ .Tag }}.digest"
        nfpm:
          - package_name: cfgd
            formats:
              - deb
              - rpm
              - apk
            vendor: "TJ Smith"
            homepage: "https://github.com/tj-smith47/cfgd"
            maintainer: "TJ Smith <tj@jarvispro.io>"
            description: "Declarative, GitOps-style machine configuration management"
            license: MIT
            bindir: /usr/bin
            file_name_template: "{{ ProjectName }}_{{ RawVersion }}_{{ Os }}_{{ Arch }}"
            contents:
              - src: LICENSE
                dst: /usr/share/doc/cfgd/LICENSE
              - src: README.md
                dst: /usr/share/doc/cfgd/README.md
        snapcrafts:
          - name: cfgd
            summary: "Declarative, GitOps-style machine configuration management"
            description: |
              cfgd is a declarative, GitOps-style machine configuration state
              management tool.  It ships a cross-platform CLI, a long-running
              reconciliation daemon, a Kubernetes operator, and a CSI Node
              plugin for injecting modules into Kubernetes pods.
            grade: stable
            confinement: strict
            license: MIT
            publish: true
            apps:
              cfgd:
                command: cfgd
                plugs:
                  - home
                  - network
                  - network-bind

  # --- cfgd-operator: Kubernetes operator (Linux only, Docker + Helm) ---
  - name: cfgd-operator
    crates:
      - name: cfgd-operator
        path: crates/cfgd-operator
        tag_template: "operator-v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd-operator
            features: []
            targets:
              - x86_64-unknown-linux-gnu
              - aarch64-unknown-linux-gnu
        archives: false
        docker_v2:
          - id: cfgd-operator
            dockerfile: Dockerfile.operator.release
            images:
              - "ghcr.io/tj-smith47/cfgd-operator"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "latest"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "Kubernetes operator for cfgd"
              org.opencontainers.image.licenses: "MIT"
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        docker_manifests:
          - name_template: "ghcr.io/tj-smith47/cfgd-operator:{{ Version }}"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-operator:{{ Version }}-amd64"
              - "ghcr.io/tj-smith47/cfgd-operator:{{ Version }}-arm64"
          - name_template: "ghcr.io/tj-smith47/cfgd-operator:latest"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-operator:latest-amd64"
              - "ghcr.io/tj-smith47/cfgd-operator:latest-arm64"
        docker_digest:
          name_template: "cfgd-operator_{{ .Tag }}.digest"
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: false
          name_template: "{{ ProjectName }} {{ Tag }}"
          footer: |
            ---
            Released with [anodize](https://github.com/tj-smith47/anodize)
          include_meta: true
        publish:
          crates:
            enabled: true

  # --- cfgd-csi: CSI Node plugin (Linux only, Docker) ---
  - name: cfgd-csi
    crates:
      - name: cfgd-csi
        path: crates/cfgd-csi
        tag_template: "csi-v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd-csi
            features: []
            targets:
              - x86_64-unknown-linux-gnu
              - aarch64-unknown-linux-gnu
        archives: false
        docker_v2:
          - id: cfgd-csi
            dockerfile: Dockerfile.csi.release
            images:
              - "ghcr.io/tj-smith47/cfgd-csi"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "latest"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "CSI Node plugin for cfgd module injection into Kubernetes pods"
              org.opencontainers.image.licenses: "MIT"
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        docker_manifests:
          - name_template: "ghcr.io/tj-smith47/cfgd-csi:{{ Version }}"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-csi:{{ Version }}-amd64"
              - "ghcr.io/tj-smith47/cfgd-csi:{{ Version }}-arm64"
          - name_template: "ghcr.io/tj-smith47/cfgd-csi:latest"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-csi:latest-amd64"
              - "ghcr.io/tj-smith47/cfgd-csi:latest-arm64"
        docker_digest:
          name_template: "cfgd-csi_{{ .Tag }}.digest"
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: false
          name_template: "{{ ProjectName }} {{ Tag }}"
          footer: |
            ---
            Released with [anodize](https://github.com/tj-smith47/anodize)
          include_meta: true
        publish:
          crates:
            enabled: true

changelog:
  header: "# Changelog for {{ ProjectName }}"
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Others
      order: 999

# GPG signing for archives, checksums, and source tarball.
signs:
  - id: default
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"
  - id: source
    artifacts: source
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"

# Cosign-based binary signing for the cfgd CLI binary.
binary_signs:
  - id: default
    artifacts: binary
    cmd: cosign
    args:
      - "sign-blob"
      - "--key=env://COSIGN_KEY"
      - "--bundle={{ Signature }}"
      - "--yes"
      - "{{ Artifact }}"

# Cosign-based Docker image signing for all 3 images.
docker_signs:
  - id: default
    artifacts: manifests
    cmd: cosign
    args:
      - "sign"
      - "--key=env://COSIGN_KEY"
      - "--yes"
      - "{{ Artifact }}"

source:
  enabled: true
  format: tar.gz
  name_template: "{{ ProjectName }}-{{ Version }}-source"
  files:
    - "crates/**/*.rs"
    - "Cargo.toml"
    - "Cargo.lock"
    - "LICENSE"
    - "README.md"

sbom:
  enabled: true
  format: cyclonedx

# Source RPM (exercised by anodize; dogfooded here too).
srpm:
  enabled: true
  package_name: cfgd
  spec_file: cfgd.spec
  file_name_template: "{{ ProjectName }}-{{ RawVersion }}-1.src.rpm"

# Curl-pipe install script — rendered with the version baked in and uploaded
# as a release asset.
template_files:
  - id: install-script
    src: scripts/install.sh.tpl
    dst: install.sh
    mode: "0755"

partial:
  by: goos

announce:
  webhook:
    enabled: true
    endpoint_url: "https://jarvispro.io/webhooks/anodize"
    content_type: application/json
    message_template: '{"project":"{{ ProjectName }}","tag":"{{ Tag }}","url":"{{ ReleaseURL }}"}'
  email:
    enabled: true
    host: smtp.gmail.com
    port: 587
    username: toss45@gmail.com
    from: toss45@gmail.com
    to:
      - "tj@jarvispro.io"
    subject_template: "{{ ProjectName }} {{ Tag }} released"
    message_template: "{{ ProjectName }} {{ Tag }} is now available at {{ ReleaseURL }}"
