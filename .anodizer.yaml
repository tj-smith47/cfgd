# yaml-language-server: $schema=https://tj-smith47.github.io/anodizer/schema.json
# cfgd — declarative, GitOps-style machine configuration management.
# Dogfoods every anodizer feature that applies to cfgd's 4-workspace monorepo.
# Templates use Tera syntax with Go-style compat.

version: 2
project_name: cfgd
dist: ./dist

report_sizes: true

env:
  - REGISTRY=ghcr.io
  - RELEASE_TYPE=stable

variables:
  repo_url: "https://github.com/tj-smith47/cfgd"
  description: "Declarative, GitOps-style machine configuration management"

git:
  tag_sort: "-version:refname"
  ignore_tags:
    - "nightly"
  ignore_tag_prefixes:
    - "draft-"
  prerelease_suffix: "-"

tag:
  # Require an explicit bump signal per commit range. Release-worthy signals
  # are `#major` / `#minor` / `#patch` tokens OR Conventional Commit markers
  # (`feat:` -> minor, `fix:` / `perf:` / `revert:` -> patch, `BREAKING CHANGE`
  # footer or `<type>!:` shorthand -> major). Ranges containing only chore /
  # docs / style / refactor / test / build / ci commits no-op, so autotag
  # won't mint a spurious patch bump after a stable crate's test or chore
  # touch.
  default_bump: none
  # Scan the full commit range between the last tag and HEAD (per crate path)
  # so a release-worthy `fix:` / `feat:` / `BREAKING CHANGE` commit further
  # back in the range still triggers the bump even if the most recent commit
  # touching that path is a chore. `last` mode only inspects the single most
  # recent commit per path, which silently drops release signals in monorepo
  # autotag flows where multiple commits land between tags.
  branch_history: full
  tag_prefix: "v"
  release_branches:
    - master
  initial_version: "0.3.5"

metadata:
  description: "Declarative, GitOps-style machine configuration management"
  homepage: "https://github.com/tj-smith47/cfgd"
  license: MIT
  maintainers:
    - "TJ Smith"
  mod_timestamp: "{{ CommitTimestamp }}"
  full_description:
    from_file: README.md
  commit_author:
    name: TJ Smith
    email: tj@jarvispro.io

defaults:
  targets:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - x86_64-pc-windows-msvc
    - aarch64-pc-windows-msvc
  cross: auto
  builds:
    flags:
      - --release
  archives:
    formats: [tar.gz]
    format_overrides:
      - os: windows
        formats: [zip]
    hooks:
      before:
        - "echo packing {{ ProjectName }} {{ Tag }} format={{ Format }}"
      after:
        - "echo packed {{ ProjectName }} {{ Tag }} format={{ Format }}"
  checksum:
    algorithm: sha256
  # All four workspaces opt into crates.io publishing with the same
  # 600s index timeout. Per-crate `publish.cargo: { skip: true }` would
  # suppress inheritance for that crate (DEC-9).
  publish:
    cargo:
      index_timeout: 600

# UPX compression — shrinks binaries on targets UPX supports.
# macOS ARM is broken in recent UPX; exclude it.
upx:
  - id: default
    enabled: true
    binary: upx
    args:
      - "--best"
      - "--lzma"
    compress: "9"
    lzma: true
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - x86_64-pc-windows-msvc

# Self-extracting installer for Linux & macOS — bundles the binary
# with a small bootstrap script that installs it to /usr/local/bin.
# Top-level config (not per-crate); skipped automatically for library
# crates that produce no binaries.
makeselfs:
  - id: default
    name: "cfgd Installer"
    script: scripts/makeself-install.sh
    filename: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}-installer.run"

before:
  hooks:
    - cargo fmt --check
    - cargo clippy -- -D warnings
    - cargo test

after:
  post:
    - echo "Release complete for {{ ProjectName }} {{ Tag }}"

# Independent workspaces for per-component release cadences.
workspaces:
  # --- cfgd-core: shared library (crates.io only) ---
  - name: cfgd-core
    skip:
      - announce
    crates:
      - name: cfgd-core
        path: crates/cfgd-core
        tag_template: "core-v{{ Version }}"
        version_sync:
          enabled: true
          mode: cargo
        # Inherits `publish.cargo: { index_timeout: 600 }` from defaults.

  # --- cfgd CLI: cross-platform binary + kubectl plugin ---
  - name: cfgd
    crates:
      - name: cfgd
        path: crates/cfgd
        tag_template: "v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd
            features: []
            no_default_features: false
        archives:
          - name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}"
            formats: [tar.gz]
            format_overrides:
              - os: windows
                formats: [zip]
            files:
              - LICENSE
              - README.md
        checksum:
          name_template: "{{ ArtifactName }}.sha256"
          algorithm: sha256
          split: true
        # Single fat macOS binary from the two per-arch builds.
        universal_binaries:
          - name_template: "{{ ProjectName }}"
            replace: false
        binstall:
          enabled: true
          pkg_url: "https://github.com/tj-smith47/cfgd/releases/download/v{{ Version }}/cfgd-{{ Version }}-{ target }.tar.gz"
          bin_dir: ""
          pkg_fmt: tgz
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: auto
          mode: keep-existing
          target_commitish: "{{ .Commit }}"
          discussion_category_name: "Announcements"
          replace_existing_draft: false
          replace_existing_artifacts: true
          name_template: "{{ ProjectName }} {{ Tag }}"
          header: |
            ## What's new in {{ .Tag }}
          footer: |
            ---
            Released with [anodizer](https://github.com/tj-smith47/anodizer)
          include_meta: true
          # Attach the apk-signing public key alongside the signed apk(s).
          # anodizer-action's `apk-private-key` input derives the pub key
          # from the private key and drops it into ./dist/. apk verifiers
          # install this file under /etc/apk/keys/ before `apk add`-ing a
          # signed package. `allow_empty: true` skips the glob silently
          # when the file is absent (local snapshot / dry-run flows where
          # no secret was provisioned).
          extra_files:
            - glob: "dist/*-apk-signing-key.rsa.pub"
              allow_empty: true
        publish:
          # `cargo:` inherits `index_timeout: 600` from defaults.publish.cargo.
          homebrew:
            repository:
              owner: tj-smith47
              name: homebrew-tap
            directory: Formula
            description: "Declarative, GitOps-style machine configuration management"
            homepage: "https://github.com/tj-smith47/cfgd"
            license: MIT
            install: |
              bin.install "cfgd"
            post_install: |
              generate_completions_from_executable(bin/"cfgd", "completion")
            test: |
              system "#{bin}/cfgd", "--version"
            caveats: |
              Run `cfgd init` to scaffold a config in your repo.
            dependencies:
              - name: git
                type: required
            commit_msg_template: "cfgd {{ .Tag }}"
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
          scoop:
            repository:
              owner: tj-smith47
              name: scoop-bucket
            description: "Declarative, GitOps-style machine configuration management"
            homepage: "https://github.com/tj-smith47/cfgd"
            license: MIT
            depends:
              - git
            shortcuts:
              - ["cfgd.exe", "cfgd"]
            commit_msg_template: "cfgd {{ .Tag }}"
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
          chocolatey:
            repository:
              owner: tj-smith47
              name: cfgd
            title: "cfgd"
            summary: "Declarative, GitOps-style machine configuration management"
            description: "Declarative, GitOps-style machine configuration management"
            authors: "TJ Smith"
            copyright: "Copyright © 2026 TJ Smith"
            license: MIT
            require_license_acceptance: false
            project_url: "https://github.com/tj-smith47/cfgd"
            project_source_url: "https://github.com/tj-smith47/cfgd"
            package_source_url: "https://github.com/tj-smith47/cfgd/tree/{{ .Tag }}/crates/cfgd"
            docs_url: "https://github.com/tj-smith47/cfgd/blob/{{ .Tag }}/docs/configuration.md"
            bug_tracker_url: "https://github.com/tj-smith47/cfgd/issues"
            release_notes: "https://github.com/tj-smith47/cfgd/releases/tag/{{ .Tag }}"
            icon_url: "https://raw.githubusercontent.com/tj-smith47/cfgd/main/.github/gear.svg"
            tags:
              - configuration
              - gitops
              - reconciliation
              - rust
          winget:
            repository:
              owner: tj-smith47
              name: winget-pkgs
            short_description: "GitOps-style machine config manager"
            description: "Declarative, GitOps-style machine configuration management"
            homepage: "https://github.com/tj-smith47/cfgd"
            license: MIT
            author: "TJ Smith"
            copyright: "Copyright © 2026 TJ Smith"
            package_identifier: "TJSmith.cfgd"
            publisher: "TJ Smith"
            publisher_url: "https://github.com/tj-smith47"
            publisher_support_url: "https://github.com/tj-smith47/cfgd/issues"
            release_notes: "See release-notes URL for the full changelog."
            release_notes_url: "https://github.com/tj-smith47/cfgd/releases/tag/{{ .Tag }}"
            installation_notes: "Run `cfgd --help` after installation."
            tags:
              - configuration
              - gitops
              - reconciliation
              - rust
            commit_msg_template: "cfgd {{ .Tag }}"
            # Rust/MSVC binaries dynamically link against the VC++ 2015+
            # runtime. Without this dependency declared, winget's automated
            # validation fails at invocation time with STATUS_DLL_NOT_FOUND
            # (exit code -1073741515).
            dependencies:
              - package_identifier: "Microsoft.VCRedist.2015+.x64"
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
          nix:
            name: cfgd
            repository:
              owner: tj-smith47
              name: nix-pkgs
            homepage: "https://github.com/tj-smith47/cfgd"
            description: "Declarative, GitOps-style machine configuration management"
            license: mit
            skip_upload: false
            formatter: alejandra
            extra_install: |
              installManPage share/man/man1/cfgd.1
            post_install: |
              echo "Installed cfgd. Run 'cfgd init' to scaffold a config."
            commit_msg_template: "cfgd {{ .Tag }}"
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
        # Docker V2 image for the cfgd agent (CLI + daemon image).
        docker_v2:
          - id: cfgd-agent
            dockerfile: Dockerfile.agent.release
            images:
              - "ghcr.io/tj-smith47/cfgd"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "latest"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "Declarative, GitOps-style machine configuration management"
              org.opencontainers.image.licenses: "MIT"
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        docker_manifests:
          - name_template: "ghcr.io/tj-smith47/cfgd:{{ Version }}"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd:{{ Version }}-amd64"
              - "ghcr.io/tj-smith47/cfgd:{{ Version }}-arm64"
          - name_template: "ghcr.io/tj-smith47/cfgd:latest"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd:latest-amd64"
              - "ghcr.io/tj-smith47/cfgd:latest-arm64"
        docker_digest:
          name_template: "cfgd_{{ .Tag }}.digest"
        nfpm:
          - id: default
            package_name: cfgd
            formats:
              - deb
              - rpm
              - apk
            vendor: "TJ Smith"
            homepage: "https://github.com/tj-smith47/cfgd"
            maintainer: "TJ Smith <tj@jarvispro.io>"
            description: "Declarative, GitOps-style machine configuration management"
            license: MIT
            bindir: /usr/bin
            section: utils
            priority: optional
            epoch: "1"
            release: "1"
            umask: "0o002"
            mtime: "{{ CommitDate }}"
            recommends:
              - git
            provides:
              - cfgd
            file_name_template: "{{ ProjectName }}_{{ RawVersion }}_{{ Os }}_{{ Arch }}"
            contents:
              - src: LICENSE
                dst: /usr/share/doc/cfgd/LICENSE
              - src: README.md
                dst: /usr/share/doc/cfgd/README.md
            # GPG signing for deb / rpm / apk packages.
            # Requires `GPG_KEY_PATH` env pointing at an exported secret key
            # file. anodizer-action wires this automatically when
            # `gpg-private-key` is supplied; locally:
            #   gpg --export-secret-keys --armor <fingerprint> > ~/.gnupg/cfgd-signing.asc
            #   export GPG_KEY_PATH=~/.gnupg/cfgd-signing.asc
            deb:
              signature:
                key_file: "{{ .Env.GPG_KEY_PATH }}"
                type: origin
            rpm:
              group: Development/Tools
              packager: "TJ Smith <tj@jarvispro.io>"
              signature:
                key_file: "{{ .Env.GPG_KEY_PATH }}"
            apk:
              signature:
                # apk-tools uses RSA-PSS, not OpenPGP. nfpm's apk packager
                # parses the key via Go's `pem.Decode`, so the file at this
                # path must be a raw PEM RSA private key (not the GPG-armored
                # block that deb / rpm consume). Provisioned by the
                # `apk-private-key` input on anodizer-action.
                key_file: "{{ .Env.APK_PRIVATE_KEY_PATH }}"
        snapcrafts:
          - id: default
            name: cfgd
            title: "cfgd"
            icon: ".github/gear.svg"
            base: core24
            summary: "Declarative, GitOps-style machine configuration management"
            description: |
              cfgd is a declarative, GitOps-style machine configuration state
              management tool.  It ships a cross-platform CLI, a long-running
              reconciliation daemon, a Kubernetes operator, and a CSI Node
              plugin for injecting modules into Kubernetes pods.
            grade: stable
            confinement: strict
            license: MIT
            publish: true
            channel_templates:
              - "latest/stable"
            apps:
              cfgd:
                command: cfgd
                plugs:
                  - home
                  - network
                  - network-bind

  # --- cfgd-operator: Kubernetes operator (Linux only, Docker + Helm) ---
  - name: cfgd-operator
    crates:
      - name: cfgd-operator
        path: crates/cfgd-operator
        tag_template: "operator-v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd-operator
            features: []
            targets:
              - x86_64-unknown-linux-gnu
              - aarch64-unknown-linux-gnu
        archives: false
        docker_v2:
          - id: cfgd-operator
            dockerfile: Dockerfile.operator.release
            images:
              - "ghcr.io/tj-smith47/cfgd-operator"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "latest"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "Kubernetes operator for cfgd"
              org.opencontainers.image.licenses: "MIT"
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        docker_manifests:
          - name_template: "ghcr.io/tj-smith47/cfgd-operator:{{ Version }}"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-operator:{{ Version }}-amd64"
              - "ghcr.io/tj-smith47/cfgd-operator:{{ Version }}-arm64"
          - name_template: "ghcr.io/tj-smith47/cfgd-operator:latest"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-operator:latest-amd64"
              - "ghcr.io/tj-smith47/cfgd-operator:latest-arm64"
        docker_digest:
          name_template: "cfgd-operator_{{ .Tag }}.digest"
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: false
          mode: keep-existing
          target_commitish: "{{ .Commit }}"
          replace_existing_draft: false
          replace_existing_artifacts: true
          name_template: "{{ ProjectName }} {{ Tag }}"
          header: |
            ## What's new in {{ .Tag }} (operator)
          footer: |
            ---
            Released with [anodizer](https://github.com/tj-smith47/anodizer)
          include_meta: true
        # Inherits `publish.cargo: { index_timeout: 600 }` from defaults
        # (the operator opts in to crates.io publishing through the same slot).

  # --- cfgd-csi: CSI Node plugin (Linux only, Docker) ---
  - name: cfgd-csi
    crates:
      - name: cfgd-csi
        path: crates/cfgd-csi
        tag_template: "csi-v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd-csi
            features: []
            targets:
              - x86_64-unknown-linux-gnu
              - aarch64-unknown-linux-gnu
        archives: false
        docker_v2:
          - id: cfgd-csi
            dockerfile: Dockerfile.csi.release
            images:
              - "ghcr.io/tj-smith47/cfgd-csi"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "latest"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "CSI Node plugin for cfgd module injection into Kubernetes pods"
              org.opencontainers.image.licenses: "MIT"
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        docker_manifests:
          - name_template: "ghcr.io/tj-smith47/cfgd-csi:{{ Version }}"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-csi:{{ Version }}-amd64"
              - "ghcr.io/tj-smith47/cfgd-csi:{{ Version }}-arm64"
          - name_template: "ghcr.io/tj-smith47/cfgd-csi:latest"
            image_templates:
              - "ghcr.io/tj-smith47/cfgd-csi:latest-amd64"
              - "ghcr.io/tj-smith47/cfgd-csi:latest-arm64"
        docker_digest:
          name_template: "cfgd-csi_{{ .Tag }}.digest"
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: false
          mode: keep-existing
          target_commitish: "{{ .Commit }}"
          replace_existing_draft: false
          replace_existing_artifacts: true
          name_template: "{{ ProjectName }} {{ Tag }}"
          header: |
            ## What's new in {{ .Tag }} (CSI node plugin)
          footer: |
            ---
            Released with [anodizer](https://github.com/tj-smith47/anodizer)
          include_meta: true
        # Inherits `publish.cargo: { index_timeout: 600 }` from defaults
        # (the CSI node plugin opts in to crates.io publishing through the
        # same slot).

changelog:
  use: github-native
  title: "Changelog"
  header: "# Changelog for {{ ProjectName }}"
  divider: "---"
  sort: asc
  abbrev: 12
  format: "* {{ .SHA }} {{ .Message }} ({{ .AuthorUsername }})"
  paths:
    - "crates/**"
    - "Cargo.toml"
    - "Cargo.lock"
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Others
      order: 999
  footer: |
    _Generated by anodizer._

# GPG + cosign signing for checksums / source / archives.
# Cosign signatures on checksums give consumers a publisher-compromise-resistant
# verification path: `cosign verify-blob --bundle checksums.txt.cosign.bundle
# --certificate-identity-regexp '...' checksums.txt` then `sha256sum -c` per
# downloaded artifact. GPG signatures remain for package-manager integrations
# (Homebrew cask, RPM, etc.) that already consume detached GPG sigs.
signs:
  - id: default
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"
    env:
      - "GPG_TTY={{ Env.GPG_TTY }}"
    if_condition: "{{ not .IsSnapshot }}"
  - id: checksum-cosign
    artifacts: checksum
    signature: "{{ .Artifact }}.cosign.bundle"
    cmd: cosign
    args:
      - "sign-blob"
      - "--key=env://COSIGN_KEY"
      - "--bundle={{ Signature }}"
      - "--yes"
      - "{{ Artifact }}"
    env:
      - "COSIGN_EXPERIMENTAL=1"
    if_condition: "{{ not .IsSnapshot }}"
  - id: source
    artifacts: source
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"
    env:
      - "GPG_TTY={{ Env.GPG_TTY }}"
    if_condition: "{{ not .IsSnapshot }}"

# Cosign-based binary signing for the cfgd CLI binary.
binary_signs:
  - id: default
    artifacts: binary
    cmd: cosign
    args:
      - "sign-blob"
      - "--key=env://COSIGN_KEY"
      - "--bundle={{ Signature }}"
      - "--yes"
      - "{{ Artifact }}"
    env:
      - "COSIGN_EXPERIMENTAL=1"
    if_condition: "{{ not .IsSnapshot }}"

# Cosign-based Docker image signing for all 3 images.
docker_signs:
  - id: default
    artifacts: manifests
    cmd: cosign
    args:
      - "sign"
      - "--key=env://COSIGN_KEY"
      - "--yes"
      - "{{ Artifact }}"
    env:
      - "COSIGN_EXPERIMENTAL=1"
    if_condition: "{{ not .IsSnapshot }}"

source:
  enabled: true
  format: tar.gz
  name_template: "{{ ProjectName }}-{{ Version }}-source"
  prefix_template: "{{ ProjectName }}-{{ Version }}/"
  files:
    - "crates/**/*.rs"
    - "Cargo.toml"
    - "Cargo.lock"
    - "LICENSE"
    - "README.md"

sboms:
  - id: default
    enabled: true
    cmd: syft
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "{{ .ArtifactName }}.cdx.json"
    artifacts: archive
    env:
      - "SYFT_QUIET=true"

# Public MCP registry entry. Auth uses the workflow's `id-token: write`
# (github-oidc); the OCI package points at the multi-arch image already
# pushed by `docker_v2`.
mcp:
  name: io.github.tj-smith47/cfgd
  description: "Declarative, GitOps-style machine configuration management"
  homepage: "https://github.com/tj-smith47/cfgd"
  repository:
    url: "https://github.com/tj-smith47/cfgd"
    source: github
  packages:
    - registry_type: oci
      identifier: "ghcr.io/tj-smith47/cfgd:{{ .Version }}"
      transport:
        type: stdio
  auth:
    type: github-oidc

# Source RPM (exercised by anodizer; dogfooded here too).
srpm:
  enabled: true
  package_name: cfgd
  spec_file: cfgd.spec
  file_name_template: "{{ ProjectName }}-{{ RawVersion }}-1.src.rpm"

# CloudSmith publisher — uploads nfpm-built deb/rpm/apk artifacts to a
# generic repo (distribution-agnostic so one repo serves all package formats).
cloudsmiths:
  - organization: jarvispro
    repository: cfgd
    formats: [deb, rpm, alpine]
    distributions:
      deb: any-distro/any-version
      rpm: any-distro/any-version
      alpine: alpine/any-version

# Curl-pipe install script — rendered with the version baked in and uploaded
# as a release asset.
template_files:
  - id: install-script
    src: scripts/install.sh.tpl
    dst: install.sh
    mode: "0755"

partial:
  by: goos

announce:
  webhook:
    enabled: true
    endpoint_url: "https://tj.jarvispro.io/webhooks/anodizer"
    content_type: application/json
    message_template: '{"project":"{{ ProjectName }}","tag":"{{ Tag }}","url":"{{ ReleaseURL }}"}'
    headers:
      X-Anodizer-Source: "release"
    skip_tls_verify: false
    expected_status_codes:
      - 200
      - 202
  email:
    enabled: true
    host: smtp.gmail.com
    port: 587
    username: toss45@gmail.com
    from: toss45@gmail.com
    to:
      - "tj@jarvispro.io"
    subject_template: "{{ ProjectName }} {{ Tag }} released"
    message_template: "{{ ProjectName }} {{ Tag }} is now available at {{ ReleaseURL }}"
    encryption: starttls
    insecure_skip_verify: false
