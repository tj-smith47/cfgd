# yaml-language-server: $schema=https://tj-smith47.github.io/anodizer/schema.json
# cfgd — declarative, GitOps-style machine configuration management.
# Dogfoods every anodizer feature that applies to cfgd's 4-workspace monorepo.
# Templates use Tera syntax with Go-style compat.

version: 2
project_name: cfgd
dist: ./dist

# Compose self-contained config fragments. The announce matrix lives in its own
# file; anodizer merges includes as defaults beneath this root config.
includes:
  - from_file:
      path: .anodizer/announce.yaml

report_sizes: true

env:
  - REGISTRY=ghcr.io
  - RELEASE_TYPE=stable

git:
  tag_sort: "smartsemver"
  ignore_tags:
    - "nightly"
  ignore_tag_prefixes:
    - "draft-"
  prerelease_suffix: "-"

tag:
  # Require an explicit bump signal per commit range. Release-worthy signals
  # are `#major` / `#minor` / `#patch` tokens OR Conventional Commit markers
  # (`feat:` -> minor, `fix:` / `perf:` / `revert:` -> patch, `BREAKING CHANGE`
  # footer or `<type>!:` shorthand -> major). Ranges containing only chore /
  # docs / style / refactor / test / build / ci commits no-op, so autotag
  # won't mint a spurious patch bump after a stable crate's test or chore
  # touch.
  default_bump: none
  # Scan the full commit range between the last tag and HEAD (per crate path)
  # so a release-worthy `fix:` / `feat:` / `BREAKING CHANGE` commit further
  # back in the range still triggers the bump even if the most recent commit
  # touching that path is a chore. `last` mode only inspects the single most
  # recent commit per path, which silently drops release signals in monorepo
  # autotag flows where multiple commits land between tags.
  branch_history: full
  tag_prefix: "v"
  release_branches:
    - master
  initial_version: "0.5.0"

metadata:
  # homepage / license / maintainers are derived from [workspace.package]
  # (repository=homepage fallback, license=MIT OR Apache-2.0, authors=["TJ Smith"]) — all
  # four crates resolve identically without restating them here. `description`
  # is retained because each crate's Cargo `description` differs from this
  # uniform project line; dropping it would let publishers without an explicit
  # description fall through to per-crate Cargo descriptions and drift.
  description: "Declarative, GitOps-style machine configuration management"
  # Hosted user-docs tree — surfaced by publishers that render a docs link.
  documentation: "https://github.com/tj-smith47/cfgd/tree/master/docs"
  mod_timestamp: "{{ CommitTimestamp }}"
  full_description:
    from_file: README.md
  commit_author:
    name: TJ Smith
    email: tj@jarvispro.io

defaults:
  targets:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
    - x86_64-apple-darwin
    - aarch64-apple-darwin
    - x86_64-pc-windows-msvc
    - aarch64-pc-windows-msvc
  cross: auto
  builds:
    reproducible: true
    flags:
      - --release
  archives:
    formats: [tar.gz]
    format_overrides:
      - os: windows
        formats: [zip]
    hooks:
      before:
        - "echo packing {{ ProjectName }} {{ Tag }} format={{ Format }}"
      after:
        - "echo packed {{ ProjectName }} {{ Tag }} format={{ Format }}"
  checksum:
    algorithm: sha256
  # All five workspaces opt into crates.io publishing with the same
  # 600s index timeout. Per-crate `publish.cargo: { skip: true }` would
  # suppress inheritance for that crate (DEC-9).
  publish:
    cargo:
      required: true
      retain_on_rollback: true
      index_timeout: 600
      # Per-crate tags fire independent Release.yml runs; downstream crates
      # (cfgd-operator depends on cfgd-core) would otherwise race the
      # crates.io sparse-index propagation and fail with "no matching
      # package". This gate polls the index for every workspace-internal
      # dep at its pinned version before invoking cargo publish.
      wait_for_workspace_deps:
        enabled: true
        poll_interval: 5s
        max_wait: 5m
    on_error:
      - cmd: "echo 'cfgd: publisher {{ .Publisher }} failed for {{ .Tag }}: {{ .Error }}'"

# UPX compression — shrinks binaries on targets UPX supports.
# macOS ARM is broken in recent UPX; exclude it.
upx:
  - id: default
    enabled: true
    binary: upx
    args:
      - "--best"
      - "--lzma"
    compress: "9"
    lzma: true
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - x86_64-pc-windows-msvc

# Self-extracting installer for Linux & macOS — bundles the binary
# with a small bootstrap script that installs it to /usr/local/bin.
# Top-level config (not per-crate); skipped automatically for library
# crates that produce no binaries.
makeselfs:
  # cfgd CLI (gnu) only. A self-extracting /usr/local/bin installer is meaningful
  # solely for the CLI; operator/csi are k8s-deployed (docker images + helm), and
  # the musl build is nfpm-package-only — so restricting to ids:[cfgd] both keeps
  # the installer CLI-only and prevents the musl linux-amd64 build from colliding
  # with the gnu one on the {Os}-{Arch} installer filename.
  - id: default
    ids: [cfgd]
    name: "cfgd Installer"
    script: scripts/makeself-install.sh
    filename: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}-installer.run"

after:
  hooks:
    - echo "Release complete for {{ ProjectName }} {{ Tag }}"

# Independent workspaces for per-component release cadences.
workspaces:
  # --- cfgd-crd: CRD spec types + schemars (crates.io only) ---
  # Publishes ahead of cfgd-core: cfgd-core's `crd` feature depends on cfgd-crd,
  # so the sparse index must carry the pinned cfgd-crd version before cfgd-core
  # publishes (cfgd-core's wait_for_workspace_deps poll then resolves promptly).
  - name: cfgd-crd
    skip:
      - announce
    crates:
      - name: cfgd-crd
        path: crates/cfgd-crd
        tag_template: "crd-v{{ Version }}"
        version_sync:
          enabled: true
          mode: cargo
        # Inherits `publish.cargo: { index_timeout: 600 }` from defaults.
        # cfgd-crd is a pure library with zero bin targets, so it produces no
        # binary release artifact. Skip the binary build leg explicitly; this
        # crate ships only as a crates.io library (mirrors cfgd-core).
        builds:
          - id: cfgd-crd
            skip: true

  # --- cfgd-core: shared library (crates.io only) ---
  - name: cfgd-core
    skip:
      - announce
    crates:
      - name: cfgd-core
        path: crates/cfgd-core
        tag_template: "core-v{{ Version }}"
        depends_on: [cfgd-crd]
        version_sync:
          enabled: true
          mode: cargo
        # Inherits `publish.cargo: { index_timeout: 600 }` from defaults.
        # cfgd-core ships only as a crates.io library. Its src/bin entries
        # (cfgd-gen-schemas, fake-cosign) are CI-internal codegen/mock tools,
        # not release artifacts. Skip the binary build leg so an unscoped
        # `cargo build` never compiles those internal bins into release
        # artifacts and uploads them.
        builds:
          - id: cfgd-core
            skip: true

  # --- cfgd CLI: cross-platform binary + kubectl plugin ---
  - name: cfgd
    crates:
      - name: cfgd
        path: crates/cfgd
        tag_template: "v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        # Keep the user-facing download URLs and the Helm chart's appVersion in
        # lockstep with the cfgd crate version at tag time. Plain old→new string
        # rewrite of the cfgd crate version: the chart's own `version:` (0.1.0)
        # has a separate cadence and never matches, so it is left untouched.
        version_files:
          - docs/installation.md
          - docs/bootstrap.md
          - docs/skill.md
          - chart/cfgd/Chart.yaml
        builds:
          # gnu build → tarballs / binstall / homebrew cask / makeself installer
          # (dynamic glibc, the native experience for direct downloads).
          # Inherits defaults.targets (the six gnu/darwin/windows triples).
          - id: cfgd
            binary: cfgd
            features: []
            no_default_features: false
          # musl build → feeds ONLY the nfpm Linux packages (deb/rpm/apk). A static
          # musl binary carries no glibc dependency, so those packages install and
          # run on every Linux distro: Alpine (apk) and ANY glibc distro including
          # old EL7/EL8/EL9 + AL2 and LTS releases (deb/rpm) that sit below the gnu
          # build-host glibc floor and would otherwise get an unrunnable binary.
          # Cross-compiled by cargo-zigbuild (defaults.cross: auto detects it).
          - id: cfgd-musl
            binary: cfgd
            features: []
            no_default_features: false
            targets:
              - x86_64-unknown-linux-musl
        archives:
          # gnu only: the musl build is package-only (nfpm), never a standalone
          # tarball, so binstall/homebrew/install.sh asset names never gain a musl
          # variant and the existing linux-amd64 archive name is unchanged.
          - ids: [cfgd]
            name_template: "{{ ProjectName }}-{{ Version }}-{{ Os }}-{{ Arch }}"
            formats: [tar.gz]
            format_overrides:
              - os: windows
                formats: [zip]
            files:
              # LICENSE first: anodizer's krew renderer (derive_krew_files) picks the
              # first archive file whose basename starts with "license" and flattens it
              # to the plugin install dir preserving its name. krew's validator accepts
              # only LICENSE/LICENSE.txt/COPYING/COPYING.txt — a dual-license project
              # shipping only LICENSE-MIT/LICENSE-APACHE is rejected (v0.5.0 krew PR
              # closed on exactly this), so a krew-accepted `LICENSE` must lead the list.
              - LICENSE
              - LICENSE-MIT
              - LICENSE-APACHE
              - README.md
            # Generated once on the host binary (shell-/arch-agnostic) and
            # bundled into every archive. `cfgd completion <shell>` and
            # `cfgd man` emit to stdout; anodizer captures them to the
            # default dst (completions/ and man/man1/). The nix publisher's
            # extra_install consumes these from the unpacked archive.
            completions:
              generate: "{{ .ArtifactPath }} completion {{ .Shell }}"
              shells: [bash, zsh, fish, powershell]
            manpages:
              generate: "{{ .ArtifactPath }} man"
        checksum:
          name_template: "{{ ArtifactName }}.sha256"
          algorithm: sha256
          split: true
        # Single fat macOS binary from the two per-arch builds.
        universal_binaries:
          - name_template: "{{ ProjectName }}"
            replace: false
        binstall:
          # `enabled` alone triggers anodizer's per-target auto-derivation:
          # each override's pkg_url renders through the SAME archive
          # name_template the archive stage uses, so the URL can never drift
          # from the uploaded asset. The former hand-written pkg_url used a
          # `{ target }` rust-triple token that did NOT match the archive
          # name_template ({{ Os }}-{{ Arch }}, e.g. darwin-arm64), producing
          # 404-class URLs — dropping it lets the correct derivation take over.
          enabled: true
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: auto
          mode: keep-existing
          target_commitish: "{{ .Commit }}"
          discussion_category_name: "Announcements"
          replace_existing_draft: true
          replace_existing_artifacts: true
          name_template: "{{ ProjectName }} {{ Tag }}"
          header: |
            ## What's new in {{ .Tag }}
          footer: |
            ---
            Released with [anodizer](https://github.com/tj-smith47/anodizer)
          include_meta: true
          # Attach the apk-signing public key alongside the signed apk(s).
          # anodizer-action's `apk-private-key` input derives the pub key
          # from the private key and drops it into ./dist/. apk verifiers
          # install this file under /etc/apk/keys/ before `apk add`-ing a
          # signed package. `allow_empty: true` skips the glob silently
          # when the file is absent (local snapshot / dry-run flows where
          # no secret was provisioned).
          extra_files:
            - glob: "dist/*-apk-signing-key.rsa.pub"
              allow_empty: true
            # Single-file CRD bundle for a one-command, Helm-less install:
            #   kubectl apply -f .../releases/latest/download/cfgd-crds.yaml
            # Generated from the cfgd-crd spec types (task gen:crds) and
            # drift-guarded by gen:crds:check; committed, so the glob always
            # matches (a zero-match is a hard release error, which is desired).
            - glob: "schemas/crds.yaml"
              name_template: "cfgd-crds.yaml"
        publish:
          # `cargo:` inherits `index_timeout: 600` from defaults.publish.cargo.
          # Homebrew is handled exclusively via the top-level `homebrew_casks:` block.
          # Source (build-from-source) AUR package. cfgd's 4-crate workspace is
          # the lighter of the two repos to compile, so it hosts `aur_source`
          # while anodizer (~27 crates) ships binary-only via its own `aur`.
          aur_source:
            required: false
            git_url: "ssh://aur@aur.archlinux.org/cfgd.git"
            name: cfgd
            # description / homepage / license derived from metadata + Cargo.
            depends:
              - glibc
            optdepends:
              - "git: GitOps source sync from remote repositories"
            makedepends:
              - rust
              - cargo
            private_key: "{{ .Env.AUR_SSH_KEY }}"
            # Build only the cfgd binary crate — not the operator/csi crates —
            # so the from-source AUR build stays lean.
            build: |
              cargo build --release --locked -p cfgd
            # Install the binary, then generate man + completions from the freshly
            # built binary (cfgd emits both via its own subcommands). Keeps the
            # AUR package at parity with the nix/cask channels without depending
            # on a pre-bundled archive layout.
            package: |
              install -Dm755 "target/release/cfgd" "$pkgdir/usr/bin/cfgd"
              install -dm755 "$pkgdir/usr/share/man/man1" "$pkgdir/usr/share/bash-completion/completions" "$pkgdir/usr/share/zsh/site-functions" "$pkgdir/usr/share/fish/vendor_completions.d"
              "target/release/cfgd" man > "$pkgdir/usr/share/man/man1/cfgd.1"
              "target/release/cfgd" completion bash > "$pkgdir/usr/share/bash-completion/completions/cfgd"
              "target/release/cfgd" completion zsh > "$pkgdir/usr/share/zsh/site-functions/_cfgd"
              "target/release/cfgd" completion fish > "$pkgdir/usr/share/fish/vendor_completions.d/cfgd.fish"
            commit_msg_template: "cfgd {{ .Tag }}"
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
          scoop:
            required: false
            repository:
              owner: tj-smith47
              name: scoop-bucket
            # description / homepage / license derived from metadata + Cargo.
            # Let the scoop bucket auto-detect new releases from GitHub.
            checkver: github
            depends:
              - git
            shortcuts:
              - ["cfgd.exe", "cfgd"]
            commit_msg_template: "cfgd {{ .Tag }}"
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
          chocolatey:
            required: false
            repository:
              owner: tj-smith47
              name: cfgd
            title: "cfgd"
            summary: "Declarative, GitOps-style machine configuration management"
            # description / authors / license derived from metadata + Cargo.
            copyright: "Copyright © 2026 TJ Smith"
            require_license_acceptance: false
            project_url: "https://github.com/tj-smith47/cfgd"
            project_source_url: "https://github.com/tj-smith47/cfgd"
            package_source_url: "https://github.com/tj-smith47/cfgd/tree/{{ .Tag }}/crates/cfgd"
            docs_url: "https://github.com/tj-smith47/cfgd/blob/{{ .Tag }}/docs/configuration.md"
            bug_tracker_url: "https://github.com/tj-smith47/cfgd/issues"
            release_notes: "https://github.com/tj-smith47/cfgd/releases/tag/{{ .Tag }}"
            icon_url: "https://raw.githubusercontent.com/tj-smith47/cfgd/master/.github/gear.svg"
            tags:
              - configuration
              - gitops
              - reconciliation
              - rust
            republish_in_moderation: true
          winget:
            required: false
            repository:
              owner: tj-smith47
              name: winget-pkgs
            short_description: "GitOps-style machine config manager"
            # Short invoke alias shown as the package Moniker (`winget install cfgd`).
            moniker: "cfgd"
            # Rendered as the manifest's Documentations[] block so the winget / MS
            # Store UI links straight to the docs. silent_switch and upgrade_behavior
            # are intentionally unset: cfgd ships to winget as a portable zip, for
            # which InstallerSwitches.Silent does not apply and the default
            # UpgradeBehavior (install/overwrite) is already correct.
            documentations:
              - label: "Documentation"
                url: "https://github.com/tj-smith47/cfgd/tree/master/docs"
              - label: "Configuration Reference"
                url: "https://github.com/tj-smith47/cfgd/blob/master/docs/configuration.md"
            # description / homepage / license derived from metadata + Cargo.
            # `author` is kept: the winget renderer emits it verbatim with no
            # metadata fallback, so dropping it would omit the author entirely.
            author: "TJ Smith"
            copyright: "Copyright © 2026 TJ Smith"
            package_identifier: "TJSmith.cfgd"
            publisher: "TJ Smith"
            publisher_url: "https://github.com/tj-smith47"
            publisher_support_url: "https://github.com/tj-smith47/cfgd/issues"
            release_notes: "See release-notes URL for the full changelog."
            release_notes_url: "https://github.com/tj-smith47/cfgd/releases/tag/{{ .Tag }}"
            installation_notes: "Run `cfgd --help` after installation."
            tags:
              - configuration
              - gitops
              - reconciliation
              - rust
            commit_msg_template: "cfgd {{ .Tag }}"
            # Rust/MSVC binaries dynamically link against the VC++ 2015+
            # runtime. Without this dependency declared, winget's automated
            # validation fails at invocation time with STATUS_DLL_NOT_FOUND
            # (exit code -1073741515).
            dependencies:
              - package_identifier: "Microsoft.VCRedist.2015+.x64"
                architectures: ["x64"]
              - package_identifier: "Microsoft.VCRedist.2015+.arm64"
                architectures: ["arm64"]
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
            update_existing_pr: true
          nix:
            required: false
            name: cfgd
            repository:
              owner: tj-smith47
              name: nix-pkgs
            # homepage / description / license derived from metadata + Cargo.
            # The derived dual SPDX `MIT OR Apache-2.0` maps to the nix list
            # `with lib.licenses; [ mit asl20 ]` via anodizer's nix license
            # resolver (the `OR` expression is parsed and each id mapped).
            skip_upload: false
            formatter: alejandra
            main_program: cfgd
            # Long-form meta.longDescription (the one-line Cargo description remains
            # the short meta.description). `maintainers` is intentionally unset:
            # anodizer renders it as `with lib.maintainers; [ … ]`, which requires a
            # handle registered in nixpkgs lib.maintainers and none applies to this
            # personal overlay. `changelog` is left unset so anodizer derives the
            # per-tag releases URL automatically.
            long_description: |
              cfgd manages machine configuration the way GitOps manages clusters:
              declare packages, files, secrets, and system settings in
              version-controlled YAML, and cfgd diffs desired against actual state,
              plans the change set, and reconciles it — one-shot or continuously
              via its daemon. The same binary drives both workstation and
              Kubernetes-node providers.
            # Install the man page + shell completions that the archive stage
            # bundled (see the cfgd crate's archives.completions/manpages).
            # Paths are relative to the unpacked archive root.
            extra_install: |
              installManPage man/man1/cfgd.1
              installShellCompletion --bash completions/cfgd --zsh completions/_cfgd --fish completions/cfgd.fish
            post_install: |
              echo "Installed cfgd. Run 'cfgd init' to scaffold a config."
            commit_msg_template: "cfgd {{ .Tag }}"
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
          krew:
            required: true
            repository:
              owner: tj-smith47
              name: krew-index
            # Describes the kubectl-cfgd plugin surface (debug/exec/inject/
            # status in crates/cfgd/src/cli/plugin/), not the cfgd CLI: krew
            # ships only the plugin binary.
            # <=50 chars per krew review bot guidance.
            short_description: "Manage cfgd modules on pods and workloads."
            description: |
              kubectl-cfgd attaches cfgd modules — portable bundles of CLI
              tools, dotfiles, shell config, and packages — to running
              Kubernetes workloads without rebuilding the upstream image:

                kubectl cfgd inject deploy/web -m nvim:1.2  # patch template, roll out
                kubectl cfgd debug web-xyz -m nvim:1.2      # ephemeral debug container
                kubectl cfgd exec web-xyz -m nvim:1.2 -- nvim
                kubectl cfgd status                         # fleet-wide module status

              Modules are mounted by the cfgd CSI driver and admission webhook.
              To declare and reconcile local machine state, install the cfgd CLI.
            # homepage derived from metadata.homepage fallback (same URL).
            # `description` / `short_description` kept: plugin-specific krew-review
            # copy, distinct from the project-wide one-line Cargo description.
            # Commit as the release engineer's GH-verified identity so CNCF
            # EasyCLA matches the PR to the signed individual CLA. Default
            # bot@anodizer.dev has no GitHub account and always fails the CLA.
            commit_author:
              name: "TJ Smith"
              email: "tj@jarvispro.io"
            update_existing_pr: true
        # Docker V2 image for the cfgd agent (CLI + daemon image).
        dockers_v2:
          - id: cfgd-agent
            dockerfile: Dockerfile.agent.release
            images:
              - "ghcr.io/tj-smith47/cfgd"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              # `latest` only on real releases; a rolling `nightly` tag on
              # --nightly (Version already carries the nightly version). The
              # IsNightly conditionals render empty in the off case and anodizer
              # drops empty-rendered tags.
              - "{{ if not .IsNightly }}latest{{ end }}"
              - "{{ if .IsNightly }}nightly{{ end }}"
            platforms:
              - linux/amd64
              - linux/arm64
            labels:
              io.modelcontextprotocol.server.name: io.github.tj-smith47/cfgd
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "Declarative, GitOps-style machine configuration management"
              org.opencontainers.image.licenses: "MIT OR Apache-2.0"
            # Inject the standard org.opencontainers.image.* labels (created,
            # source, revision, version, …) on top of the explicit annotations
            # above, so `docker inspect` and registry UIs show full provenance.
            oci_labels: true
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        # No docker_manifests needed: multi-platform dockers_v2 pushes a native
        # multi-arch manifest per tag.
        docker_digest:
          name_template: "cfgd_{{ .Tag }}.digest"
        nfpm:
          # Every Linux native package is built from the STATIC musl binary
          # (ids: [cfgd-musl]). A static binary has no shared-libc dependency, so
          # one set of deb/rpm/apk installs and runs on every distro — Alpine
          # (apk) and any glibc distro incl. those below the gnu build-host floor
          # (old EL7/8/9 + AL2 via rpm/yum, LTS via deb). The gnu build stays for
          # tarballs/binstall/homebrew (ids:[cfgd]); it is excluded here so deb/rpm
          # never carry an unrunnable-on-old-glibc binary.
          - id: default
            package_name: cfgd
            ids: [cfgd-musl]
            formats:
              - deb
              - rpm
              - apk
            vendor: "TJ Smith"
            # homepage / description / license derived from metadata + Cargo.
            # `maintainer` is kept: it carries the email
            # ("TJ Smith <tj@jarvispro.io>") while the derived value
            # (Cargo authors = "TJ Smith") has none — dropping would drift.
            maintainer: "TJ Smith <tj@jarvispro.io>"
            bindir: /usr/bin
            section: utils
            priority: optional
            epoch: "1"
            release: "1"
            umask: "0o002"
            mtime: "{{ CommitDate }}"
            recommends:
              - git
            # No `provides: [cfgd]`: a package already provides its own name on
            # deb/rpm/apk, and on apk a self-provide is rejected as a conflict
            # (`conflicts: cfgd[cfgd]`), making the package uninstallable.
            file_name_template: "{{ ProjectName }}_{{ RawVersion }}_{{ Os }}_{{ Arch }}"
            contents:
              - src: LICENSE-MIT
                dst: /usr/share/doc/cfgd/LICENSE-MIT
              - src: LICENSE-APACHE
                dst: /usr/share/doc/cfgd/LICENSE-APACHE
              - src: README.md
                dst: /usr/share/doc/cfgd/README.md
              # Man page + shell completions the archive stage generated into
              # dist/.manpages|.completions/cfgd/ (the single source of truth it
              # shares with nfpm). PowerShell completion is archive-only; the
              # Linux packages carry bash/zsh/fish + the man page.
              - src: dist/.manpages/cfgd/cfgd.1
                dst: /usr/share/man/man1/cfgd.1
              - src: dist/.completions/cfgd/cfgd
                dst: /usr/share/bash-completion/completions/cfgd
              - src: dist/.completions/cfgd/_cfgd
                dst: /usr/share/zsh/site-functions/_cfgd
              - src: dist/.completions/cfgd/cfgd.fish
                dst: /usr/share/fish/vendor_completions.d/cfgd.fish
              # System daemon unit (system scope). Byte-identical to what
              # `cfgd daemon install --scope system` generates for a /usr/bin
              # install — pinned by the systemd_unit_matches_packaged_unit guard
              # test in cfgd-core so a generator change can't drift the package.
              - src: packaging/systemd/cfgd.service
                dst: /usr/lib/systemd/system/cfgd.service
              # Default daemon config as a conffile: operator edits survive
              # upgrades (deb conffile / rpm %config(noreplace)).
              - src: packaging/cfgd.system.yaml
                dst: /etc/cfgd/config.yaml
                type: "config|noreplace"
            # Lifecycle scripts enable the unit on install (NOT start — the
            # operator reviews /etc/cfgd/config.yaml first) and disable+stop it
            # on a real removal. No-op on non-systemd hosts.
            scripts:
              postinstall: packaging/nfpm/postinstall.sh
              preremove: packaging/nfpm/preremove.sh
              postremove: packaging/nfpm/postremove.sh
            # GPG signing for deb / rpm / apk packages.
            # Requires `GPG_KEY_PATH` env pointing at an exported secret key
            # file. anodizer-action wires this automatically when
            # `gpg-private-key` is supplied; locally:
            #   gpg --export-secret-keys --armor <fingerprint> > ~/.gnupg/cfgd-signing.asc
            #   export GPG_KEY_PATH=~/.gnupg/cfgd-signing.asc
            deb:
              signature:
                key_file: "{{ .Env.GPG_KEY_PATH }}"
                type: origin
            rpm:
              group: Development/Tools
              packager: "TJ Smith <tj@jarvispro.io>"
              signature:
                key_file: "{{ .Env.GPG_KEY_PATH }}"
            apk:
              signature:
                # apk-tools uses RSA-PSS, not OpenPGP. nfpm's apk packager
                # parses the key via Go's `pem.Decode`, so the file at this
                # path must be a raw PEM RSA private key (not the GPG-armored
                # block that deb / rpm consume). Provisioned by the
                # `apk-private-key` input on anodizer-action.
                key_file: "{{ .Env.APK_PRIVATE_KEY_PATH }}"
        snapcrafts:
          - id: default
            # gnu only, mirroring `archives`: the musl build is package-only
            # (nfpm) and shares the linux-amd64 platform, so without this filter
            # both the gnu and musl builds render the same `cfgd_<v>_linux_amd64.snap`
            # path and collide. The snap ships the `cfgd` binary alone.
            ids: [cfgd]
            name: cfgd
            title: "cfgd"
            icon: ".github/gear.svg"
            base: core24
            summary: "Declarative, GitOps-style machine configuration management"
            # Scope: this snap contains only the `cfgd` binary (CLI + daemon
            # mode); the operator and CSI plugin ship as container images.
            description: |
              cfgd is a declarative, GitOps-style machine configuration tool.
              You declare packages, files, secrets, and system settings in
              version-controlled YAML; cfgd diffs desired against actual state,
              plans, and reconciles — one-shot or continuously via its daemon.
            grade: stable
            # classic: cfgd configures the whole machine — it reads hidden paths
            # (.git, dotfiles), writes outside $HOME, and execs external binaries,
            # all of which strict confinement plus the home/network plugs block.
            # Classic is the devtool convention; it needs a one-time Snap Store
            # manual review before upload. Plugs are omitted because classic snaps
            # run unconfined (snapd ignores the interface system under classic).
            confinement: classic
            license: MIT OR Apache-2.0
            publish: true
            channel_templates:
              - "latest/stable"
            apps:
              cfgd:
                command: cfgd
              # System-scope reconcile daemon. install_mode: disable mirrors the
              # deb/rpm policy — the unit is registered but never auto-started, so
              # the snap can't reconcile the machine until the operator opts in
              # (`snap start cfgd.daemon`). Classic confinement runs it unconfined
              # as root, which machine reconciliation requires.
              daemon:
                command: cfgd --scope system --quiet daemon
                daemon: simple
                install_mode: disable
                restart_condition: on-failure

  # --- cfgd-operator: Kubernetes operator (Linux only, Docker + Helm) ---
  - name: cfgd-operator
    crates:
      - name: cfgd-operator
        path: crates/cfgd-operator
        tag_template: "operator-v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd-operator
            features: []
            targets:
              - x86_64-unknown-linux-gnu
              - aarch64-unknown-linux-gnu
        archives: false
        dockers_v2:
          - id: cfgd-operator
            dockerfile: Dockerfile.operator.release
            images:
              - "ghcr.io/tj-smith47/cfgd-operator"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "{{ if not .IsNightly }}latest{{ end }}"
              - "{{ if .IsNightly }}nightly{{ end }}"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "Kubernetes operator for cfgd"
              org.opencontainers.image.licenses: "MIT OR Apache-2.0"
            # Inject the standard org.opencontainers.image.* labels (created,
            # source, revision, version, …) on top of the explicit annotations
            # above, so `docker inspect` and registry UIs show full provenance.
            oci_labels: true
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        # No docker_manifests needed: multi-platform dockers_v2 pushes a native
        # multi-arch manifest per tag.
        docker_digest:
          name_template: "cfgd-operator_{{ .Tag }}.digest"
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: false
          mode: keep-existing
          target_commitish: "{{ .Commit }}"
          replace_existing_draft: true
          replace_existing_artifacts: true
          name_template: "{{ ProjectName }} {{ Tag }}"
          header: |
            ## What's new in {{ .Tag }} (operator)
          footer: |
            ---
            Released with [anodizer](https://github.com/tj-smith47/anodizer)
          include_meta: true
        # Inherits `publish.cargo: { index_timeout: 600 }` from defaults
        # (the operator opts in to crates.io publishing through the same slot).

  # --- cfgd-csi: CSI Node plugin (Linux only, Docker) ---
  - name: cfgd-csi
    crates:
      - name: cfgd-csi
        path: crates/cfgd-csi
        tag_template: "csi-v{{ Version }}"
        depends_on: [cfgd-core]
        version_sync:
          enabled: true
          mode: cargo
        builds:
          - binary: cfgd-csi
            features: []
            targets:
              - x86_64-unknown-linux-gnu
              - aarch64-unknown-linux-gnu
        archives: false
        dockers_v2:
          - id: cfgd-csi
            dockerfile: Dockerfile.csi.release
            images:
              - "ghcr.io/tj-smith47/cfgd-csi"
            tags:
              - "{{ Version }}"
              - "v{{ Version }}"
              - "{{ if not .IsNightly }}latest{{ end }}"
              - "{{ if .IsNightly }}nightly{{ end }}"
            platforms:
              - linux/amd64
              - linux/arm64
            annotations:
              org.opencontainers.image.source: "https://github.com/tj-smith47/cfgd"
              org.opencontainers.image.description: "CSI Node plugin for cfgd module injection into Kubernetes pods"
              org.opencontainers.image.licenses: "MIT OR Apache-2.0"
            # Inject the standard org.opencontainers.image.* labels (created,
            # source, revision, version, …) on top of the explicit annotations
            # above, so `docker inspect` and registry UIs show full provenance.
            oci_labels: true
            build_args:
              VERSION: "{{ Version }}"
            sbom: true
        # No docker_manifests needed: multi-platform dockers_v2 pushes a native
        # multi-arch manifest per tag.
        docker_digest:
          name_template: "cfgd-csi_{{ .Tag }}.digest"
        release:
          github:
            owner: tj-smith47
            name: cfgd
          draft: false
          prerelease: auto
          make_latest: false
          mode: keep-existing
          target_commitish: "{{ .Commit }}"
          replace_existing_draft: true
          replace_existing_artifacts: true
          name_template: "{{ ProjectName }} {{ Tag }}"
          header: |
            ## What's new in {{ .Tag }} (CSI node plugin)
          footer: |
            ---
            Released with [anodizer](https://github.com/tj-smith47/anodizer)
          include_meta: true
        # Inherits `publish.cargo: { index_timeout: 600 }` from defaults
        # (the CSI node plugin opts in to crates.io publishing through the
        # same slot).

# Register cfgd's editor-config JSON schemas with SchemaStore so editors offer
# completion/validation for cfgd.yaml, module, profile, and source files out of
# the box. Vendor mode: anodizer copies each schema into the SchemaStore fork
# and opens one upstream PR per release. The module + profile file_match globs
# follow cfgd's canonical bundle layout — a manifest with a fixed filename inside
# a per-entity directory: modules/<name>/module.yaml and profiles/<name>/profile.yaml.
# The bundle glob shape (filename + dir double anchor, e.g. **/profiles/*/profile.yaml)
# is deliberate: anchoring on BOTH the parent dir and the fixed manifest filename
# yields zero false positives and survives a workspace-root vendored catalog
# (empirically verified vs SchemaStore's own minimatch).
# Profiles additionally carry the legacy flat globs (**/profiles/*.yaml|yml) until
# 1.0: every ≤v0.5.x scaffold is a flat file with NO schema modeline, so dropping
# the glob silently strips editor validation from all existing configs. In
# minimatch a lone `*` never crosses `/`, so the flat glob matches only direct
# children of a profiles/ dir — it cannot misfire on the two-segment bundle path
# profiles/<name>/profile.yaml. Modules have always been bundle-only
# (modules/<name>/module.yaml); no flat glob exists to carry.
# cfgd-module is draft-2020-12, so its catalog entry is added to the
# highSchemaVersion list automatically.
schemastore:
  # Retain the SchemaStore registration even if a downstream required publisher
  # fails and the release rolls back. Safe because the publisher is idempotent
  # and self-healing: the next release's pre-clone probe re-renders the catalog,
  # overwrites the same entry, and (with versioned: true) carries the version in
  # the vendored filename while merging prior versions forward in `versions`. A
  # stale entry from a rolled-back release is corrected on the next publish
  # rather than left dangling, so undoing it on rollback (closing/reverting the
  # upstream PR) would only churn the SchemaStore repo for no durability gain.
  retain_on_rollback: true
  # Vendor a version-suffixed copy of each schema (cfgd-config-<ver>.json)
  # plus a `versions` map alongside the unversioned entry, so an editor can pin
  # validation to the schema shipped with a specific cfgd release. cfgd is the
  # only workspace here that registers editor-config schemas, so it is the sole
  # place this can be dogfooded.
  versioned: true
  repository:
    owner: tj-smith47
    name: schemastore
  schemas:
    - name: cfgd Config
      crate: cfgd
      description: "cfgd root configuration file (cfgd.yaml)"
      file_match: ["cfgd.yaml", "cfgd.yml"]
      schema_file: schemas/cfgd-config.schema.json
    - name: cfgd Module
      crate: cfgd
      description: "cfgd Module definition document"
      file_match: ["**/modules/*/module.yaml"]
      schema_file: schemas/cfgd-module.schema.json
    - name: cfgd Profile
      crate: cfgd
      description: "cfgd Profile definition document"
      file_match:
        ["**/profiles/*/profile.yaml", "**/profiles/*.yaml", "**/profiles/*.yml"]
      schema_file: schemas/cfgd-profile.schema.json
    - name: cfgd ConfigSource
      crate: cfgd
      description: "cfgd multi-source configuration manifest (cfgd-source.yaml)"
      file_match: ["cfgd-source.yaml", "cfgd-source.yml"]
      schema_file: schemas/cfgd-source.schema.json

changelog:
  use: git
  title: "Changelog"
  header: "# Changelog for {{ ProjectName }}"
  divider: "---"
  sort: asc
  abbrev: 12
  format: "* {{ .SHA }} {{ .Message }} ({{ .AuthorUsername }})"
  # Per-crate CHANGELOG.md files, one per workspace crate, refreshed and promoted
  # as part of `anodizer tag --changelog` in the release workflow. Each track's
  # scope is derived from its crate path, so no `paths:` intersect filter is
  # needed.
  files:
    per_crate: true
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Others
      order: 999
  footer: |
    _Generated by anodizer._

# SLSA build-provenance. `subjects` mode (the default) writes
# dist/attestation-subjects.json — the derived {name, sha256} set over every
# release-uploadable artifact — which anodizer-action feeds to GitHub's
# actions/attest-build-provenance to mint an OIDC-backed, GitHub-trusted
# attestation. No key and no asset of our own; the workflow already grants
# id-token: write (used for the MCP registry + keyless cosign) which the
# attest step reuses.
attestations:
  enabled: true

# GPG + keyless-cosign signing for checksums / source / archives.
# Cosign signs blobs keyless (Fulcio/OIDC + Rekor) using ambient GitHub Actions
# OIDC — no private key, no published cosign.pub. This gives consumers a
# publisher-compromise-resistant verification path that the `cfgd upgrade`
# self-update client exercises per artifact:
#   cosign verify-blob \
#     --bundle <archive>.sha256.cosign.bundle \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate-identity-regexp '^https://github\.com/tj-smith47/cfgd/\.github/workflows/(publish-crate\.ya?ml@refs/heads/master$|release\.ya?ml@refs/tags/v[0-9]|nightly\.ya?ml@refs/heads/master$)' \
#     <archive>.sha256
# then `sha256sum -c <archive>.sha256`. A standalone cert is also emitted
# (`<archive>.sha256.cosign.pem`) so a verifier that can't read the bundle's
# embedded cert can still pass it via `--certificate`. GPG signatures remain
# for package-manager integrations (Homebrew cask, RPM, etc.) that already
# consume detached GPG sigs.
signs:
  - id: default
    artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"
    if: "{{ not .IsSnapshot }}"
  - id: checksum-cosign
    artifacts: checksum
    signature: "{{ .Artifact }}.cosign.bundle"
    certificate: "{{ .Artifact }}.cosign.pem"
    cmd: cosign
    args:
      - "sign-blob"
      - "--bundle={{ Signature }}"
      - "--output-certificate={{ .Certificate }}"
      - "--yes"
      - "{{ Artifact }}"
    if: "{{ not .IsSnapshot }}"
  - id: source
    artifacts: source
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ Env.GPG_FINGERPRINT }}"
      - "--output"
      - "{{ Signature }}"
      - "--detach-sig"
      - "{{ Artifact }}"
    if: "{{ not .IsSnapshot }}"

# Cosign-based binary signing for the cfgd CLI binary.
binary_signs:
  - id: default
    artifacts: binary
    signature: "{{ .Artifact }}.cosign.bundle"
    certificate: "{{ .Artifact }}.cosign.pem"
    cmd: cosign
    args:
      - "sign-blob"
      - "--bundle={{ Signature }}"
      - "--output-certificate={{ .Certificate }}"
      - "--yes"
      - "{{ Artifact }}"
    if: "{{ not .IsSnapshot }}"

# Cosign-based Docker image signing for all 3 images.
docker_signs:
  - id: default
    artifacts: manifests
    cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "{{ Artifact }}"
    if: "{{ not .IsSnapshot }}"

source:
  enabled: true
  format: tar.gz
  name_template: "{{ ProjectName }}-{{ Version }}-source"
  prefix_template: "{{ ProjectName }}-{{ Version }}/"
  files:
    - "crates/**/*.rs"
    - "Cargo.toml"
    - "Cargo.lock"
    - "LICENSE-MIT"
    - "LICENSE-APACHE"
    - "README.md"

sboms:
  - id: default
    cmd: syft
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "{{ .ArtifactName }}.cdx.json"
    artifacts: archive
    env:
      - "SYFT_QUIET=true"

# Public MCP registry entry. Auth uses the workflow's `id-token: write`
# (github-oidc); the OCI package points at the multi-arch image already
# pushed by `dockers_v2`.
mcp:
  # Retain the MCP registry entry even if a downstream required publisher fails
  # and the release rolls back. Safe because the registry is strongly idempotent:
  # a re-POST of an existing version is rejected (400 "duplicate version" →
  # AlreadyPublished no-op), and the next release publishes the new version,
  # overwriting the catalog pointer. The OCI package this entry references lives
  # on ghcr (pushed by dockers_v2, immutable per tag), not in a deletable
  # GitHub release asset, so a retained pointer from a rolled-back release still
  # resolves and is superseded on the next publish — undoing it (PATCH version
  # to "deleted") would only remove a self-healing entry for no durability gain.
  retain_on_rollback: true
  name: io.github.tj-smith47/cfgd
  # description / homepage derived from the owning crate's (cfgd) metadata.
  repository:
    url: "https://github.com/tj-smith47/cfgd"
    source: github
  packages:
    - registry_type: oci
      identifier: "ghcr.io/tj-smith47/cfgd:{{ .Version }}"
      transport:
        type: stdio
  auth:
    type: github-oidc

# Source RPM (exercised by anodizer; dogfooded here too).
srpm:
  enabled: true
  package_name: cfgd
  spec_file: cfgd.spec
  file_name_template: "{{ ProjectName }}-{{ RawVersion }}-1.src.rpm"

# CloudSmith publisher — uploads nfpm-built deb/rpm/apk artifacts to a
# generic repo (distribution-agnostic so one repo serves all package formats).
cloudsmiths:
  - required: false
    organization: jarvispro
    repository: cfgd
    formats: [deb, rpm, alpine]
    distributions:
      deb: any-distro/any-version
      rpm: any-distro/any-version
      alpine: alpine/any-version
    republish: true

# Curl-pipe install script — rendered with the version baked in and uploaded
# as a release asset.
template_files:
  - id: install-script
    src: scripts/install.sh.tpl
    dst: install.sh
    mode: "0755"

# Top-level homebrew_casks block (GR v2.16+ supported path).
# homebrew_casks: is the sole Homebrew publication path; publish.homebrew: has been removed.
homebrew_casks:
  - required: true
    repository:
      owner: tj-smith47
      name: homebrew-tap
    directory: Casks
    # Auto-detect new upstream versions from the GitHub releases feed so
    # `brew livecheck` and bump bots see updates. skip: false opts out of the
    # default skip anodizer applies to casks that declare no strategy.
    livecheck:
      strategy: github_latest
      url: homepage
      skip: false
    # description / homepage derived from metadata + Cargo. `license` dropped:
    # the Homebrew cask DSL has no license stanza, so the field never rendered.
    binaries:
      - cfgd
    generate_completions_from_executable:
      executable: cfgd
      args:
        - completion
      base_name: cfgd
    # Man page bundled in the archive (archives.manpages -> man/man1/cfgd.1);
    # the path is relative to the unpacked cask artifact.
    manpages:
      - man/man1/cfgd.1
    caveats: |
      Run `cfgd init` to scaffold a config in your repo.
    dependencies:
      - formula: git
    commit_msg_template: "cfgd {{ .Tag }}"
    commit_author:
      name: "TJ Smith"
      email: "tj@jarvispro.io"

# Post-publish verification gate — runs LAST, after the release exists and every
# publisher has run. It REPORTS delivery defects (exiting non-zero so CI goes
# red) but never undoes the published release. Self-contained in anodizer: the
# asset check needs only the workflow's GitHub token; the install smoke-test
# needs the runner's Docker daemon (present on the ubuntu-latest release job,
# skipped with a notice wherever it is absent).
verify_release:
  enabled: true
  # assert_assets is on by default: every produced artifact must have a matching
  # uploaded asset on the published release, catching the partial uploads GitHub
  # silently tolerates.
  # Install each Linux package (deb/rpm/apk from nfpm) in a clean container and
  # run `cfgd --version`, proving the packages install and the binary runs.
  # Empty map = default images (debian:stable-slim / fedora:latest / alpine:latest).
  install_smoke: {}
  # glibc regression guard. cfgd's deb/rpm/apk are built from the STATIC MUSL
  # `cfgd-musl` build precisely so they install on every Linux distro down to
  # EL7/AL2 (see the cfgd workspace's `cfgd-musl` build comment). A musl .deb
  # carries no glibc dependency, so this check passes by skipping it — but it
  # fails the release loudly if the package build ever silently regresses to the
  # gnu binary (whose glibc floor would exceed EL7's 2.17), which would ship an
  # unrunnable package to the old distros the musl split exists to support.
  glibc_ceiling: "2.17"

partial:
  by: os

nightly:
  name_template: "{{ ProjectName }}-nightly"
  tag_name: nightly
  publish_release: true
  keep_single_release: true

# Local/CI snapshot version naming (never released). States the snapshot
# scheme explicitly so artifacts carry the short commit for identification:
# cfgd-0.4.0-SNAPSHOT-<shortsha>.
snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

# Project-wide retry policy for network-bound steps (announcers, git providers,
# HTTP uploads, docker pipes). cfgd's release fans out to many external
# services — crates.io, ghcr, CloudSmith, and the PR-based package managers —
# so the resilient policy lives here as the single tunable home.
retry:
  attempts: 10
  delay: 10s
  max_delay: 5m

# Close the GitHub milestone matching the release tag when one exists. Non-fatal
# no-op until milestone-based release tracking is adopted (fail_on_error
# defaults false, so a missing milestone never breaks a release).
milestones:
  - close: true
