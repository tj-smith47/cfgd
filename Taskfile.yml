version: "3"

dotenv: [".env"]

vars:
  REGISTRY:
    sh: echo "${REGISTRY:-registry.jarvispro.io}"

env:
  REGISTRY: '{{.REGISTRY}}'
  # The CLI binary version comes from its own crate manifest, not `git describe --tags`:
  # the latter returns the newest monorepo tag (e.g. cfgd-core's `core-v0.4.0`), which
  # mis-names every artifact and diverges from the published `cfgd-<version>-linux-amd64`.
  VERSION:
    sh: grep -m1 '^version' crates/cfgd/Cargo.toml | sed 's/.*"\(.*\)".*/\1/'
  VERSION_NUM:
    sh: echo "{{.VERSION}}" | sed 's/^v//'
  OS:
    sh: uname -s | tr '[:upper:]' '[:lower:]'
  # Go-arch naming to match the published release assets (anodizer maps x86_64->amd64,
  # aarch64->arm64); uname's `x86_64` would 404 against `cfgd-<v>-linux-amd64.tar.gz`.
  ARCH:
    sh: |
      ARCH=$(uname -m)
      case "$ARCH" in x86_64|amd64) echo "amd64" ;; arm64|aarch64) echo "arm64" ;; *) echo "$ARCH" ;; esac

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  _check:tmp-headroom:
    internal: true
    desc: "Precondition: when /tmp is tmpfs, require it under 50% full — tmpfs pressure OOMs the cargo linker."
    preconditions:
      # The pressure scenario only applies when /tmp is backed by tmpfs
      # (Claude sandbox host). macOS, Windows, and GitHub Actions runners
      # all back /tmp with real disk; on those the linker can't OOM from
      # /tmp pressure, so skip the check entirely.
      - sh: '[ "$(uname)" != "Linux" ] || [ "$(stat -f -c %T /tmp 2>/dev/null)" != "tmpfs" ] || [ "$(df --output=pcent /tmp | tail -1 | tr -dc 0-9)" -lt 50 ]'
        msg: "/tmp is over 50% full — cargo will OOM under tmpfs RAM pressure. Run `du -sh /tmp/*/ | sort -hr | head` to find offenders and clean them. Write all scratch / debug / download files to `/opt/repos/.det-debug/` or `~/.cache/`, NEVER `/tmp`."

  # --- Build ---

  build:
    desc: Build all binaries in release mode
    deps: [_check:tmp-headroom]
    sources:
      - "crates/**/src/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
    generates:
      - "target/release/cfgd"
    cmds:
      - cargo build --release

  build:dev:
    desc: Build all binaries in debug mode
    deps: [_check:tmp-headroom]
    cmds:
      - cargo build

  install:
    desc: Install cfgd binary to cargo bin
    deps: [_check:tmp-headroom]
    cmds:
      - cargo install --path crates/cfgd

  # --- Quality ---

  check:
    desc: Run all quality checks (fmt:check, clippy, test, audit)
    cmds:
      - task: fmt:check
      - task: clippy
      - task: test
      - task: audit

  fmt:
    desc: Format code
    cmds:
      - cargo fmt

  fmt:check:
    desc: Check code formatting (CI)
    cmds:
      - cargo fmt --check

  clippy:
    desc: Run clippy linter
    deps: [_check:tmp-headroom]
    cmds:
      - cargo clippy -- -D warnings

  test:
    desc: Run all tests. Pass `-- <args>` to forward to cargo test.
    deps: [_check:tmp-headroom]
    cmds:
      - cargo nextest run --workspace --no-fail-fast {{.CLI_ARGS}}

  test:ci:
    desc: CI test entrypoint — scopes Windows to cfgd-core+cfgd (operator/csi covered by E2E).
    cmds:
      - cmd: |
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            export OPENSSL_DIR='C:/Program Files/OpenSSL'
            cargo nextest run --no-fail-fast -p cfgd-core -p cfgd {{.CLI_ARGS}}
          else
            cargo nextest run --workspace --no-fail-fast {{.CLI_ARGS}}
          fi

  test:crate:*:
    desc: 'Run tests for one crate: `task test:crate:<crate> -- <filter>`'
    deps: [_check:tmp-headroom]
    vars:
      CRATE: '{{index .MATCH 0}}'
    cmds:
      - cargo test -p {{.CRATE}} --features cfgd-core/test-helpers {{.CLI_ARGS}}

  audit:
    desc: Run project-specific code quality audit
    cmds:
      - bash .claude/scripts/audit.sh

  coverage:check:
    desc: Run workspace test coverage and write cobertura.xml. Prints the same percentage the README badge shows. No branch switching, no push.
    cmds:
      - cargo llvm-cov nextest --cobertura --output-path cobertura.xml --no-fail-fast
      - 'echo "Coverage (line, cobertura): $(bash .claude/scripts/coverage-percent.sh cobertura.xml)"'

  coverage:publish:
    desc: Run workspace test coverage and publish the badge update to origin/badges. Switches branches via the badge script; release/CI only.
    cmds:
      - cargo llvm-cov nextest --cobertura --output-path cobertura.xml --no-fail-fast
      - bash .claude/scripts/coverage-percent.sh cobertura.xml
      - bash .claude/scripts/publish-coverage.sh cobertura.xml

  audit:test:
    desc: Validate audit.sh's banned-pattern rules against paired fixtures
    cmds:
      - bash .claude/scripts/audit-tests/audit-test.sh

  package:
    desc: Dry-run package all publishable crates
    deps: [_check:tmp-headroom]
    cmds:
      - cargo package --workspace --no-verify --allow-dirty

  snapshot:
    desc: Dry-run release pipeline (single target, no publish) using anodizer
    deps: [build]
    cmds:
      - anodizer release --snapshot --single-target --clean --dry-run

  # --- Pre-commit pipeline (mirrors anodizer/Taskfile.yml) ---

  tidy:
    desc: Format code
    cmds:
      - task: fmt

  lint:
    desc: Local pre-commit check (tidy, clippy, audit, build, snapshot dry-run)
    cmds:
      - task: tidy
      - task: clippy
      - task: audit
      - task: build
      - task: snapshot

  commit:
    desc: "Lint (regenerates artifacts), re-stage only the user's intended files, then commit. Usage: stage with `git add` first, then `task commit -- -m 'msg'`."
    preconditions:
      - sh: test -n "$(git diff --cached --name-only)"
        msg: "Nothing staged. Stage files with `git add <path>` before running task commit."
    vars:
      STAGED_PRE:
        sh: git diff --cached --name-only
      MODIFIED_PRE:
        sh: git diff --name-only
    cmds:
      - task: lint
      - task: _commit:restage
        vars:
          STAGED_LIST: "{{.STAGED_PRE}}"
          MODIFIED_LIST: "{{.MODIFIED_PRE}}"
      - git commit {{.CLI_ARGS}}

  _commit:restage:
    internal: true
    desc: "Internal: re-stage files that were staged at task start (capture lint touchups) plus any files lint NEWLY modified (auto-generated content). Files modified-but-unstaged at task start are left untouched so they don't contaminate the commit."
    cmds:
      - |
        # (a) Re-add files that were staged pre-task. Use -A so deletes and
        # renames staged with `git mv` aren't lost when lint touches them.
        while IFS= read -r f; do
          [ -n "$f" ] && { git add -A -- "$f" 2>/dev/null || git rm --cached -- "$f" 2>/dev/null || true; }
        done <<'STAGED_EOF'
        {{.STAGED_LIST}}
        STAGED_EOF
        # (b) Add files that lint NEWLY modified — i.e., not in pre-task
        # staged OR modified lists. These are typically docs / snapshots
        # regenerated by the lint step and belong with the commit.
        git diff --name-only | while IFS= read -r f; do
          [ -z "$f" ] && continue
          printf '%s\n' '{{.STAGED_LIST}}' | grep -qxF -- "$f" && continue
          printf '%s\n' '{{.MODIFIED_LIST}}' | grep -qxF -- "$f" && continue
          git add -- "$f"
        done

  ci:
    desc: Run all CI checks (everything except cross-platform builds)
    cmds:
      - task: fmt:check
      - task: clippy
      - task: test
      - task: audit
      - task: audit:test
      - task: package

  # --- E2E ---

  e2e:setup:
    desc: Build images and ensure E2E infrastructure is current
    # Skipped (no-op) when CFGD_E2E_SETUP_DONE=1. CI's setup job runs once
    # and sets this for downstream leaf jobs so they don't re-build images
    # or require docker.sock on runner pods that lack it.
    status:
      - test -n "${CFGD_E2E_SETUP_DONE:-}"
    cmds:
      - bash tests/e2e/setup-cluster.sh

  e2e:
    desc: Run all E2E test suites
    deps: [e2e:setup]
    cmds:
      - task: e2e:cli
      - task: e2e:node
      - task: e2e:node:helm
      - task: e2e:node:server
      - task: e2e:operator
      - task: e2e:full-stack
      - task: e2e:crossplane
      - task: e2e:gateway

  e2e:cli:
    desc: Run CLI exhaustive E2E tests
    env:
      NO_COLOR: '{{.NO_COLOR | default "1"}}'
      EDITOR: '{{.EDITOR | default "true"}}'
    cmds:
      - cargo build --release --bin cfgd
      - bash tests/e2e/cli/scripts/run-all.sh

  e2e:node:
    desc: Run node E2E tests (binary, drift, daemon)
    deps: [e2e:setup]
    cmds:
      - bash tests/e2e/node/scripts/run-all.sh

  e2e:node:helm:
    desc: Run node Helm E2E tests
    deps: [e2e:setup]
    cmds:
      - bash tests/e2e/node/scripts/test-helm.sh

  e2e:node:server:
    desc: Run node server integration E2E tests
    deps: [e2e:setup]
    cmds:
      - bash tests/e2e/node/scripts/test-server.sh

  e2e:operator:
    desc: Run operator E2E tests
    deps: [e2e:setup]
    cmds:
      - bash tests/e2e/operator/scripts/run-all.sh

  e2e:full-stack:
    desc: Run full-stack E2E tests
    deps: [e2e:setup]
    cmds:
      - bash tests/e2e/full-stack/scripts/run-all.sh

  e2e:crossplane:
    desc: Run Crossplane E2E tests
    deps: [e2e:setup]
    cmds:
      - bash tests/e2e/crossplane/scripts/run-crossplane-tests.sh

  e2e:gateway:
    desc: Run gateway E2E tests
    deps: [e2e:setup]
    cmds:
      - bash tests/e2e/gateway/scripts/run-all.sh

  # --- Clean ---

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  # --- Docker ---

  docker:
    desc: Build all Docker images
    deps: [docker:cli, docker:operator]

  docker:cli:
    desc: Build cfgd CLI Docker image
    cmds:
      - docker build -f Dockerfile -t {{.REGISTRY}}/cfgd:latest -t {{.REGISTRY}}/cfgd:{{.VERSION_NUM}} .

  docker:operator:
    desc: Build cfgd-operator Docker image
    cmds:
      - docker build -f Dockerfile.operator -t {{.REGISTRY}}/cfgd-operator:latest -t {{.REGISTRY}}/cfgd-operator:{{.VERSION_NUM}} .

  push:
    desc: Push all Docker images to registry
    deps: [push:cli, push:operator]

  push:cli:
    desc: Push cfgd CLI image to registry
    cmds:
      - docker push {{.REGISTRY}}/cfgd:latest
      - docker push {{.REGISTRY}}/cfgd:{{.VERSION_NUM}}

  push:operator:
    desc: Push cfgd-operator image to registry
    cmds:
      - docker push {{.REGISTRY}}/cfgd-operator:latest
      - docker push {{.REGISTRY}}/cfgd-operator:{{.VERSION_NUM}}

  # --- Release ---

  changelog:
    desc: Generate changelog from git history
    cmds:
      - git-cliff -o CHANGELOG.md

  release:local:
    desc: Build release archive locally
    deps: [_check:tmp-headroom]
    cmds:
      - cargo build --release --bin cfgd
      - tar -czf "cfgd-{{.VERSION_NUM}}-{{.OS}}-{{.ARCH}}.tar.gz" -C target/release cfgd
      - echo "Built{{":"}} cfgd-{{.VERSION_NUM}}-{{.OS}}-{{.ARCH}}.tar.gz"

  # --- Deploy ---

  deploy:operator:
    desc: Build, push, and deploy cfgd-operator to k3s
    cmds:
      - task: docker:operator
      - task: push:operator
      - kustomize build --enable-alpha-plugins --enable-exec "${CFGD_DEPLOY_MANIFESTS:?Set CFGD_DEPLOY_MANIFESTS to your kustomize directory}" | kubectl apply -f -
      - kubectl rollout restart deployment/cfgd-operator -n cfgd-system
