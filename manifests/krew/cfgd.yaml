# Krew plugin manifest for kubectl-cfgd.
# Version, URIs, and SHA256 checksums are populated by the release workflow.
# Do not edit sha256 values manually — they are computed from release artifacts.
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: cfgd
spec:
  version: "v0.1.0"
  shortDescription: "Manage cfgd modules on pods"
  homepage: https://github.com/tj-smith47/cfgd
  description: |
    kubectl plugin for cfgd module injection. Provides debug, exec, inject,
    status, and version subcommands for managing cfgd modules on Kubernetes pods.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tj-smith47/cfgd/releases/download/v0.1.0/kubectl-cfgd-0.1.0-linux-x86_64.tar.gz
      sha256: "POPULATED_BY_RELEASE_WORKFLOW"
      bin: kubectl-cfgd
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tj-smith47/cfgd/releases/download/v0.1.0/kubectl-cfgd-0.1.0-linux-aarch64.tar.gz
      sha256: "POPULATED_BY_RELEASE_WORKFLOW"
      bin: kubectl-cfgd
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tj-smith47/cfgd/releases/download/v0.1.0/kubectl-cfgd-0.1.0-darwin-x86_64.tar.gz
      sha256: "POPULATED_BY_RELEASE_WORKFLOW"
      bin: kubectl-cfgd
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tj-smith47/cfgd/releases/download/v0.1.0/kubectl-cfgd-0.1.0-darwin-aarch64.tar.gz
      sha256: "POPULATED_BY_RELEASE_WORKFLOW"
      bin: kubectl-cfgd
