                  description: Reference to a module that should be installed on the machine.
                  properties:
                    name:
                      type: string
                    required:
                      default: false
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              packages:
                default: []
                items:
                  description: Reference to a package with optional version pin.
                  properties:
                    name:
                      type: string
                    version:
                      nullable: true
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              profile:
                type: string
              systemSettings:
                additionalProperties: true
                default: {}
                type: object
            required:
            - hostname
            - profile
            type: object
            x-kubernetes-validations:
            - message: hostname must not be empty
              rule: self.hostname.size() > 0
          status:
            nullable: true
            properties:
              conditions:
                default: []
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconciled:
                nullable: true
                type: string
              observedGeneration:
                format: int64
                nullable: true
                type: integer
              packageVersions:
                additionalProperties:
                  type: string
                default: {}
                description: 'Reported installed versions keyed by package name (e.g. {"kubectl": "1.28.3"}).'
                type: object
            type: object
        required:
        - spec
        title: MachineConfig
        type: object
    served: true
    storage: true
    subresources:
      status: {}
