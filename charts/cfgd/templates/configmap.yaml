apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cfgd.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
data:
  cfgd.yaml: |
    apiVersion: cfgd.io/v1alpha1
    kind: Config
    metadata:
      name: {{ include "cfgd.fullname" . }}
    spec:
      profile: {{ .Values.profile | default "default" }}
      {{- if or .Values.configSource .Values.serverUrl }}
      origin:
        {{- if .Values.configSource }}
        - type: Git
          url: {{ .Values.configSource }}
          branch: main
        {{- end }}
        {{- if .Values.serverUrl }}
        - type: Server
          url: {{ .Values.serverUrl }}
        {{- end }}
      {{- end }}
      daemon:
        enabled: true
        reconcile:
          interval: {{ .Values.reconcileInterval | default "5m" | quote }}
          autoApply: true
          driftPolicy: Auto
