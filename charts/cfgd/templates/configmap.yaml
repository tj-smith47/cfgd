apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cfgd.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
data:
  cfgd.yaml: |
    apiVersion: cfgd/v1
    kind: Config
    metadata:
      name: {{ include "cfgd.fullname" . }}
    spec:
      profile: {{ .Values.profile | default "default" }}
      {{- if .Values.configSource }}
      origin:
        type: git
        url: {{ .Values.configSource }}
        branch: main
      {{- end }}
