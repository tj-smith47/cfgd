image:
  repository: ghcr.io/tj-smith47/cfgd-operator
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

replicaCount: 1

# Install CRDs as part of the Helm release
installCRDs: true

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Resource limits for operator pod
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Admission webhook configuration
webhook:
  enabled: true
  port: 9443
  # TLS certificate management — requires cert-manager when certManager.enabled is true
  certManager:
    enabled: true
    issuerRef:
      name: cfgd-selfsigned-issuer
      kind: Issuer
  # Webhook failure policy: Fail or Ignore
  failurePolicy: Fail
  # Timeout in seconds for webhook calls
  timeoutSeconds: 10
