{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cfgd-operator.fullname" . }}
  labels:
    {{- include "cfgd-operator.labels" . | nindent 4 }}
rules:
  # Full CRUD on cfgd CRDs
  - apiGroups: ["cfgd.io"]
    resources: ["machineconfigs", "configpolicies", "driftalerts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Status subresource patching
  - apiGroups: ["cfgd.io"]
    resources: ["machineconfigs/status", "configpolicies/status", "driftalerts/status"]
    verbs: ["get", "update", "patch"]
  # Namespace awareness for multi-namespace operation
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Events for recording operator activity
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cfgd-operator.fullname" . }}
  labels:
    {{- include "cfgd-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cfgd-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cfgd-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
