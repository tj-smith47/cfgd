{{- if .Values.installCRDs }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: machineconfigs.cfgd.io
  labels:
    {{- include "cfgd-operator.labels" . | nindent 4 }}
spec:
  group: cfgd.io
  names:
    categories: []
    kind: MachineConfig
    plural: machineconfigs
    shortNames: []
    singular: machineconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MachineConfigSpec via `CustomResource`
        properties:
          spec:
            properties:
              files:
                default: []
                items:
                  properties:
                    content:
                      nullable: true
                      type: string
                    mode:
                      default: '0644'
                      type: string
                    path:
                      type: string
                    source:
                      nullable: true
                      type: string
                  required:
                  - path
                  type: object
                type: array
              hostname:
                type: string
              moduleRefs:
                default: []
                items:
                  description: Reference to a module that should be installed on the machine.
                  properties:
                    name:
                      type: string
                    required:
                      default: false
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
              packageVersions:
                additionalProperties:
                  type: string
                default: {}
                description: 'Reported installed versions keyed by package name (e.g. {"kubectl": "1.28.3"}).'
                type: object
              packages:
                default: []
                items:
                  type: string
                type: array
              profile:
                type: string
              systemSettings:
                additionalProperties:
                  type: string
                default: {}
                type: object
            required:
            - hostname
            - profile
            type: object
          status:
            nullable: true
            properties:
              conditions:
                default: []
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              driftDetected:
                default: false
                type: boolean
              lastReconciled:
                nullable: true
                type: string
              observedGeneration:
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: MachineConfig
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
