{{- if .Values.installCRDs }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: driftalerts.cfgd.io
  labels:
    {{- include "cfgd-operator.labels" . | nindent 4 }}
spec:
  group: cfgd.io
  names:
    categories: []
    kind: DriftAlert
    plural: driftalerts
    shortNames: []
    singular: driftalert
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for DriftAlertSpec via `CustomResource`
        properties:
          spec:
            properties:
              deviceId:
                type: string
              driftDetails:
                default: []
                items:
                  properties:
                    actual:
                      type: string
                    expected:
                      type: string
                    field:
                      type: string
                  required:
                  - actual
                  - expected
                  - field
                  type: object
                type: array
              machineConfigRef:
                type: string
              severity:
                enum:
                - low
                - medium
                - high
                - critical
                type: string
            required:
            - deviceId
            - machineConfigRef
            - severity
            type: object
          status:
            nullable: true
            properties:
              detectedAt:
                nullable: true
                type: string
              resolved:
                default: false
                type: boolean
              resolvedAt:
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: DriftAlert
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
