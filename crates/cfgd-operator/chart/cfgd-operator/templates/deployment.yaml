apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cfgd-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cfgd-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cfgd-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cfgd-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cfgd-operator.serviceAccountName" . }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RUST_LOG
              value: "info"
            {{- if .Values.webhook.enabled }}
            - name: WEBHOOK_CERT_DIR
              value: "/tmp/k8s-webhook-server/serving-certs"
            - name: WEBHOOK_PORT
              value: {{ .Values.webhook.port | quote }}
            {{- end }}
          {{- if .Values.webhook.enabled }}
          ports:
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if .Values.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "cfgd-operator.webhookCertSecret" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
