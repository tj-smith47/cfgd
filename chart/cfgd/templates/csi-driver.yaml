{{- if .Values.csiDriver.enabled }}
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi.cfgd.io
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
spec:
  attachRequired: false
  podInfoOnMount: true
  fsGroupPolicy: None
  volumeLifecycleModes:
    - Ephemeral
    - Persistent
{{- end }}
