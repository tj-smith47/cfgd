{{- if .Values.installCRDs }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: configpolicies.cfgd.io
spec:
  group: cfgd.io
  names:
    categories:
    - cfgd
    kind: ConfigPolicy
    plural: configpolicies
    shortNames:
    - cpol
    singular: configpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.compliantCount
      name: Compliant
      type: integer
    - jsonPath: .status.nonCompliantCount
      name: NonCompliant
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Enforced")].status
      name: Enforced
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ConfigPolicySpec via `CustomResource`
        properties:
          spec:
            properties:
              packageVersions:
                additionalProperties:
                  type: string
                default: {}
                description: 'Version requirements keyed by package name (semver ranges, e.g. {"kubectl": ">=1.28"}).'
                type: object
              packages:
                default: []
                items:
                  description: Reference to a package with optional version pin.
                  properties:
                    name:
                      type: string
                    version:
                      nullable: true
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              requiredModules:
                default: []
                items:
                  description: Reference to a module that should be installed on the machine.
                  properties:
                    name:
                      type: string
                    required:
                      default: false
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              settings:
                additionalProperties:
                  type: string
                default: {}
                type: object
              targetSelector:
                default:
                  matchExpressions: []
                  matchLabels: {}
                description: Kubernetes-style label selector with match_labels and match_expressions.
                properties:
                  matchExpressions:
                    default: []
                    items:
                      description: A single requirement for label selector expressions.
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        values:
                          default: []
                          items:
                            type: string
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - key
                    x-kubernetes-list-type: map
                  matchLabels:
                    additionalProperties:
                      type: string
                    default: {}
                    type: object
                type: object
            type: object
          status:
            nullable: true
            properties:
              compliantCount:
                format: uint32
                minimum: 0.0
                type: integer
              conditions:
                default: []
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      nullable: true
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              nonCompliantCount:
                format: uint32
                minimum: 0.0
                type: integer
            required:
            - compliantCount
            - nonCompliantCount
            type: object
        required:
        - spec
        title: ConfigPolicy
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
