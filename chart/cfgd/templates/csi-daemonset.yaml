{{- if .Values.csiDriver.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "cfgd.fullname" . }}-csi
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-driver
spec:
  selector:
    matchLabels:
      {{- include "cfgd.csiSelectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.csiDriver.updateStrategy.maxUnavailable }}
  template:
    metadata:
      labels:
        {{- include "cfgd.csiSelectorLabels" . | nindent 8 }}
        {{- with .Values.csiDriver.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.csiDriver.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cfgd.csiServiceAccountName" . }}
      {{- with .Values.csiDriver.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      priorityClassName: system-node-critical
      {{- with .Values.csiDriver.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.csiDriver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cfgd-csi
          image: "{{ .Values.csiDriver.image.repository }}:{{ .Values.csiDriver.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.csiDriver.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: CSI_ENDPOINT
              value: /csi/csi.sock
            - name: CACHE_DIR
              value: /var/lib/cfgd-csi/cache
            - name: CACHE_MAX_BYTES
              value: "{{ mul .Values.csiDriver.cache.maxSizeGi 1073741824 }}"
            - name: METRICS_PORT
              value: "{{ .Values.csiDriver.metricsPort }}"
            - name: RUST_LOG
              value: "info"
            {{- with .Values.csiDriver.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.csiDriver.metricsPort }}
              name: metrics
              protocol: TCP
          resources:
            {{- toYaml .Values.csiDriver.resources | nindent 12 }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: pods-mount-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: cache
              mountPath: /var/lib/cfgd-csi/cache
            {{- with .Values.csiDriver.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        - name: node-driver-registrar
          image: "{{ .Values.csiDriver.registrar.image.repository }}:{{ .Values.csiDriver.registrar.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - "--v=2"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/csi.cfgd.io/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: "{{ .Values.csiDriver.livenessProbe.image.repository }}:{{ .Values.csiDriver.livenessProbe.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=/csi/csi.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
      volumes:
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.cfgd.io/
            type: DirectoryOrCreate
        - name: pods-mount-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: DirectoryOrCreate
        - name: cache
          {{- if .Values.csiDriver.cache.storageClass }}
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                storageClassName: {{ .Values.csiDriver.cache.storageClass }}
                resources:
                  requests:
                    storage: {{ .Values.csiDriver.cache.maxSizeGi }}Gi
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.csiDriver.cache.maxSizeGi }}Gi
          {{- end }}
        {{- with .Values.csiDriver.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
