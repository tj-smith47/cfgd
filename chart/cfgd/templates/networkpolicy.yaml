{{- if and .Values.operator.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cfgd.fullname" . }}-operator
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cfgd.operatorSelectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        {{- if .Values.webhook.enabled }}
        - port: {{ .Values.webhook.port }}
        {{- end }}
        {{- if .Values.deviceGateway.enabled }}
        - port: {{ .Values.deviceGateway.port }}
        {{- end }}
        - port: {{ .Values.probes.port }}
        {{- if .Values.metrics.enabled }}
        - port: {{ .Values.metrics.port }}
        {{- end }}
      from:
        - namespaceSelector: {}
  egress:
    - ports:
        - port: 53        # DNS
          protocol: UDP
        - port: 53        # DNS (TCP fallback)
          protocol: TCP
        - port: 443       # HTTPS (registries, external APIs)
        - port: 6443      # Kubernetes API server
      # To tighten: add `to:` selectors restricting destinations to
      # the API server endpoint and known registry IPs/CIDRs.
{{- end }}
