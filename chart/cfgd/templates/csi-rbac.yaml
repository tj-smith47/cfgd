{{- if .Values.csiDriver.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cfgd.csiServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-driver
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cfgd.csiServiceAccountName" . }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-driver
rules:
  - apiGroups: ["cfgd.io"]
    resources: ["modules"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cfgd.csiServiceAccountName" . }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-driver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cfgd.csiServiceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cfgd.csiServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
