{{- if and .Values.operator.enabled .Values.deviceGateway.enabled .Values.deviceGateway.persistence.enabled }}
{{- if gt (int .Values.operator.replicaCount) 1 }}
{{- fail "deviceGateway.persistence requires operator.replicaCount=1 (SQLite cannot be shared)" }}
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cfgd.fullname" . }}-gateway-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.deviceGateway.persistence.storageClass }}
  storageClassName: {{ .Values.deviceGateway.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.deviceGateway.persistence.size }}
{{- end }}
