{{- if and .Values.operator.enabled .Values.webhook.enabled .Values.mutatingWebhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "cfgd.fullname" . }}-pod-injector
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "cfgd.webhookCertName" . }}
  {{- end }}
webhooks:
  - name: inject-modules.cfgd.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.mutatingWebhook.failurePolicy }}
    reinvocationPolicy: IfNeeded
    timeoutSeconds: {{ .Values.mutatingWebhook.timeoutSeconds }}
    objectSelector:
      matchExpressions:
        - key: cfgd.io/skip-injection
          operator: DoesNotExist
    namespaceSelector:
      {{- toYaml .Values.mutatingWebhook.namespaceSelector | nindent 6 }}
    clientConfig:
      service:
        name: {{ include "cfgd.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-pods
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
{{- end }}
