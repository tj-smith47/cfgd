{{- if .Values.rbacExamples.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cfgd.fullname" . }}-platform-admin
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
rules:
  - apiGroups: ["cfgd.io"]
    resources: ["*"]
    verbs: ["*"]
{{- end }}
