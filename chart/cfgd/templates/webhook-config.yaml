{{- if and .Values.operator.enabled .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "cfgd.fullname" . }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "cfgd.webhookCertName" . }}
  {{- end }}
webhooks:
  {{- $fullname := include "cfgd.fullname" . }}
  {{- $namespace := .Release.Namespace }}
  {{- $failurePolicy := .Values.webhook.failurePolicy }}
  {{- $timeoutSeconds := .Values.webhook.timeoutSeconds }}
  {{- range list
    (dict "singular" "machineconfig" "plural" "machineconfigs")
    (dict "singular" "configpolicy" "plural" "configpolicies")
    (dict "singular" "clusterconfigpolicy" "plural" "clusterconfigpolicies")
    (dict "singular" "driftalert" "plural" "driftalerts")
    (dict "singular" "module" "plural" "modules")
  }}
  - name: validate-{{ .singular }}.cfgd.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ $failurePolicy }}
    timeoutSeconds: {{ $timeoutSeconds }}
    clientConfig:
      service:
        name: {{ $fullname }}-webhook
        namespace: {{ $namespace }}
        path: /validate-{{ .singular }}
    rules:
      - apiGroups: ["cfgd.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: [{{ .plural | quote }}]
  {{- end }}
{{- end }}
