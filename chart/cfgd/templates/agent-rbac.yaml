{{- if .Values.agent.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cfgd.agentServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cfgd.fullname" . }}-agent
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cfgd.io"]
    resources: ["machineconfigs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["cfgd.io"]
    resources: ["machineconfigs/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["cfgd.io"]
    resources: ["configpolicies", "clusterconfigpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cfgd.fullname" . }}-agent
  labels:
    {{- include "cfgd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cfgd.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "cfgd.agentServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
