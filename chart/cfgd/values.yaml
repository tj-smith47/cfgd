# Operator configuration
operator:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/tj-smith47/cfgd-operator
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  leaderElection:
    enabled: true
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
  nodeSelector: {}
  tolerations: []
  affinity: {}
  imagePullSecrets: []
  podAnnotations: {}
  podLabels: {}
  topologySpreadConstraints: []
  terminationGracePeriodSeconds: 60
  livenessProbe:
    httpGet:
      path: /healthz
      port: health
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /readyz
      port: health
    initialDelaySeconds: 5
    periodSeconds: 10

# Agent DaemonSet
agent:
  enabled: false
  image:
    repository: ghcr.io/tj-smith47/cfgd
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  serverUrl: ""
  apiKey: ""
  apiKeySecret:
    name: ""
    key: "api-key"
  reconcileInterval: "5m"
  configSource: ""
  profile: ""
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  nodeSelector: {}
  tolerations:
    - operator: Exists
      effect: NoSchedule
    - operator: Exists
      effect: NoExecute
  extraVolumes: []
  extraVolumeMounts: []
  imagePullSecrets: []
  priorityClassName: system-node-critical
  # Agent pods run privileged by design (host config management requires root access).
  # They do not use the shared podSecurityContext/containerSecurityContext values.
  podAnnotations: {}
  podLabels: {}
  updateStrategy:
    maxUnavailable: 1
  livenessProbe:
    exec:
      command: ["/usr/local/bin/cfgd", "daemon", "status"]
    initialDelaySeconds: 30
    periodSeconds: 60
  readinessProbe:
    exec:
      command: ["/usr/local/bin/cfgd", "daemon", "status"]
    initialDelaySeconds: 10
    periodSeconds: 30

# Install CRDs
installCRDs: true

# Service account (shared)
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Webhook
webhook:
  enabled: true
  port: 9443
  certManager:
    enabled: true
    issuerRef:
      name: cfgd-selfsigned-issuer
      kind: Issuer
  failurePolicy: Fail
  timeoutSeconds: 10

# Device gateway
deviceGateway:
  enabled: false
  port: 8080
  dbPath: /data/cfgd-gateway.db
  apiKey: ""
  apiKeySecret:
    name: ""
    key: "api-key"
  enrollmentMethod: token
  retentionDays: 90
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# CSI driver
csiDriver:
  enabled: false
  image:
    repository: ghcr.io/tj-smith47/cfgd-csi
    tag: ""
    pullPolicy: IfNotPresent
  cache:
    maxSizeGi: 5
    storageClass: ""
  metricsPort: 9090
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  nodeSelector: {}
  tolerations:
    - operator: Exists
  extraEnv: []
  imagePullSecrets: []
  podAnnotations: {}
  podLabels: {}
  updateStrategy:
    maxUnavailable: 1
  livenessProbe:
    image:
      repository: registry.k8s.io/sig-storage/livenessprobe
      tag: v2.12.0
  registrar:
    image:
      repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
      tag: v2.10.0

# Pod module mutating webhook
mutatingWebhook:
  enabled: true
  failurePolicy: Ignore
  timeoutSeconds: 10
  namespaceSelector:
    matchExpressions:
      - key: cfgd.io/inject-modules
        operator: In
        values: ["true"]

# Security contexts
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# PDB
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy
networkPolicy:
  enabled: false

# Metrics
metrics:
  enabled: true
  port: 8443
  serviceMonitor:
    enabled: false
    interval: 30s

# Health probes
probes:
  port: 8081

# RBAC examples (opt-in)
rbacExamples:
  enabled: false

# Test pod
test:
  image:
    repository: bitnami/kubectl
    tag: "1.31"
