# Kustomize base for CRDs. Used by manifests/crds/ and directly via:
#   kubectl apply -k chart/cfgd/crds/
# Excluded from Helm via .helmignore (Helm would otherwise try to install it as a CRD).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - clusterconfigpolicies.yaml
  - configpolicies.yaml
  - driftalerts.yaml
  - machineconfigs.yaml
  - modules.yaml
