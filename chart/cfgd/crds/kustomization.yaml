# This kustomization.yaml exists so that manifests/crds/ can reference this
# directory as a kustomize base. It allows non-Helm users to install CRDs via:
#   kubectl apply -k manifests/crds/
# Helm ignores this file — it only processes .yaml CRD manifests in crds/.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - clusterconfigpolicies.yaml
  - configpolicies.yaml
  - driftalerts.yaml
  - machineconfigs.yaml
  - modules.yaml
