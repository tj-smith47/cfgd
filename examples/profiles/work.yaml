apiVersion: cfgd/v1
kind: Profile
metadata:
  name: work
spec:
  inherits:
    - base

  variables:
    EDITOR: "code --wait"
    GIT_AUTHOR_EMAIL: you@company.com

  packages:
    brew:
      taps:
        - homebrew/cask-fonts
      formulae:
        - git
        - jq
        - kubectl
        - helm
      casks:
        - visual-studio-code
        - wezterm
    npm:
      global:
        - typescript
        - prettier

  files:
    managed:
      - source: k8s/kubeconfig.tera
        target: ~/.kube/config

  secrets:
    - source: 1password://Work/GitHub/token
      target: ~/.config/gh/token

  scripts:
    post-reconcile:
      - scripts/setup-work-env.sh
