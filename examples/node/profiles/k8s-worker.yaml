apiVersion: cfgd.io/v1alpha1
kind: Profile
metadata:
  name: k8s-worker
spec:
  env:
    - name: cluster_name
      value: my-cluster
    - name: pod_cidr
      value: "10.244.0.0/16"

  system:
    sysctl:
      net.ipv4.ip_forward: "1"
      net.bridge.bridge-nf-call-iptables: "1"
      net.bridge.bridge-nf-call-ip6tables: "1"
      vm.max_map_count: "262144"
      fs.inotify.max_user_watches: "524288"

    kernelModules:
      - br_netfilter
      - overlay
      - ip_vs
      - ip_vs_rr
      - ip_vs_wrr
      - ip_vs_sh
      - nf_conntrack

    containerd:
      configPath: /etc/containerd/config.toml
      settings:
        SystemdCgroup: true
        sandbox_image: "registry.k8s.io/pause:3.9"

    kubelet:
      configPath: /var/lib/kubelet/config.yaml
      settings:
        maxPods: 110
        cgroupDriver: systemd
        containerRuntimeEndpoint: "unix:///run/containerd/containerd.sock"
        serializeImagePulls: false

    seccomp:
      profilesDir: /etc/cfgd/seccomp
      profiles:
        - name: audit
          file: audit.json
          content: |
            {
              "defaultAction": "SCMP_ACT_LOG",
              "architectures": ["SCMP_ARCH_X86_64", "SCMP_ARCH_X86", "SCMP_ARCH_X32"]
            }

    certificates:
      caCertDir: /etc/kubernetes/pki
      certificates:
        - name: kubelet-client
          certPath: /etc/kubernetes/pki/kubelet-client.crt
          keyPath: /etc/kubernetes/pki/kubelet-client.key
          caPath: /etc/kubernetes/pki/ca.crt
          mode: "0600"
