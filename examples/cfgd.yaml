apiVersion: cfgd.io/v1alpha1
kind: Config
metadata:
  name: my-workstation
spec:
  profile: personal

  origin:
    type: Git
    url: git@github.com:you/machine-config.git
    branch: main

  daemon:
    enabled: true
    reconcile:
      interval: 5m
      onChange: true
    sync:
      autoPull: true
      autoPush: false
      interval: 5m
    notify:
      drift: true
      method: Desktop

  secrets:
    backend: sops
    sops:
      ageKey: ~/.config/cfgd/age-key.txt
