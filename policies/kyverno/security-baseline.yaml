apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cfgd-security-baseline
  annotations:
    policies.kyverno.io/title: MachineConfig Security Baseline
    policies.kyverno.io/category: cfgd
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Enforces security baseline checks on MachineConfig CRDs:
      files must not be world-writable, and configs should reference
      at least one module, package, or file.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: deny-world-writable-files
      match:
        any:
          - resources:
              kinds:
                - MachineConfig
      preconditions:
        all:
          - key: "{{ request.object.spec.files | length(@) }}"
            operator: GreaterThan
            value: 0
      validate:
        foreach:
          - list: "request.object.spec.files"
            deny:
              conditions:
                any:
                  - key: "{{ element.mode }}"
                    operator: AnyIn
                    value: ["0777", "0776", "0773", "0772", "0767", "0766", "0763", "0762", "0667", "0666", "0663", "0662"]
              message: >-
                File '{{ element.path }}' has world-writable mode '{{ element.mode }}'.
                Use restrictive permissions.
    - name: warn-empty-config
      match:
        any:
          - resources:
              kinds:
                - MachineConfig
      validate:
        message: >-
          MachineConfig {{ request.object.metadata.name }} has no modules,
          packages, or files — is this intentional?
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.moduleRefs | length(@) }}"
                operator: Equals
                value: 0
              - key: "{{ request.object.spec.packages | length(@) }}"
                operator: Equals
                value: 0
              - key: "{{ request.object.spec.files | length(@) }}"
                operator: Equals
                value: 0
    - name: audit-drift-detected
      match:
        any:
          - resources:
              kinds:
                - MachineConfig
      preconditions:
        all:
          - key: "{{ request.object.status.conditions[?type == 'DriftDetected'] | length(@) }}"
            operator: GreaterThan
            value: 0
      validate:
        message: >-
          MachineConfig {{ request.object.metadata.name }} has active drift.
          Reconcile to restore desired state.
        deny:
          conditions:
            any:
              - key: "{{ request.object.status.conditions[?type == 'DriftDetected'].status | [0] }}"
                operator: Equals
                value: "True"
    - name: audit-reconcile-failure
      match:
        any:
          - resources:
              kinds:
                - MachineConfig
      preconditions:
        all:
          - key: "{{ request.object.status.conditions[?type == 'Reconciled'] | length(@) }}"
            operator: GreaterThan
            value: 0
      validate:
        message: >-
          MachineConfig {{ request.object.metadata.name }} is not reconciled.
          Check status conditions for details.
        deny:
          conditions:
            any:
              - key: "{{ request.object.status.conditions[?type == 'Reconciled'].status | [0] }}"
                operator: Equals
                value: "False"
    - name: audit-modules-unresolved
      match:
        any:
          - resources:
              kinds:
                - MachineConfig
      preconditions:
        all:
          - key: "{{ request.object.status.conditions[?type == 'ModulesResolved'] | length(@) }}"
            operator: GreaterThan
            value: 0
      validate:
        message: >-
          MachineConfig {{ request.object.metadata.name }} has unresolved modules.
          Check status conditions for details.
        deny:
          conditions:
            any:
              - key: "{{ request.object.status.conditions[?type == 'ModulesResolved'].status | [0] }}"
                operator: Equals
                value: "False"
    - name: audit-non-compliant
      match:
        any:
          - resources:
              kinds:
                - MachineConfig
      preconditions:
        all:
          - key: "{{ request.object.status.conditions[?type == 'Compliant'] | length(@) }}"
            operator: GreaterThan
            value: 0
      validate:
        message: >-
          MachineConfig {{ request.object.metadata.name }} is non-compliant.
          Check status conditions for details.
        deny:
          conditions:
            any:
              - key: "{{ request.object.status.conditions[?type == 'Compliant'].status | [0] }}"
                operator: Equals
                value: "False"
