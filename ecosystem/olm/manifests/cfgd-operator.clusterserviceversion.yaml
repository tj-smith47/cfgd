apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: cfgd-operator.v0.1.0
  namespace: placeholder
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "cfgd.io/v1alpha1",
          "kind": "MachineConfig",
          "metadata": { "name": "example", "namespace": "default" },
          "spec": {
            "hostname": "workstation-1",
            "profile": "default",
            "moduleRefs": [{ "name": "nvim", "required": true }]
          }
        },
        {
          "apiVersion": "cfgd.io/v1alpha1",
          "kind": "ConfigPolicy",
          "metadata": { "name": "baseline", "namespace": "default" },
          "spec": {
            "requiredModules": [{ "name": "security-tools", "required": true }]
          }
        },
        {
          "apiVersion": "cfgd.io/v1alpha1",
          "kind": "ClusterConfigPolicy",
          "metadata": { "name": "org-baseline" },
          "spec": {
            "requiredModules": [{ "name": "compliance-tools", "required": true }]
          }
        },
        {
          "apiVersion": "cfgd.io/v1alpha1",
          "kind": "Module",
          "metadata": { "name": "nettools" },
          "spec": {
            "packages": [{ "name": "curl" }, { "name": "jq" }],
            "mountPolicy": "Always"
          }
        },
        {
          "apiVersion": "cfgd.io/v1alpha1",
          "kind": "DriftAlert",
          "metadata": { "name": "example-drift", "namespace": "default" },
          "spec": {
            "machineConfigRef": { "name": "example", "namespace": "default" },
            "deviceId": "workstation-1",
            "severity": "Medium",
            "driftDetails": [{ "field": "spec.packages[0].version", "expected": "1.28.0", "actual": "1.27.5" }]
          }
        }
      ]
    categories: Developer Tools, Application Runtime
    capabilities: Full Lifecycle
    description: >-
      Declarative, GitOps-style machine configuration management.
      Reconciles packages, files, environment, and system settings
      across workstations and Kubernetes nodes.
    repository: https://github.com/tj-smith47/cfgd
    containerImage: ghcr.io/tj-smith47/cfgd-operator:v0.1.0
spec:
  displayName: cfgd Operator
  description: |
    ## cfgd Operator

    The cfgd operator manages machine configuration state declaratively using
    Kubernetes-native CRDs. It reconciles MachineConfig resources to ensure
    packages, files, environment variables, and system settings match desired
    state.

    ### Features

    - **MachineConfig CRD** — declare desired machine state
    - **ConfigPolicy CRD** — enforce namespace-scoped configuration baselines
    - **ClusterConfigPolicy CRD** — enforce cluster-wide configuration mandates
    - **DriftAlert CRD** — track and alert on configuration drift
    - **Module CRD** — reusable configuration bundles with OCI distribution
    - **Pod module injection** — mutating webhook injects module volumes into pods
    - **Device Gateway** — optional enrollment and fleet management endpoint
  maturity: alpha
  version: 0.1.0
  replaces: ""
  minKubeVersion: "1.26.0"

  keywords:
    - configuration
    - dotfiles
    - gitops
    - machine-config
    - modules
    - kubernetes

  maintainers:
    - name: cfgd maintainers
      email: cfgd@example.com

  provider:
    name: cfgd

  links:
    - name: Documentation
      url: https://github.com/tj-smith47/cfgd/tree/master/docs
    - name: Source
      url: https://github.com/tj-smith47/cfgd

  icon:
    - base64data: "iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAABHNCSVQICAgIfAhkiAAAADlJREFUOI1jYBgFgwkwMjAw/KcXByM04H86ADYY0dOAmhqGuIG+BtDFBcjAiJ4GYAMMDAz/0dkjHQAALxMHEXfNfsoAAAAASUVORK5CYII="
      mediatype: image/png

  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true

  install:
    strategy: deployment
    spec:
      deployments:
        - name: cfgd-operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: cfgd-operator
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: cfgd-operator
              spec:
                serviceAccountName: cfgd-operator
                containers:
                  - name: operator
                    image: ghcr.io/tj-smith47/cfgd-operator:v0.1.0
                    env:
                      - name: WEBHOOK_PORT
                        value: "9443"
                      - name: WEBHOOK_CERT_DIR
                        value: /tmp/k8s-webhook-server/serving-certs
                      - name: HEALTH_PORT
                        value: "8081"
                      - name: METRICS_PORT
                        value: "8443"
                      - name: LEADER_ELECTION_ENABLED
                        value: "true"
                      - name: POD_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: RUST_LOG
                        value: "info"
                    ports:
                      - containerPort: 9443
                        name: webhook
                      - containerPort: 8081
                        name: health
                      - containerPort: 8443
                        name: metrics
                    volumeMounts:
                      - name: webhook-certs
                        mountPath: /tmp/k8s-webhook-server/serving-certs
                        readOnly: true
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: health
                      initialDelaySeconds: 5
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: health
                      initialDelaySeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 256Mi
                      requests:
                        cpu: 100m
                        memory: 128Mi
                    securityContext:
                      runAsNonRoot: true
                      readOnlyRootFilesystem: true
                      capabilities:
                        drop: [ALL]
                volumes:
                  - name: webhook-certs
                    secret:
                      secretName: cfgd-operator-webhook-tls
      clusterPermissions:
        - serviceAccountName: cfgd-operator
          rules:
            - apiGroups: ["cfgd.io"]
              resources: ["machineconfigs", "configpolicies", "clusterconfigpolicies", "driftalerts", "modules"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["cfgd.io"]
              resources: ["machineconfigs/status", "configpolicies/status", "clusterconfigpolicies/status", "driftalerts/status", "modules/status"]
              verbs: ["get", "update", "patch"]
            - apiGroups: [""]
              resources: ["events"]
              verbs: ["create", "patch"]
            - apiGroups: [""]
              resources: ["namespaces"]
              verbs: ["get", "list"]
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["admissionregistration.k8s.io"]
              resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
              verbs: ["get", "list", "watch"]

  webhookdefinitions:
    - type: ValidatingAdmissionWebhook
      admissionReviewVersions: ["v1"]
      containerPort: 9443
      targetPort: 9443
      deploymentName: cfgd-operator
      failurePolicy: Fail
      sideEffects: None
      rules:
        - apiGroups: ["cfgd.io"]
          apiVersions: ["v1alpha1"]
          operations: ["CREATE", "UPDATE"]
          resources: ["machineconfigs"]
      webhookPath: /validate-machineconfig
    - type: ValidatingAdmissionWebhook
      admissionReviewVersions: ["v1"]
      containerPort: 9443
      targetPort: 9443
      deploymentName: cfgd-operator
      failurePolicy: Fail
      sideEffects: None
      rules:
        - apiGroups: ["cfgd.io"]
          apiVersions: ["v1alpha1"]
          operations: ["CREATE", "UPDATE"]
          resources: ["configpolicies"]
      webhookPath: /validate-configpolicy
    - type: ValidatingAdmissionWebhook
      admissionReviewVersions: ["v1"]
      containerPort: 9443
      targetPort: 9443
      deploymentName: cfgd-operator
      failurePolicy: Fail
      sideEffects: None
      rules:
        - apiGroups: ["cfgd.io"]
          apiVersions: ["v1alpha1"]
          operations: ["CREATE", "UPDATE"]
          resources: ["clusterconfigpolicies"]
      webhookPath: /validate-clusterconfigpolicy
    - type: ValidatingAdmissionWebhook
      admissionReviewVersions: ["v1"]
      containerPort: 9443
      targetPort: 9443
      deploymentName: cfgd-operator
      failurePolicy: Fail
      sideEffects: None
      rules:
        - apiGroups: ["cfgd.io"]
          apiVersions: ["v1alpha1"]
          operations: ["CREATE", "UPDATE"]
          resources: ["driftalerts"]
      webhookPath: /validate-driftalert
    - type: ValidatingAdmissionWebhook
      admissionReviewVersions: ["v1"]
      containerPort: 9443
      targetPort: 9443
      deploymentName: cfgd-operator
      failurePolicy: Fail
      sideEffects: None
      rules:
        - apiGroups: ["cfgd.io"]
          apiVersions: ["v1alpha1"]
          operations: ["CREATE", "UPDATE"]
          resources: ["modules"]
      webhookPath: /validate-module
    - type: MutatingAdmissionWebhook
      admissionReviewVersions: ["v1"]
      containerPort: 9443
      targetPort: 9443
      deploymentName: cfgd-operator
      failurePolicy: Ignore
      sideEffects: None
      reinvocationPolicy: IfNeeded
      rules:
        - apiGroups: [""]
          apiVersions: ["v1"]
          operations: ["CREATE"]
          resources: ["pods"]
      webhookPath: /mutate-pods

  customresourcedefinitions:
    owned:
      - name: machineconfigs.cfgd.io
        version: v1alpha1
        kind: MachineConfig
        displayName: Machine Config
        description: Declares desired machine configuration state
      - name: configpolicies.cfgd.io
        version: v1alpha1
        kind: ConfigPolicy
        displayName: Config Policy
        description: Enforces namespace-scoped configuration baselines
      - name: clusterconfigpolicies.cfgd.io
        version: v1alpha1
        kind: ClusterConfigPolicy
        displayName: Cluster Config Policy
        description: Enforces cluster-wide configuration mandates
      - name: driftalerts.cfgd.io
        version: v1alpha1
        kind: DriftAlert
        displayName: Drift Alert
        description: Tracks configuration drift events
      - name: modules.cfgd.io
        version: v1alpha1
        kind: Module
        displayName: Module
        description: Reusable configuration module with OCI distribution
