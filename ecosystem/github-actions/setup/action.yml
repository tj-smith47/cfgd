name: cfgd Setup
description: Bootstrap a GitHub Actions runner with a cfgd module from a config repo
branding:
  icon: terminal
  color: green

inputs:
  source:
    description: Git URL of cfgd config repo
    required: true
  module:
    description: Module to apply
    required: true
  version:
    description: cfgd version to install (default latest)
    required: false
    default: "latest"
  args:
    description: Additional arguments to pass to cfgd apply
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install cfgd
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          curl -fsSL https://raw.githubusercontent.com/tj-smith47/cfgd/master/install.sh | bash
        else
          curl -fsSL https://raw.githubusercontent.com/tj-smith47/cfgd/master/install.sh | bash -s -- --version "$VERSION"
        fi

    - name: Apply module from source
      shell: bash
      run: |
        cfgd apply --yes --no-color \
          --from "${{ inputs.source }}" \
          --module "${{ inputs.module }}" \
          ${{ inputs.args }}
