name: cfgd Plan
description: Run cfgd plan and post the diff as a PR comment
branding:
  icon: settings
  color: blue

inputs:
  config-dir:
    description: Path to cfgd configuration directory
    required: false
    default: "."
  version:
    description: cfgd version to install (default latest)
    required: false
    default: "latest"
  args:
    description: Additional arguments to pass to cfgd plan
    required: false
    default: ""
  comment:
    description: Post plan as PR comment (true/false)
    required: false
    default: "true"
  github-token:
    description: GitHub token for posting PR comments
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Install cfgd
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          curl -fsSL https://raw.githubusercontent.com/tj-smith47/cfgd/master/install.sh | bash
        else
          curl -fsSL https://raw.githubusercontent.com/tj-smith47/cfgd/master/install.sh | bash -s -- --version "$VERSION"
        fi

    - name: Run cfgd plan
      id: plan
      shell: bash
      run: |
        cd "${{ inputs.config-dir }}"
        OUTPUT=$(cfgd plan --output json ${{ inputs.args }} 2>&1) || true
        echo "plan<<CFGD_EOF" >> "$GITHUB_OUTPUT"
        echo "$OUTPUT" >> "$GITHUB_OUTPUT"
        echo "CFGD_EOF" >> "$GITHUB_OUTPUT"

        # Also produce human-readable output
        HUMAN=$(cfgd plan ${{ inputs.args }} 2>&1) || true
        echo "human<<CFGD_HUMAN_EOF" >> "$GITHUB_OUTPUT"
        echo "$HUMAN" >> "$GITHUB_OUTPUT"
        echo "CFGD_HUMAN_EOF" >> "$GITHUB_OUTPUT"

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PLAN_HUMAN: ${{ steps.plan.outputs.human }}
        PLAN_JSON: ${{ steps.plan.outputs.plan }}
      run: |
        cat > /tmp/cfgd-comment.md <<'EOF'
        ### cfgd Plan
        EOF

        printf '\n<details>\n<summary>Plan output</summary>\n\n```\n%s\n```\n\n</details>\n' "$PLAN_HUMAN" >> /tmp/cfgd-comment.md
        printf '\n<details>\n<summary>JSON output</summary>\n\n```json\n%s\n```\n\n</details>\n' "$PLAN_JSON" >> /tmp/cfgd-comment.md
        printf '\n---\n*Generated by [cfgd](https://github.com/tj-smith47/cfgd)*\n' >> /tmp/cfgd-comment.md

        gh pr comment "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          --body-file /tmp/cfgd-comment.md
