name: cfgd Apply
description: Run cfgd apply --dry-run and post the plan diff as a PR comment
branding:
  icon: settings
  color: blue

inputs:
  config-dir:
    description: Path to cfgd configuration directory
    required: false
    default: "."
  version:
    description: cfgd version to install (default latest)
    required: false
    default: "latest"
  args:
    description: Additional arguments to pass to cfgd apply
    required: false
    default: ""
  comment:
    description: Post plan as PR comment (true/false)
    required: false
    default: "true"
  github-token:
    description: GitHub token for posting PR comments
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Install cfgd
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          curl -fsSL https://raw.githubusercontent.com/tj-smith47/cfgd/master/install.sh | bash
        else
          curl -fsSL https://raw.githubusercontent.com/tj-smith47/cfgd/master/install.sh | bash -s -- --version "$VERSION"
        fi

    - name: Run cfgd apply --dry-run
      id: plan
      shell: bash
      run: |
        cd "${{ inputs.config-dir }}"
        OUTPUT=$(cfgd apply --dry-run --yes --output json ${{ inputs.args }} 2>&1) || true
        echo "plan<<CFGD_EOF" >> "$GITHUB_OUTPUT"
        echo "$OUTPUT" >> "$GITHUB_OUTPUT"
        echo "CFGD_EOF" >> "$GITHUB_OUTPUT"

        # Also produce human-readable output
        HUMAN=$(cfgd apply --dry-run --yes ${{ inputs.args }} 2>&1) || true
        echo "human<<CFGD_HUMAN_EOF" >> "$GITHUB_OUTPUT"
        echo "$HUMAN" >> "$GITHUB_OUTPUT"
        echo "CFGD_HUMAN_EOF" >> "$GITHUB_OUTPUT"

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        BODY=$(cat <<'COMMENT_EOF'
        ### cfgd Plan

        <details>
        <summary>Plan output</summary>

        ```
        ${{ steps.plan.outputs.human }}
        ```

        </details>

        <details>
        <summary>JSON output</summary>

        ```json
        ${{ steps.plan.outputs.plan }}
        ```

        </details>

        ---
        *Generated by [cfgd](https://github.com/tj-smith47/cfgd)*
        COMMENT_EOF
        )

        gh pr comment "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          --body "$BODY"
